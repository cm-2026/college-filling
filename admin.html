<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员后台 - 高考志愿系统</title>
    <script>
        // 登录验证 - 未登录跳转到登录页
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <link href="css/admin.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 id="pageTitle">-</h1>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">总用户数</div>
                <div class="stat-value" id="statTotal">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">今日新增</div>
                <div class="stat-value" id="statToday">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">活跃用户</div>
                <div class="stat-value" id="statActive">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">被禁用</div>
                <div class="stat-value" id="statDisabled">-</div>
            </div>
        </div>

        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="搜索用户名或手机号" onkeyup="if(event.key==='Enter')loadUsers()">
            <select id="statusFilter" onchange="loadUsers()">
                <option value="">全部状态</option>
                <option value="1">已启用</option>
                <option value="0">已禁用</option>
            </select>
            <button class="btn btn-reset" onclick="loadUsers()">刷新</button>
        </div>

        <!-- 电脑端表格 -->
        <div class="table-desktop">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>手机号</th>
                        <th>密码</th>
                        <th>状态</th>
                        <th>身份</th>
                        <th>注册时间</th>
                        <th>最后登录</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- 手机端卡片列表 -->
        <div class="card-list" id="cardList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
