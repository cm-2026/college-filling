<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权鼎教育-升学规划师系统后台</title>
    <!-- 使用系统字体，移除 Google Fonts -->
    <script>
        // 登录验证 - 未登录跳转到登录页
        (function() {
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <link href="css/admin.css" rel="stylesheet">
    <script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 页面头部 -->
        <header class="page-header">
            <!-- 标签页切换 -->
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('users')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                        <circle cx="9" cy="7" r="4"></circle>
                        <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                    </svg>
                    用户管理
                </button>
                <button class="tab-btn" onclick="switchTab('dashboard')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                    数据看板
                </button>
            </div>
            
            <!-- 账户名称 -->
            <div class="brand-section">
                <div class="brand-info">
                    <h1 id="pageTitle">后台管理系统</h1>
                </div>
            </div>
            
            <!-- 退出按钮 -->
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="logout()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    退出登录
                </button>
            </div>
        </header>

        <!-- 用户管理标签页 -->
        <div id="usersTab" class="tab-content">
            <div class="stats-grid">
                <div class="stat-card-modern">
                    <div class="stat-icon-wrap blue">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">总用户数</div>
                        <div class="stat-value-large" id="statTotal">-</div>
                        <div class="stat-desc">持续增长</div>
                    </div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-icon-wrap green">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">今日新增</div>
                        <div class="stat-value-large" id="statToday">-</div>
                        <div class="stat-desc">今日实时</div>
                    </div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-icon-wrap purple">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">活跃用户</div>
                        <div class="stat-value-large" id="statActive">-</div>
                        <div class="stat-desc">活跃度高</div>
                    </div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-icon-wrap red">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="15" y1="9" x2="9" y2="15"></line>
                            <line x1="9" y1="9" x2="15" y2="15"></line>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">已禁用</div>
                        <div class="stat-value-large" id="statDisabled">-</div>
                        <div class="stat-desc">需要关注</div>
                    </div>
                </div>
            </div>

        <div class="toolbar">
            <div class="search-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="搜索用户名或手机号" onkeyup="if(event.key==='Enter')loadUsers()">
            </div>
            <select id="statusFilter" onchange="loadUsers()">
                <option value="">全部状态</option>
                <option value="1">已启用</option>
                <option value="0">已禁用</option>
            </select>
            <button class="btn btn-secondary" onclick="loadUsers()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
                刷新
            </button>
        </div>

        <!-- 电脑端表格 -->
        <div class="table-desktop">
            <table>
                <thead>
                    <tr>
                        <th class="sortable" onclick="sortBy('id')">
                            ID
                            <span class="sort-icon" id="sort-id"></span>
                        </th>
                        <th>用户名</th>
                        <th>手机号</th>
                        <th>密码</th>
                        <th>状态</th>
                        <th>身份</th>
                        <th class="sortable" onclick="sortBy('created_at')">
                            注册时间
                            <span class="sort-icon" id="sort-created_at"></span>
                        </th>
                        <th class="sortable" onclick="sortBy('last_login')">
                            最后登录
                            <span class="sort-icon" id="sort-last_login"></span>
                        </th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="9" class="loading">加载中...</td></tr>
                </tbody>
            </table>
        </div>
        
        <!-- 手机端卡片列表 -->
        <div class="card-list" id="cardList">
            <div class="loading">加载中...</div>
        </div>
        </div>

            <!-- 数据看板标签页 -->
            <div id="dashboardTab" class="tab-content" style="display:none;">

            <!-- 核心指标卡片 -->
            <div class="stats-grid">
                <div class="stat-card-modern">
                    <div class="stat-icon-wrap blue">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">今日访问量</div>
                        <div class="stat-value-large" id="dashTodayPv">-</div>
                        <div class="stat-desc">页面浏览 PV</div>
                    </div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-icon-wrap green">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">独立访客</div>
                        <div class="stat-value-large" id="dashTodayUv">-</div>
                        <div class="stat-desc">今日 UV</div>
                    </div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-icon-wrap purple">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">推荐次数</div>
                        <div class="stat-value-large" id="dashTodayRecommend">-</div>
                        <div class="stat-desc">志愿推荐</div>
                    </div>
                </div>
                <div class="stat-card-modern">
                    <div class="stat-icon-wrap orange">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">导出次数</div>
                        <div class="stat-value-large" id="dashTodayExport">-</div>
                        <div class="stat-desc">数据导出</div>
                    </div>
                </div>
                <div class="stat-card-modern highlight">
                    <div class="stat-icon-wrap red">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
                        </svg>
                    </div>
                    <div class="stat-content">
                        <div class="stat-label">实时在线</div>
                        <div class="stat-value-large">
                            <span id="dashOnline">-</span>
                            <span class="online-pulse"></span>
                        </div>
                        <div class="stat-desc">5分钟内活跃</div>
                    </div>
                </div>
            </div>

            <!-- 图表区域 -->
            <div class="charts-container">
                <!-- 地图卡片 -->
                <div class="chart-card map-card">
                    <div class="chart-header">
                        <div class="chart-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10"></circle>
                                <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"></path>
                                <path d="M2 12h20"></path>
                            </svg>
                            <span>省份查询热力图</span>
                        </div>
                        <span class="chart-badge">实时</span>
                    </div>
                    <div class="chart-body map-container">
                        <div id="provinceMapChart"></div>
                    </div>
                </div>

                <!-- 热门院校排行榜 -->
                <div class="chart-card rank-card">
                    <div class="chart-header">
                        <div class="chart-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 20V10"></path>
                                <path d="M18 20V4"></path>
                                <path d="M6 20v-4"></path>
                            </svg>
                            <span>热门院校 Top 10</span>
                        </div>
                        <span class="chart-badge">排行榜</span>
                    </div>
                    <div class="chart-body">
                        <div id="collegeRankChart"></div>
                    </div>
                </div>

                <!-- 行为分布饼图 -->
                <div class="chart-card pie-card">
                    <div class="chart-header">
                        <div class="chart-title">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path>
                                <path d="M22 12A10 10 0 0 0 12 2v10z"></path>
                            </svg>
                            <span>行为类型分布</span>
                        </div>
                        <span class="chart-badge">占比</span>
                    </div>
                    <div class="chart-body">
                        <div id="behaviorPieChart"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
