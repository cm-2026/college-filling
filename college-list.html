<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>院校名录 - 高考志愿智能推荐系统</title>
    <script>
        // 登录验证 - 未登录跳转到登录页
        (function() {
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --card-bg: rgba(20, 20, 40, 0.6);
            --card-border: rgba(100, 100, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0b0d0;
            --accent-cyan: #00d4ff;
            --accent-purple: #a855f7;
            --accent-pink: #f472b6;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 24px;
            padding: 30px 0 20px;
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .search-box {
            max-width: 600px;
            margin: 0 auto 24px;
            position: relative;
        }

        .search-box.sticky {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            max-width: 600px;
            padding: 0;
            margin: 0;
            background: transparent;
            backdrop-filter: none;
            z-index: 1000;
            box-shadow: none;
            border: none;
        }

        .search-box.sticky .search-input {
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(100, 100, 255, 0.1);
        }

        .search-box.sticky .search-btn {
            right: 8px;
        }

        .search-input {
            width: 100%;
            padding: 15px 60px 15px 20px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(59, 159, 232, 0.3);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.1);
            box-shadow: 0 0 20px rgba(59, 159, 232, 0.5);
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .stat-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 15px 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            min-width: 100px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .college-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .college-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .college-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.08), transparent);
            transition: left 0.5s ease;
        }

        .college-card:hover {
            transform: translateY(-6px);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(0, 212, 255, 0.1);
        }

        .college-card:hover::before {
            left: 100%;
        }

        .college-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
            transition: color 0.3s ease;
            line-height: 1.4;
        }

        .college-card:hover .college-name {
            color: var(--accent-cyan);
        }

        .college-info {
            display: flex;
            flex-wrap: wrap;
            gap: 6px 16px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .college-info-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .college-info-item .icon {
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .college-info-separator {
            color: rgba(100, 100, 255, 0.3);
            font-size: 0.8rem;
        }

        .college-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .college-tag {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
            border: 1px solid rgba(0, 212, 255, 0.25);
        }

        .college-tag.985 {
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
            border-color: rgba(239, 68, 68, 0.25);
        }

        .college-tag.211 {
            background: rgba(245, 158, 11, 0.12);
            color: #fbbf24;
            border-color: rgba(245, 158, 11, 0.25);
        }

        .college-tag.double {
            background: rgba(168, 85, 247, 0.12);
            color: #c084fc;
            border-color: rgba(168, 85, 247, 0.25);
        }

        .loading {
            text-align: center;
            padding: 80px;
        }

        .spinner-border {
            width: 4rem;
            height: 4rem;
            color: var(--accent-cyan);
            filter: drop-shadow(0 0 10px rgba(59, 159, 232, 0.5));
        }

        .error-alert {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            max-width: 600px;
            margin: 40px auto;
        }

        .error-icon {
            font-size: 4rem;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ef4444;
            margin-bottom: 15px;
        }

        .error-message {
            color: var(--text-secondary);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .retry-btn {
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            border: none;
            border-radius: 30px;
            padding: 12px 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .retry-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(59, 159, 232, 0.4);
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.8rem;
            }

            .page-subtitle {
                font-size: 0.95rem;
            }

            .college-grid {
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 16px;
            }

            .college-card {
                padding: 18px;
            }

            .college-name {
                font-size: 1.1rem;
            }

            .stats-bar {
                gap: 12px;
            }

            .stat-item {
                padding: 12px 20px;
                min-width: 90px;
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .stat-label {
                font-size: 0.8rem;
            }

            .search-box {
                max-width: 100%;
                padding: 0 16px;
            }

            .search-box.sticky {
                max-width: 100%;
                padding: 0 12px;
                top: 8px;
            }

            .search-box.sticky .search-btn {
                right: 20px;
            }

            .search-input {
                padding: 12px 50px 12px 16px;
                font-size: 1rem;
            }

            .search-btn {
                width: 38px;
                height: 38px;
                right: 24px;
            }
        }

        @media (max-width: 576px) {
            .page-header {
                padding: 20px 0 10px;
                margin-bottom: 12px;
            }

            .stats-bar {
                margin-bottom: 12px;
                gap: 10px;
            }

            .page-title {
                font-size: 1.5rem;
            }

            .college-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .college-card {
                padding: 16px;
                text-align: left;
            }

            .college-name {
                text-align: left;
                margin-bottom: 10px;
            }

            .college-info {
                flex-wrap: wrap;
                gap: 4px 8px;
                font-size: 0.8rem;
            }

            .college-info-item {
                justify-content: flex-start;
            }

            .college-info-separator {
                font-size: 0.75rem;
            }

            .college-tags {
                justify-content: flex-start;
            }

            .stat-item {
                flex: 1;
                min-width: auto;
                padding: 10px 15px;
            }

            .stat-value {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">📚 全国院校名录</h1>
            <p class="page-subtitle">共收录全国3317所高等院校信息</p>

            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索院校名称、城市、地区、类型...">
                <button class="search-btn" onclick="searchColleges()">🔍</button>
            </div>

            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">收录院校</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="filteredCount">0</div>
                    <div class="stat-label">当前显示</div>
                </div>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">加载中...</span>
            </div>
            <h4 class="mt-3">正在加载院校数据...</h4>
        </div>

        <div id="error" style="display: none;" class="error-alert">
            <div class="error-icon">❌</div>
            <h3 class="error-title">加载失败</h3>
            <p class="error-message" id="errorMessage">无法连接到服务器</p>
            <button class="retry-btn" onclick="loadColleges()">重新加载</button>
        </div>

        <div id="collegeList" class="college-grid"></div>
    </div>

    <script>
        const API_BASE = `http://${window.location.hostname || 'localhost'}:3000/api`;
        let allColleges = [];

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                await loadColleges();

                // 添加搜索回车事件
                document.getElementById('searchInput').addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        searchColleges();
                    }
                });

                // 实时搜索
                document.getElementById('searchInput').addEventListener('input', function() {
                    searchColleges();
                });

                // 搜索框滚动固定
                setupStickySearch();
            } catch (error) {
                console.error('初始化失败:', error);
                showError('系统初始化失败：' + error.message);
            }
        });

        // 搜索框滚动固定
        function setupStickySearch() {
            const searchBox = document.querySelector('.search-box');
            const searchBoxOffset = searchBox.offsetTop;

            window.addEventListener('scroll', function() {
                if (window.pageYOffset > searchBoxOffset) {
                    searchBox.classList.add('sticky');
                } else {
                    searchBox.classList.remove('sticky');
                }
            });
        }

        // 加载所有院校数据
        async function loadColleges() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('error').style.display = 'none';

                const response = await fetch(`${API_BASE}/colleges`);
                const text = await response.text();

                if (!text || text.trim() === '') {
                    throw new Error('服务器返回空响应');
                }

                const result = JSON.parse(text);

                if (!result.success) {
                    throw new Error(result.error || '获取院校数据失败');
                }

                allColleges = result.data || [];
                console.log(`✅ 加载了 ${allColleges.length} 所院校`);

                // 只显示排名前100的院校
                const top100Colleges = allColleges.slice(0, 100);
                console.log(`📊 默认显示前 ${top100Colleges.length} 所院校`);

                document.getElementById('totalCount').textContent = allColleges.length;
                displayColleges(top100Colleges);

                document.getElementById('loading').style.display = 'none';
            } catch (error) {
                console.error('加载院校数据失败:', error);
                showError(error.message);
            }
        }

        // 显示院校列表
        function displayColleges(colleges) {
            const container = document.getElementById('collegeList');
            document.getElementById('filteredCount').textContent = colleges.length;

            if (colleges.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 60px; grid-column: 1/-1;">
                        <div style="font-size: 3rem; margin-bottom: 20px;">🔍</div>
                        <h3 style="color: var(--text-secondary);">未找到匹配的院校</h3>
                        <p style="color: var(--text-secondary);">请尝试其他关键词</p>
                    </div>
                `;
                return;
            }

            let html = '';
            colleges.forEach(college => {
                const tags = [];

                // 处理985/211/双一流的布尔值和字符串
                const is985 = college.is_985 === true || college.is_985 === '是';
                const is211 = college.is_211 === true || college.is_211 === '是';
                const isDouble = college.is_double_first_class === true || college.is_double_first_class === '是';

                if (is985) tags.push('<span class="college-tag 985">985</span>');
                if (is211) tags.push('<span class="college-tag 211">211</span>');
                if (isDouble) tags.push('<span class="college-tag double">双一流</span>');

                html += `
                    <div class="college-card" onclick="openSchoolDetail('${college.school_name}')">
                        <div class="college-name">${college.school_name}</div>
                        <div class="college-info">
                            <span class="college-info-item">${college.city || college.location || '未知'}</span>
                            <span class="college-info-separator">|</span>
                            <span class="college-info-item">${college.school_type || '未知'}</span>
                            <span class="college-info-separator">|</span>
                            <span class="college-info-item">${college.affiliation || '未知'}</span>
                        </div>
                        <div class="college-tags">
                            ${tags.join('')}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // 搜索院校
        function searchColleges() {
            const keyword = document.getElementById('searchInput').value.trim().toLowerCase();

            // 如果搜索框为空，显示前100名
            if (!keyword) {
                const top100Colleges = allColleges.slice(0, 100);
                displayColleges(top100Colleges);
                return;
            }

            // 搜索时搜索所有院校
            const filtered = allColleges.filter(college => {
                return (
                    college.school_name?.toLowerCase().includes(keyword) ||
                    college.location?.toLowerCase().includes(keyword) ||
                    college.city?.toLowerCase().includes(keyword) ||
                    college.school_type?.toLowerCase().includes(keyword) ||
                    college.affiliation?.toLowerCase().includes(keyword)
                );
            });

            displayColleges(filtered);
        }

        // 打开学校详情页
        function openSchoolDetail(schoolName) {
            const url = `school-detail.html?schoolName=${encodeURIComponent(schoolName)}`;
            window.open(url, '_blank');
        }

        // 显示错误
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }
    </script>
</body>
</html>
