<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>院校名录 - 高考志愿智能推荐系统</title>
    <script>
        // 登录验证 - 未登录跳转到登录页
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/college-list.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1 class="page-title">📚 全国院校名录</h1>
            <p class="page-subtitle">共收录全国3317所高等院校信息</p>

            <div class="search-box">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索院校名称、城市、地区、类型...">
                <button class="search-btn" onclick="searchColleges()">🔍</button>
            </div>

            <div class="stats-bar" id="statsBar">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">收录院校</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="filteredCount">0</div>
                    <div class="stat-label">当前显示</div>
                </div>
            </div>
        </div>

        <div id="loading" class="loading">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">加载中...</span>
            </div>
            <h4 class="mt-3">正在加载院校数据...</h4>
        </div>

        <div id="error" style="display: none;" class="error-alert">
            <div class="error-icon">❌</div>
            <h3 class="error-title">加载失败</h3>
            <p class="error-message" id="errorMessage">无法连接到服务器</p>
            <button class="retry-btn" onclick="loadColleges()">重新加载</button>
        </div>

        <div id="collegeList" class="college-grid"></div>
    </div>

    <script src="js/college-list.js"></script>
</body>
</html>
