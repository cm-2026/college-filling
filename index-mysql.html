<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考志愿智能推荐系统</title>
    <script>
        // 登录验证 - 未登录跳转到登录页
        (function() {
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --card-bg: rgba(20, 20, 40, 0.6);
            --card-border: rgba(100, 100, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0b0d0;
            --accent-cyan: #00d4ff;
            --accent-purple: #a855f7;
            --accent-pink: #f472b6;
            --glow-cyan: 0 0 20px rgba(0, 212, 255, 0.3);
        }

        * { box-sizing: border-box; }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========== 全局通用 ========== */
        /* 统一状态按钮样式 - 玻璃拟态胶囊 */
        .status-pill {
            position: fixed;
            right: 16px;
            z-index: 1000;
            height: 36px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 18px;
            font-weight: 500;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .status-pill:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .welcome-user {
            top: 20px;
            display: none;
        }
        .welcome-user::before {
            content: "👋";
            font-size: 0.9rem;
        }

        .connection-status {
            top: 64px;
        }
        .connection-status.connected {
            color: #6ee7b7;
            border-color: rgba(110, 231, 183, 0.4);
            background: rgba(16, 185, 129, 0.1);
        }
        .connection-status.disconnected {
            color: #fca5a5;
            border-color: rgba(252, 165, 165, 0.4);
            background: rgba(239, 68, 68, 0.1);
        }
        .connection-status::before {
            content: "";
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            box-shadow: 0 0 8px currentColor;
        }

        /* ========== 视图容器 ========== */
        #viewForm   { display: block; }
        #viewResult { display: none; }

        /* ========== 表单视图 ========== */
        .form-view-wrap {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .main-container {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin: 80px 0 0 0;
            padding: 40px;
            position: relative;
            z-index: 1;
            max-width: 1200px;
            width: 100%;
        }

        .header-title {
            font-weight: 800;
            text-align: center;
            margin-bottom: 40px;
            font-size: 34px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -1px;
        }

        .section-card {
            background: rgba(30, 30, 50, 0.4);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .section-card:hover {
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .section-title {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid transparent;
            border-image: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple)) 1;
            display: flex; align-items: center; gap: 10px;
        }

        .form-label { font-weight: 600; color: var(--text-primary); margin-bottom: 10px; font-size: 14px; }

        .form-control, .form-select {
            background: rgba(30, 30, 50, 0.5);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            height: 34px;
            padding: 4px 18px;
            font-size: 14px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text-primary);
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1), var(--glow-cyan);
            background: rgba(30, 30, 50, 0.7);
            color: var(--text-primary);
        }
        .form-control::placeholder { color: var(--text-secondary); }

        .btn {
            border-radius: 12px;
            padding: 0 32px;
            height: 44px;
            line-height: 44px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            margin: 6px;
            border: none;
            position: relative;
            overflow: hidden;
            font-size: 16px;
            min-width: 120px;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        .btn:hover::before { left: 100%; }

        /* 统一按钮样式：深紫到浅紫渐变（加深版） */
        .btn-primary, .btn-warning, .btn-college, .btn-secondary {
            background: linear-gradient(135deg, #2e1065 0%, #5b21b6 50%, #7c3aed 100%) !important;
            color: white !important;
            border: none !important;
            box-shadow: 0 4px 15px rgba(91, 33, 182, 0.4);
        }
        .btn-primary:hover, .btn-warning:hover, .btn-college:hover, .btn-secondary:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #3b157a 0%, #6d28d9 50%, #8b5cf6 100%) !important;
            box-shadow: 0 6px 20px rgba(91, 33, 182, 0.5);
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .spinner-border { width: 3.5rem; height: 3.5rem; color: var(--accent-cyan); filter: drop-shadow(0 0 10px rgba(59,159,232,0.5)); }
        .loading h4 { color: var(--text-primary); margin-top: 20px; font-weight: 600; }

        /* 选科标签 */
        .subject-tags { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 12px; }
        .subject-tag {
            padding: 0 20px;
            height: 34px;
            font-size: 14px;
            border: 2px solid var(--card-border);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            background: rgba(10,30,80,0.6);
            font-weight: 600;
            user-select: none;
            color: var(--text-primary);
            backdrop-filter: blur(5px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .subject-tag:hover { border-color: var(--accent-cyan); box-shadow: 0 0 15px rgba(59,159,232,0.45); }
        .subject-tag.selected { background: linear-gradient(135deg, var(--accent-cyan), #0099cc); color: white; border-color: var(--accent-cyan); box-shadow: 0 5px 20px rgba(59,159,232,0.4); }
        .subject-tag.disabled { opacity: 0.4; cursor: not-allowed; background: rgba(10,30,80,0.3); }
        .subject-tag.disabled:hover { border-color: var(--card-border); box-shadow: none; }

        .form-text { color: var(--text-secondary) !important; font-size: 0.9rem; }
        .invalid-feedback { color: #ef4444; font-weight: 600; }

        /* 地区 Combobox */
        .region-combobox { position: relative; }
        .region-combobox .form-control { padding-right: 36px; cursor: text; }
        .region-combobox::after { content: '▾'; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: var(--text-secondary); pointer-events: none; font-size: 0.85rem; }
        .region-dropdown {
            display: none; position: absolute;
            top: calc(100% + 4px); left: 0; right: 0;
            background: rgba(20, 20, 40, 0.98);
            border: 1px solid var(--card-border);
            border-radius: 10px;
            max-height: 240px; overflow-y: auto;
            z-index: 9999;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }
        .region-dropdown.open { display: block; }
        .region-dropdown::-webkit-scrollbar { width: 4px; }
        .region-dropdown::-webkit-scrollbar-thumb { background: var(--accent-cyan); border-radius: 2px; }
        .region-option { padding: 9px 16px; cursor: pointer; color: var(--text-primary); font-size: 0.95rem; display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
        .region-option:hover, .region-option.highlighted { background: rgba(0, 212, 255, 0.1); }
        .region-option .mode-tag { font-size: 0.7rem; padding: 1px 7px; border-radius: 10px; background: rgba(0, 212, 255, 0.1); color: var(--accent-cyan); border: 1px solid rgba(0, 212, 255, 0.25); flex-shrink: 0; }
        .region-option .mode-tag.gold { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border-color: rgba(245, 158, 11, 0.25); }
        .region-option .mode-tag.gray { background: rgba(168, 168, 168, 0.1); color: #aaa; border-color: rgba(168, 168, 168, 0.2); }
        .region-option .match-highlight { color: var(--accent-cyan); font-weight: 700; }
        .region-group-label { padding: 6px 16px 3px; font-size: 0.72rem; color: var(--text-secondary); letter-spacing: 0.05em; border-top: 1px solid rgba(255,255,255,0.06); margin-top: 2px; }
        .region-group-label:first-child { border-top: none; }
        .region-no-result { padding: 12px 16px; color: var(--text-secondary); font-size: 0.9rem; text-align: center; }

        /* Toast */
        .toast { background: rgba(20, 20, 40, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--card-border); border-radius: 16px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4); }
        .toast-header { background: rgba(30, 30, 50, 0.9); border-bottom: 1px solid var(--card-border); color: var(--text-primary); border-radius: 16px 16px 0 0; }
        .toast-body { background: transparent; color: var(--text-primary); padding: 20px; }
        .text-success { color: #10b981 !important; }
        .text-danger  { color: #ef4444 !important; }
        .text-warning { color: #f59e0b !important; }
        .text-info    { color: var(--accent-cyan) !important; }
        .text-muted   { color: var(--text-secondary) !important; }

        /* alert */
        .alert { border-radius: 16px; border: 1px solid var(--card-border); backdrop-filter: blur(10px); }
        .alert-info    { background: rgba(0, 212, 255, 0.08);  border-color: rgba(0, 212, 255, 0.25);  color: var(--text-primary); }
        .alert-warning { background: rgba(245, 158, 11, 0.08); border-color: rgba(245, 158, 11, 0.25); color: var(--text-primary); }
        .alert h5 { color: var(--text-primary); font-weight: 700; }
        .alert p, .alert ul { color: var(--text-secondary); }

        /* ========== 结果视图 ========== */
        .result-view-wrap {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 24px 48px;
            max-height: 100vh;
        }

        /* 返回按钮 */
        .back-btn {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.25);
            color: var(--accent-cyan);
            border-radius: 8px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .back-btn:hover { background: rgba(0, 212, 255, 0.15); color: var(--accent-cyan); transform: translateY(-1px); }

        /* 筛选按钮 - 与状态按钮统一风格 */
        .filter-toggle-btn {
            position: fixed;
            top: 108px;
            right: 16px;
            z-index: 999;
            height: 36px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 6px;
            border-radius: 18px;
            font-weight: 500;
            font-size: 0.85rem;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .filter-toggle-btn svg {
            width: 14px;
            height: 14px;
            transition: transform 0.3s ease;
        }
        .filter-toggle-btn:hover { 
            background: rgba(255, 255, 255, 0.15); 
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 0, 0, 0.25), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }
        .filter-toggle-btn.active { 
            background: rgba(0, 212, 255, 0.2); 
            border-color: rgba(0, 212, 255, 0.5); 
            color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.2);
        }
        .filter-toggle-btn.active svg {
            transform: rotate(180deg);
        }

        /* 页面标题（结果页） */
        .page-title {
            font-size: 2.2rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 15px;
        }
        .page-title span { font-size: 1rem; font-weight: 400; color: var(--text-secondary); }

        /* 信息栏 */
        .info-bar {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 12px 20px;
            margin-bottom: 24px;
            display: flex; flex-wrap: nowrap; gap: 16px; align-items: center;
            overflow-x: auto;
        }
        .info-tag { display: flex; align-items: center; gap: 6px; font-size: 0.92rem; color: var(--text-secondary); }
        .info-tag strong { color: var(--accent-cyan); font-size: 1.05rem; }

        /* 筛选栏 */
        .filter-bar {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 20px;
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 1200px;
            z-index: 1000;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
        }
        .filter-bar.show { display: block !important; }
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px 16px;
            margin-bottom: 12px;
        }
        .filter-item { display: flex; flex-direction: column; gap: 4px; }
        .filter-item label { color: var(--text-secondary); font-size: 0.8rem; white-space: nowrap; }
        .filter-item select, .filter-item input {
            background: rgba(10,30,80,0.8);
            border: 1px solid rgba(59,159,232,0.3);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.86rem;
            width: 100%;
            height: 34px;
        }
        .filter-item select:focus, .filter-item input:focus { outline: none; border-color: var(--accent-cyan); box-shadow: 0 0 0 2px rgba(59,159,232,0.2); }
        .filter-item select option { background: #0d2566; }
        .filter-actions { display: flex; align-items: center; justify-content: flex-end; gap: 12px; padding-top: 4px; border-top: 1px solid rgba(59,159,232,0.1); }
        .result-count { color: var(--text-secondary); font-size: 0.86rem; margin-right: auto; }
        .result-count strong { color: var(--accent-cyan); }
        .reset-btn { padding: 6px 20px; border-radius: 8px; border: 1px solid rgba(59,159,232,0.4); background: rgba(59,159,232,0.08); color: var(--accent-cyan); font-size: 0.86rem; cursor: pointer; transition: background 0.15s; height: 34px; white-space: nowrap; }
        .reset-btn:hover { background: rgba(59,159,232,0.2); border-color: rgba(59,159,232,0.7); }

        /* 排序工具栏 */
        .sort-bar { display: flex; align-items: center; gap: 8px; padding: 10px 18px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; margin-bottom: 14px; flex-wrap: wrap; margin-top: -3px; }
        .sort-bar-label { color: var(--text-secondary); font-size: 0.82rem; white-space: nowrap; }
        .sort-btn { padding: 0 16px; height: 32px; line-height: 32px; border-radius: 8px; border: 1px solid rgba(59,159,232,0.25); background: rgba(59,159,232,0.07); color: var(--text-secondary); font-size: 0.82rem; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
        .sort-btn:hover { background: rgba(59,159,232,0.18); color: var(--accent-cyan); }
        .sort-btn.active { background: rgba(59,159,232,0.22); color: var(--accent-cyan); border-color: rgba(59,159,232,0.6); }
        .sort-btn .sort-arrow { margin-left: 3px; font-size: 0.7rem; }

        /* 院校卡片 */
        .cards-wrapper { display: flex; flex-direction: column; gap: 0; }
        .school-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; margin-bottom: 14px; overflow: hidden; transition: border-color 0.2s; }
        .school-card:hover { border-color: rgba(59,159,232,0.45); }

        .school-header { padding: 14px 20px; border-bottom: 1px solid rgba(59,159,232,0.12); display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
        .school-header:hover { background: rgba(59,159,232,0.05); }
        .collapse-arrow { color: var(--text-secondary); font-size: 0.75rem; margin-left: auto; padding-top: 4px; transition: transform 0.2s; white-space: nowrap; }
        .school-card.collapsed .collapse-arrow { transform: rotate(-90deg); }
        .major-body { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s; max-height: 2000px; opacity: 1; }
        .school-card.collapsed .major-body { max-height: 0; opacity: 0; }

        .school-header-left { flex: 1; min-width: 0; display: flex; align-items: center; gap: 0; }
        .school-name-row { display: flex; align-items: center; flex: 1; min-width: 0; overflow: hidden; gap: 12px; }
        .school-name-wrapper { display: flex; align-items: center; gap: 8px; min-width: 225px; width: 225px; flex-shrink: 0; }
        .college-level-tag { flex-shrink: 0; }
        .school-col-level  { min-width: 80px;  width: 80px; }
        .school-col-code   { min-width: 70px;  width: 70px; color: var(--text-secondary); font-size: 0.78rem; }
        .school-col-province { min-width: 60px; width: 60px; color: var(--text-secondary); font-size: 0.82rem; }
        .school-col-city-province { min-width: 60px; width: 60px; color: var(--text-secondary); font-size: 0.82rem; }
        .school-col-batch  { min-width: 90px;  width: 90px; }
        .school-col-remark { min-width: 80px;  width: 80px; }
        .school-link { color: var(--accent-cyan); text-decoration: none; font-weight: 700; font-size: 1.05rem; cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px; display: inline-block; }
        .school-link:hover { text-decoration: underline; color: #7dc8f0; }
        .school-major-count { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; padding-top: 4px; flex-shrink: 0; }
        .school-major-count strong { color: var(--accent-cyan); font-size: 1rem; }
        .school-major-count.desktop-only { margin-left: auto; padding-left: 20px; }

        /* 批次/层次 标签 */
        .batch-tag { font-size: 0.72rem; padding: 2px 7px; border-radius: 5px; background: rgba(240,165,0,0.12); border: 1px solid rgba(240,165,0,0.3); color: var(--accent-pink); white-space: nowrap; }
        .college-level-tag { display: inline-block; font-size: 0.7rem; padding: 2px 7px; border-radius: 5px; background: rgba(120,200,120,0.15); color: #7ec87e; border: 1px solid rgba(120,200,120,0.3); white-space: nowrap; font-weight: 600; }
        .college-level-tag.level-211 { background: rgba(59,159,232,0.15); color: #7dc8f0; border-color: rgba(59,159,232,0.3); }
        .college-level-tag.level-985 { background: rgba(255,180,0,0.15); color: #ffcc44; border-color: rgba(255,180,0,0.3); }
        .college-level-tag.level-syl { background: rgba(200,100,255,0.15); color: #cc88ff; border-color: rgba(200,100,255,0.3); }

        /* 专业列表头/行 */
        .major-list-header {
            display: grid;

        /* 分组选项卡 */
        .group-tabs {

                <option value="20">20所/页</option>

                <option value="0">全部</option>

        <!-- 专业组模态框 -->
        <div id="groupModal" class="modal-overlay" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;justify-content:center;align-items:center;">
            <div class="modal-content" style="background:linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);border:1px solid rgba(59,159,232,0.4);border-radius:12px;width:90%;max-width:1000px;max-height:80vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,0.5);">
                <div class="modal-header" style="display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid rgba(59,159,232,0.3);background:rgba(10,25,70,0.5);">
                    <h3 id="groupModalTitle" style="margin:0;color:var(--accent-cyan);font-size:1.1rem;"></h3>
                    <button onclick="closeGroupModal()" style="background:none;border:none;color:var(--text-secondary);font-size:1.5rem;cursor:pointer;padding:0;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all 0.2s;">×</button>

    <!-- 专业介绍 Tooltip -->
    <div id="majorTooltip">
        <div class="tooltip-title" id="ttTitle"></div>
        <div id="ttBody"></div>
    </div>

    <!-- Toast 提示 -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">系统提示</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    // ====================================================
    // 公共配置
    // ====================================================
    const API_BASE = `http://${window.location.hostname || 'localhost'}:3000/api`;
    let isBackendConnected = false;

    // ====================================================
    // 视图切换
    // ====================================================
    function showFormView() {
        document.getElementById('viewForm').style.display = 'block';
        document.getElementById('viewResult').style.display = 'none';
        document.getElementById('filterToggleBtn').style.display = 'none';
        // 关闭筛选面板
        document.getElementById('filterBar').style.display = 'none';
        document.getElementById('filterToggleBtn').classList.remove('active');
    }

    function showResultView() {
        document.getElementById('viewForm').style.display = 'none';
        document.getElementById('viewResult').style.display = 'block';
        document.getElementById('filterToggleBtn').style.display = 'flex';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 切换筛选面板显示/隐藏
    function toggleFilterPanel() {
        const filterBar = document.getElementById('filterBar');
        const filterBtn = document.getElementById('filterToggleBtn');
        if (filterBar.style.display === 'none') {
            filterBar.style.display = 'block';
            filterBtn.classList.add('active');
        } else {
            filterBar.style.display = 'none';
            filterBtn.classList.remove('active');
        }
    }

    // ====================================================
    // 页面初始化
    // ====================================================
    document.addEventListener('DOMContentLoaded', async () => {
        // 欢迎语
        const savedUsername = localStorage.getItem('qd_username');
        if (savedUsername) {
            const el = document.getElementById('welcomeUser');
            el.textContent = `欢迎，${savedUsername}`;
            el.style.display = 'flex';
        }

        // 测试后端连接
        try {
            const res = await fetch(API_BASE + '/test-connection', { signal: AbortSignal.timeout(3000) });
            isBackendConnected = res.ok;
        } catch { isBackendConnected = false; }
        updateConnectionStatus(isBackendConnected);
        if (!isBackendConnected) showToast('无法连接到后端服务器，请确保后端服务已启动', 'error');

        // 初始化选科标签
        initSubjectTags();
    });

    function updateConnectionStatus(connected) {
        const el = document.getElementById('connectionStatus');
        el.className = 'connection-status status-pill ' + (connected ? 'connected' : 'disconnected');
        el.textContent = connected ? '已连接到后端' : '未连接到后端';
    }

    // ====================================================
    // 高考模式 & 省份
    // ====================================================
    const gaokaoModes = {
        mode312: ['广东','江苏','河北','福建','湖北','湖南','辽宁','重庆','吉林','黑龙江','安徽','江西','广西','贵州','甘肃','河南','山西','陕西','内蒙古','宁夏','青海','四川','云南'],
        mode33: ['北京','天津','上海','山东','浙江','海南'],
        modeTraditional: ['西藏','新疆']
    };
    const PROVINCES = [
        {name:'河南',mode:'3+1+2'},{name:'广东',mode:'3+1+2'},{name:'江苏',mode:'3+1+2'},{name:'河北',mode:'3+1+2'},{name:'福建',mode:'3+1+2'},
        {name:'湖北',mode:'3+1+2'},{name:'湖南',mode:'3+1+2'},{name:'辽宁',mode:'3+1+2'},{name:'重庆',mode:'3+1+2'},{name:'吉林',mode:'3+1+2'},
        {name:'黑龙江',mode:'3+1+2'},{name:'安徽',mode:'3+1+2'},{name:'江西',mode:'3+1+2'},{name:'广西',mode:'3+1+2'},{name:'贵州',mode:'3+1+2'},
        {name:'甘肃',mode:'3+1+2'},{name:'山西',mode:'3+1+2'},{name:'陕西',mode:'3+1+2'},{name:'内蒙古',mode:'3+1+2'},{name:'宁夏',mode:'3+1+2'},
        {name:'青海',mode:'3+1+2'},{name:'四川',mode:'3+1+2'},{name:'云南',mode:'3+1+2'},
        {name:'北京',mode:'3+3'},{name:'天津',mode:'3+3'},{name:'上海',mode:'3+3'},{name:'山东',mode:'3+3'},{name:'浙江',mode:'3+3'},{name:'海南',mode:'3+3'},
        {name:'西藏',mode:'文理'},{name:'新疆',mode:'文理'}
    ];
    const PINYIN_MAP = {'河南':'hn','广东':'gd','江苏':'js','河北':'hb','福建':'fj','湖北':'hb','湖南':'hn','辽宁':'ln','重庆':'cq','吉林':'jl','黑龙江':'hlj','安徽':'ah','江西':'jx','广西':'gx','贵州':'gz','甘肃':'gs','山西':'sx','陕西':'sx','内蒙古':'nmg','宁夏':'nx','青海':'qh','四川':'sc','云南':'yn','北京':'bj','天津':'tj','上海':'sh','山东':'sd','浙江':'zj','海南':'hi','西藏':'xz','新疆':'xj'};

    // ====================================================
    // 地区 Combobox
    // ====================================================
    function initRegionCombobox() {
        const input    = document.getElementById('regionInput');
        const hidden   = document.getElementById('region');
        const dropdown = document.getElementById('regionDropdown');
        let highlightIdx = -1, filtered = [];

        function renderDropdown(kw) {
            kw = (kw || '').trim().toLowerCase();
            filtered = kw ? PROVINCES.filter(p => p.name.includes(kw) || (PINYIN_MAP[p.name]||'').startsWith(kw)) : PROVINCES;
            if (!filtered.length) { dropdown.innerHTML = '<div class="region-no-result">未找到匹配省份</div>'; }
            else {
                const groups = [
                    {label:'3+1+2 新高考',tag:'blue', items:filtered.filter(p=>p.mode==='3+1+2')},
                    {label:'3+3 新高考',  tag:'gold', items:filtered.filter(p=>p.mode==='3+3')},
                    {label:'传统文理分科',tag:'gray', items:filtered.filter(p=>p.mode==='文理')},
                ];
                let html='', gi=0;
                groups.forEach(g=>{
                    if(!g.items.length) return;
                    if(!kw) html+=`<div class="region-group-label">${g.label}</div>`;
                    g.items.forEach(p=>{
                        const tc=g.tag==='gold'?'gold':g.tag==='gray'?'gray':'';
                        let dn=p.name;
                        if(kw){const idx=p.name.indexOf(kw);if(idx>=0)dn=p.name.substring(0,idx)+`<span class="match-highlight">${p.name.substring(idx,idx+kw.length)}</span>`+p.name.substring(idx+kw.length);}
                        html+=`<div class="region-option" data-value="${p.name}" data-idx="${gi}"><span>${dn}</span><span class="mode-tag ${tc}">${p.mode}</span></div>`;
                        gi++;
                    });
                });
                dropdown.innerHTML=html;
            }
            highlightIdx=-1;
            dropdown.querySelectorAll('.region-option').forEach(el=>{el.addEventListener('mousedown',e=>{e.preventDefault();selectProvince(el.dataset.value);});});
        }
        function selectProvince(name){hidden.value=name;input.value=name;closeDropdown();hidden.dispatchEvent(new Event('change'));}
        function openDropdown(kw){renderDropdown(kw);dropdown.classList.add('open');}
        function closeDropdown(){dropdown.classList.remove('open');highlightIdx=-1;}
        function moveHighlight(dir){
            const opts=dropdown.querySelectorAll('.region-option');
            if(!opts.length)return;
            opts.forEach(o=>o.classList.remove('highlighted'));
            highlightIdx=(highlightIdx+dir+opts.length)%opts.length;
            const cur=opts[highlightIdx];cur.classList.add('highlighted');cur.scrollIntoView({block:'nearest'});
        }
        input.addEventListener('focus',()=>openDropdown(''));
        input.addEventListener('click',()=>openDropdown(''));
        input.addEventListener('input',()=>{openDropdown(input.value);hidden.value='';});
        input.addEventListener('keydown',e=>{
            if(!dropdown.classList.contains('open')){openDropdown('');return;}
            if(e.key==='ArrowDown'){e.preventDefault();moveHighlight(1);}
            else if(e.key==='ArrowUp'){e.preventDefault();moveHighlight(-1);}
            else if(e.key==='Enter'){e.preventDefault();const opts=dropdown.querySelectorAll('.region-option');if(highlightIdx>=0&&opts[highlightIdx])selectProvince(opts[highlightIdx].dataset.value);else if(filtered.length===1)selectProvince(filtered[0].name);}
            else if(e.key==='Escape')closeDropdown();
        });
        input.addEventListener('blur',()=>{
            setTimeout(()=>{
                const match=PROVINCES.find(p=>p.name===input.value.trim());
                if(match){hidden.value=match.name;}
                else if(hidden.value){input.value=hidden.value;}
                else{input.value='河南';hidden.value='河南';}
                closeDropdown();
            },150);
        });
        document.addEventListener('click',e=>{if(!document.getElementById('regionCombobox').contains(e.target))closeDropdown();});
    }

    // ====================================================
    // 选科标签
    // ====================================================
    function initSubjectTags() {
        initRegionCombobox();
        renderSubjectSelection();
        document.getElementById('region').addEventListener('change',()=>{
            document.getElementById('subjectCombination').value='';
            renderSubjectSelection();
            showToast('选科模式已根据地区自动切换','info');
        });
    }

    function renderSubjectSelection() {
        const container = document.getElementById('subjectSelection');
        const region = document.getElementById('region').value;
        let mode = gaokaoModes.mode312.includes(region)?'mode312':gaokaoModes.mode33.includes(region)?'mode33':gaokaoModes.modeTraditional.includes(region)?'modeTraditional':'mode312';
        let html='';
        if(mode==='mode312'){
            html=`<input type="hidden" id="subjectCombination" required>
            <div class="invalid-feedback" id="subjectError" style="display:none;">请选择必选科目（1门）和再选科目（2门）</div>
            <div class="mb-3"><label class="form-label">必选科目（物理/历史二选一，100分）</label>
            <div class="subject-tags"><div class="subject-tag" data-type="required" data-value="物理">物理</div><div class="subject-tag" data-type="required" data-value="历史">历史</div></div></div>
            <div><label class="form-label">再选科目（政治、地理、化学、生物中选2门，各100分）</label>
            <div class="subject-tags"><div class="subject-tag" data-type="optional" data-value="化学">化学</div><div class="subject-tag" data-type="optional" data-value="生物">生物</div><div class="subject-tag" data-type="optional" data-value="政治">政治</div><div class="subject-tag" data-type="optional" data-value="地理">地理</div></div></div>`;
        } else if(mode==='mode33'){
            const region = document.getElementById('region').value;
            const hasTech = (region === '浙江'); // 只有浙江有技术科目
            const subjectCount = hasTech ? '7选3' : '6选3';
            const techTag = hasTech ? '<div class="subject-tag" data-type="mode33" data-value="技术">技术</div>' : '';
            html=`<input type="hidden" id="subjectCombination" required>
            <div class="invalid-feedback" id="subjectError" style="display:none;">请选择选科组合</div>
            <div><label class="form-label">选考科目（${subjectCount}，各100分）</label>
            <div class="subject-tags"><div class="subject-tag" data-type="mode33" data-value="物理">物理</div><div class="subject-tag" data-type="mode33" data-value="化学">化学</div><div class="subject-tag" data-type="mode33" data-value="生物">生物</div><div class="subject-tag" data-type="mode33" data-value="政治">政治</div><div class="subject-tag" data-type="mode33" data-value="历史">历史</div><div class="subject-tag" data-type="mode33" data-value="地理">地理</div>${techTag}</div></div>`;
        } else {
            html=`<input type="hidden" id="subjectCombination" required>
            <div class="invalid-feedback" id="subjectError" style="display:none;">请选择文理分科</div>
            <div><label class="form-label">文理分科（文综/理综，300分）</label>
            <div class="subject-tags"><div class="subject-tag" data-type="traditional" data-value="理科">理科（理综）</div><div class="subject-tag" data-type="traditional" data-value="文科">文科（文综）</div></div></div>`;
        }
        container.innerHTML=html;
        setupSubjectTagEvents(mode);
    }

    function setupSubjectTagEvents(mode) {
        const tags=document.querySelectorAll('.subject-tag');
        const hiddenInput=document.getElementById('subjectCombination');
        const errorDiv=document.getElementById('subjectError');
        if(!hiddenInput||!errorDiv)return;

        tags.forEach(tag=>{
            tag.addEventListener('click',function(){
                const type=this.dataset.type, value=this.dataset.value;
                if(type==='required'){
                    document.querySelectorAll('[data-type="required"]').forEach(t=>t.classList.remove('selected'));
                    this.classList.add('selected');updateCombo();
                } else if(type==='optional'){
                    const sel=document.querySelectorAll('[data-type="optional"].selected');
                    if(this.classList.contains('selected')){this.classList.remove('selected');}
                    else if(sel.length<2){this.classList.add('selected');}
                    else{showToast('再选科目最多选择2门！','warning');return;}
                    updateCombo();
                } else if(type==='mode33'){
                    const sel=document.querySelectorAll('[data-type="mode33"].selected');
                    if(this.classList.contains('selected')){this.classList.remove('selected');}
                    else if(sel.length<3){this.classList.add('selected');}
                    else{showToast('选考科目最多选择3门！','warning');return;}
                    updateCombo();
                } else if(type==='traditional'){
                    document.querySelectorAll('[data-type="traditional"]').forEach(t=>t.classList.remove('selected'));
                    this.classList.add('selected');
                    hiddenInput.value=value;errorDiv.style.display='none';return;
                }
                validateSubject();
            });
        });

        function updateCombo(){
            let subjects=[];
            if(mode==='mode312'){
                const req=document.querySelector('[data-type="required"].selected');
                const opt=document.querySelectorAll('[data-type="optional"].selected');
                if(req&&opt.length===2){subjects=[req.dataset.value,opt[0].dataset.value,opt[1].dataset.value];hiddenInput.value=subjects.join(',');errorDiv.style.display='none';}
                else hiddenInput.value='';
            } else if(mode==='mode33'){
                const sel=document.querySelectorAll('[data-type="mode33"].selected');
                if(sel.length===3){sel.forEach(t=>subjects.push(t.dataset.value));hiddenInput.value=subjects.join(',');errorDiv.style.display='none';}
                else hiddenInput.value='';
            }
        }
        function validateSubject(){
            let ok=false;
            if(mode==='mode312'){const req=document.querySelector('[data-type="required"].selected');const opt=document.querySelectorAll('[data-type="optional"].selected');ok=req&&opt.length===2;}
            else if(mode==='mode33'){ok=document.querySelectorAll('[data-type="mode33"].selected').length===3;}
            else{ok=!!document.querySelector('[data-type="traditional"].selected');}
            errorDiv.style.display=ok?'none':'block';
            return ok;
        }
    }

    // ====================================================
    // 表单提交
    // ====================================================
    document.getElementById('recommendationForm').addEventListener('submit', async function(e){
        e.preventDefault();
        if(!isBackendConnected){showToast('请先启动后端服务器！','warning');return;}
        const score=document.getElementById('score').value;
        const subjectCombination=document.getElementById('subjectCombination').value;
        const region=document.getElementById('region').value;
        if(!region){document.getElementById('regionInput').focus();showToast('请选择有效的地区省份！','warning');return;}
        if(!score||!subjectCombination){if(!subjectCombination)document.getElementById('subjectError').style.display='block';showToast('请填写所有必填项！','warning');return;}
        if(score<0||score>750){showToast('分数必须在0-750之间！','warning');return;}

        document.getElementById('loading').style.display='block';
        setTimeout(async ()=>{
            await doQueryAndShowResult(region, score, subjectCombination);
            document.getElementById('loading').style.display='none';
        }, 800);
    });

    async function doQueryAndShowResult(region, score, subjectCombination) {
        // 填写信息栏
        document.getElementById('infoRegion').textContent = region;
        document.getElementById('infoScore').textContent = score;
        document.getElementById('infoSubject').textContent = subjectCombination;


        // 切换到结果视图，先显示加载中
        showResultView();
        document.getElementById('resultBody').innerHTML='';
        document.getElementById('resultLoading').style.display='block';
        document.getElementById('paginationBar').style.display='none';

        try {
            const resp = await fetch(`${API_BASE}/recommend-from-db`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({score:Number(score), subjectCombination, region})
            });
            const result = await resp.json();
            if(!result.success) throw new Error(result.error||'接口返回失败');

            const userScore = parseInt(score) || 0;
            allData = (result.data || []).filter(r => {
                // 只显示专业最低分小于或等于用户分数的专业
                const minScore = r.min_score != null ? parseInt(r.min_score) : null;
                return minScore != null && minScore <= userScore;
            });
            document.getElementById('infoTotal').textContent = new Set(allData.map(r=>r.name)).size;
            document.getElementById('infoMajorTotal').textContent = allData.length;

            document.getElementById('resultLoading').style.display='none';

            if(allData.length===0){
                document.getElementById('resultBody').innerHTML=`<div class="empty-state"><div style="font-size:2rem;margin-bottom:12px;">🔍</div><div>未找到符合条件的推荐数据，请尝试调整分数或选科</div></div>`;
                return;
            }

            // 重置筛选下拉（清空旧数据）
            ['filterProvince','filterCity','filterCategory','filterMajorCategory','filterBatch','filterBatchRemark','filterCollegeLevel','filterSubjectRequire'].forEach(id=>{
                const el=document.getElementById(id);
                el.innerHTML='<option value="">全部</option>';
            });
            document.getElementById('filterSchool').value='';
            document.getElementById('filterMajor').value='';
            sortKey='score'; sortAsc=false;
            currentPage=1; pageSize=10;
            document.getElementById('pageSizeSelect').value='10';
            // 重置排序按钮
            document.querySelectorAll('.sort-btn').forEach(btn=>{btn.classList.remove('active');const a=btn.querySelector('.sort-arrow');if(a)a.textContent='⇅';});
            const sb=document.getElementById('sortBtn_score');if(sb){sb.classList.add('active');const a=sb.querySelector('.sort-arrow');if(a)a.textContent='▼';}

            initFilterOptions();
            filteredData=[...allData];
            document.getElementById('filteredCount').textContent=filteredData.length;
            sortAndRender();

        } catch(err) {
            document.getElementById('resultLoading').style.display='none';
            document.getElementById('resultBody').innerHTML=`<div class="empty-state"><div style="font-size:2rem;margin-bottom:12px;">❌</div><div>查询失败：${err.message}<br><small>请确认后端服务已启动（http://localhost:3000）</small></div></div>`;
        }
    }

    function showToast(message, type='info') {
        const toastEl=document.getElementById('liveToast');
        const msgEl=document.getElementById('toastMessage');
        const titleEl=document.getElementById('toastTitle');
        const types={success:{header:'✅ 成功',cls:'text-success',border:'rgba(16,185,129,0.4)'},error:{header:'❌ 错误',cls:'text-danger',border:'rgba(239,68,68,0.4)'},warning:{header:'⚠️ 警告',cls:'text-warning',border:'rgba(245,158,11,0.4)'},info:{header:'ℹ️ 提示',cls:'text-info',border:'rgba(59,159,232,0.4)'}};
        const s=types[type]||types.info;
        titleEl.textContent=s.header; msgEl.className=`toast-body ${s.cls}`; msgEl.textContent=message; toastEl.style.borderColor=s.border;
        new bootstrap.Toast(toastEl).show();
    }

    // ====================================================
    // 结果页：数据、筛选、排序、渲染
    // ====================================================
    let allData=[], filteredData=[];
    let sortKey='score', sortAsc=false;
    let currentPage=1, pageSize=3, totalPages=1;

    function initFilterOptions() {
        const pSel=document.getElementById('filterProvince');
        const cSel=document.getElementById('filterCity');
        const catSel=document.getElementById('filterCategory');
        const mcSel=document.getElementById('filterMajorCategory');

        const brSel=document.getElementById('filterBatchRemark');
        const lvSel=document.getElementById('filterCollegeLevel');
        const sSel=document.getElementById('filterSubjectRequire');

        pSel.innerHTML='<option value="">全部</option>';
        cSel.innerHTML='<option value="">全部</option>';
        catSel.innerHTML='<option value="">全部</option>';
        mcSel.innerHTML='<option value="">全部</option>';
        bSel.innerHTML='<option value="">全部</option>';
        brSel.innerHTML='<option value="">全部</option>';
        lvSel.innerHTML='<option value="">全部</option>';
        sSel.innerHTML='<option value="">全部</option>';

        [...new Set(allData.map(r=>r.province).filter(Boolean))].sort().forEach(p=>{const o=document.createElement('option');o.value=p;o.textContent=p;pSel.appendChild(o);});
        [...new Set(allData.map(r=>r.college_city).filter(Boolean))].sort().forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cSel.appendChild(o);});
        [...new Set(allData.map(r=>r.category).filter(Boolean))].sort().forEach(cat=>{const o=document.createElement('option');o.value=cat;o.textContent=cat;catSel.appendChild(o);});
        [...new Set(allData.map(r=>r.major_category).filter(Boolean))].sort().forEach(mc=>{const o=document.createElement('option');o.value=mc;o.textContent=mc;mcSel.appendChild(o);});
        [...new Set(allData.map(r=>r.batch).filter(Boolean))].sort().forEach(b=>{const o=document.createElement('option');o.value=b;o.textContent=b;bSel.appendChild(o);});
        [...new Set(allData.map(r=>r.batch_remark).filter(Boolean))].sort().forEach(br=>{const o=document.createElement('option');o.value=br;o.textContent=br;brSel.appendChild(o);});
        [...new Set(allData.map(r=>r.college_level).filter(Boolean))].sort().forEach(lv=>{const o=document.createElement('option');o.value=lv;o.textContent=lv;lvSel.appendChild(o);});
        [...new Set(allData.map(r=>r.subject_require).filter(Boolean))].sort().forEach(s=>{const o=document.createElement('option');o.value=s;o.textContent=s;sSel.appendChild(o);});
    }

    // 联动筛选：更新其他下拉框选项
    function updateFilterOptions(excludeField) {
        const fieldMap = {
            province: 'filterProvince',
            college_city: 'filterCity',
            category: 'filterCategory',
            major_category: 'filterMajorCategory',
            batch: 'filterBatch',
            batch_remark: 'filterBatchRemark',
            college_level: 'filterCollegeLevel',
            subject_require: 'filterSubjectRequire'
        };

        for (const [field, selectId] of Object.entries(fieldMap)) {
            if (field === excludeField) continue;
            const sel = document.getElementById(selectId);
            const currentVal = sel.value;
            const options = [...new Set(filteredData.map(r => r[field]).filter(Boolean))].sort();
            sel.innerHTML = '<option value="">全部</option>';
            options.forEach(opt => {
                const o = document.createElement('option');
                o.value = opt;
                o.textContent = opt;
                sel.appendChild(o);
            });
            if (currentVal && options.includes(currentVal)) {
                sel.value = currentVal;
            }
        }
    }

    function resetFilter(){
        document.getElementById('filterSchool').value='';
        document.getElementById('filterMajor').value='';
        document.getElementById('filterProvince').value='';
        document.getElementById('filterCity').value='';
        document.getElementById('filterCategory').value='';
        document.getElementById('filterMajorCategory').value='';
        document.getElementById('filterBatch').value='';
        document.getElementById('filterBatchRemark').value='';
        document.getElementById('filterCollegeLevel').value='';
        document.getElementById('filterSubjectRequire').value='';
        initFilterOptions();
        applyFilter();
    }
    function applyFilter(excludeField){
        const school=document.getElementById('filterSchool').value.trim().toLowerCase();
        const major=document.getElementById('filterMajor').value.trim().toLowerCase();
        const province=document.getElementById('filterProvince').value;
        const city=document.getElementById('filterCity').value;
        const category=document.getElementById('filterCategory').value;
        const majorCategory=document.getElementById('filterMajorCategory').value;
        const batch=document.getElementById('filterBatch').value;
        const batchRemark=document.getElementById('filterBatchRemark').value;
        const cl=document.getElementById('filterCollegeLevel').value;
        const subj=document.getElementById('filterSubjectRequire').value;
        filteredData=allData.filter(r=>{
            if(school&&!(r.name||'').toLowerCase().includes(school))return false;
            if(major&&!(r.major||'').toLowerCase().includes(major))return false;
            if(province&&r.province!==province)return false;
            if(city&&r.college_city!==city)return false;
            if(category&&r.category!==category)return false;
            if(majorCategory&&r.major_category!==majorCategory)return false;
            if(batch&&r.batch!==batch)return false;
            if(batchRemark&&r.batch_remark!==batchRemark)return false;
            if(cl&&r.college_level!==cl)return false;
            if(subj&&r.subject_require!==subj)return false;
            return true;
        });
        document.getElementById('filteredCount').textContent=filteredData.length;
        currentPage=1;sortAndRender();

        // 联动更新其他下拉框选项
        if (excludeField) {
            updateFilterOptions(excludeField);
        }
    }

    // 各下拉框联动筛选触发函数
    function onFilterChange(field) {
        applyFilter(field);
    }

    function changePageSize(){pageSize=parseInt(document.getElementById('pageSizeSelect').value);currentPage=1;sortAndRender();}
    function goPage(p){if(p<1||p>totalPages)return;currentPage=p;sortAndRender();}

    function sortTable(key){
        if(sortKey===key){sortAsc=!sortAsc;}else{sortKey=key;sortAsc=(key==='name'||key==='major');}
        document.querySelectorAll('.sort-btn').forEach(btn=>{btn.classList.remove('active');const a=btn.querySelector('.sort-arrow');if(a)a.textContent='⇅';});
        const ab=document.getElementById('sortBtn_'+key);if(ab){ab.classList.add('active');const a=ab.querySelector('.sort-arrow');if(a)a.textContent=sortAsc?'▲':'▼';}
        currentPage=1;sortAndRender();
    }
    function sortAndRender(){
        const sorted=[...filteredData].sort((a,b)=>{
            let va=a[sortKey],vb=b[sortKey];
            if(va==null)va='';if(vb==null)vb='';
            if(typeof va==='number'||!isNaN(Number(va))){va=Number(va)||0;vb=Number(vb)||0;return sortAsc?va-vb:vb-va;}
            if(sortKey==='probability'){va=parseFloat(String(va))||0;vb=parseFloat(String(vb))||0;return sortAsc?va-vb:vb-va;}
            va=String(va);vb=String(vb);return sortAsc?va.localeCompare(vb,'zh'):vb.localeCompare(va,'zh');
        });
        renderTable(sorted);
    }

    function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

    function renderTable(data){
        const container=document.getElementById('resultBody');
        if(!data.length){
            container.innerHTML=`<div class="empty-state"><div style="font-size:2rem;margin-bottom:12px;">🔍</div><div>没有符合筛选条件的数据</div></div>`;
            document.getElementById('paginationBar').style.display='none';return;
        }
        const schoolMap=new Map();
        data.forEach(row=>{const key=(row.school_code||'')+'|'+(row.name||'');if(!schoolMap.has(key))schoolMap.set(key,[]);schoolMap.get(key).push(row);});

        function getLvPrio(lv){if(!lv)return 99;if(lv==='985'||lv.includes('985'))return 1;if(lv==='211'||lv.includes('211'))return 2;if(lv.includes('双一流')||lv.includes('一流'))return 3;if(lv.includes('公办'))return 4;if(lv.includes('民办'))return 5;return 99;}
        const groups=[...schoolMap.values()].sort((ga,gb)=>getLvPrio(ga[0].college_level||'')-getLvPrio(gb[0].college_level||''));

        const ps=pageSize===0?groups.length:pageSize;
        totalPages=pageSize===0?1:Math.ceil(groups.length/ps);
        if(currentPage>totalPages)currentPage=Math.max(1,totalPages);
        const start=(currentPage-1)*ps;
        const pageGroups=groups.slice(start,start+ps);

        let html='';
        pageGroups.forEach(majors=>{
            const school=majors[0];
            const lv=school.college_level||'';
            let lvClass='';
            if(lv.includes('985'))lvClass='level-985';
            else if(lv.includes('双一流')||lv.includes('一流'))lvClass='level-syl';
            else if(lv.includes('211'))lvClass='level-211';
            const lvTag=lv?`<span class="college-level-tag ${lvClass}">${escHtml(lv)}</span>`:'';

            // 检测是否为移动端
            const isMobileHeader = window.innerWidth <= 768;

            // 获取该院校所有符合条件的专业名称（在一行内逐个显示，自动换行）
            const displayMajors = majors.slice(0, 8);
            const moreCount = majors.length > 8 ? `+${majors.length - 8}` : '';
            const majorNamesHtml = displayMajors.map(m => `<span class="major-tag" style="display:inline-block;background:rgba(0,212,255,0.15);color:var(--accent-cyan);padding:2px 8px;border-radius:4px;font-size:0.8rem;margin-right:6px;margin-bottom:2px;border:1px solid rgba(0,212,255,0.3);white-space:nowrap;vertical-align:middle;">${escHtml(m.major || '-')}</span>`).join('');
            const moreTag = moreCount ? `<span class="major-tag more-tag" style="display:inline-block;background:rgba(100,100,100,0.3);color:var(--text-secondary);padding:2px 8px;border-radius:4px;font-size:0.8rem;margin-right:6px;margin-bottom:2px;border:1px solid rgba(100,100,100,0.5);white-space:nowrap;vertical-align:middle;">${moreCount}</span>` : '';
            const majorsText = `<span class="school-majors-text" style="margin-left:6px;flex:1;min-width:0;">${majorNamesHtml}${moreTag}</span>`;

            html+=`
            <div class="school-card collapsed">
                <div class="school-header" onclick="this.closest('.school-card').classList.toggle('collapsed')">
                    <div class="school-header-left">
                        <div class="school-name-row">
                            <div class="school-name-wrapper">
                                ${lvTag}
                                <a class="school-link" onclick="event.stopPropagation();window.open('school-detail.html?schoolName=${encodeURIComponent(school.name)}','_blank')" href="#">${escHtml(school.name||'-')}</a>
                            </div>
                            ${!isMobileHeader ? majorsText : ''}
                            ${isMobileHeader ? `<span class="school-major-count">共 <strong>${majors.length}</strong> 个专业</span>` : ''}
                        </div>
                    </div>
                    ${!isMobileHeader ? `<span class="school-major-count desktop-only">共 <strong>${majors.length}</strong> 个专业</span>` : ''}
                </div>
                <div class="major-body" data-school-key="${escHtml((school.school_code||'')+'|'+(school.name||''))}">`;

            // 获取专业组信息（用于显示组按钮）
            const groupMap=new Map();
            majors.forEach(row=>{const gk=row.major_group_code!=null?String(row.major_group_code):'__nogroup__';if(!groupMap.has(gk))groupMap.set(gk,[]);groupMap.get(gk).push(row);});
            const groupKeys=[...groupMap.keys()].sort((a,b)=>{if(a==='__nogroup__')return 1;if(b==='__nogroup__')return -1;return Number(a)-Number(b);});
            const hasGroups=groupKeys.length>1||(groupKeys.length===1&&groupKeys[0]!=='__nogroup__');

            // 显示专业组按钮（可点击筛选）
            if(hasGroups){
                html+=`<div class="group-buttons" style="display:flex;flex-wrap:wrap;gap:8px;padding:12px 20px;background:rgba(10,25,70,0.3);border-bottom:1px solid rgba(59,159,232,0.12);">`;
                groupKeys.forEach((gk, idx)=>{
                    const label=gk==='__nogroup__'?'未分组':`第 ${gk} 组`;
                    const groupMajors = groupMap.get(gk);
                    const cnt = groupMajors.length;

                    // 计算专业组统计信息（使用实际数据）
                    const groupMinScore = groupMajors.reduce((min, r) => {
                        const score = r.min_score || r.min_score_1;
                        return score != null && (min === null || score < min) ? score : min;
                    }, null);
                    const groupMinRank = groupMajors.reduce((min, r) => {
                        const rank = r.rank || r.min_rank || r.min_rank_1;
                        return rank != null && (min === null || rank < min) ? rank : min;
                    }, null);

                    const stats = [];
                    stats.push(`${cnt}个专业`);
                    if(groupMinScore!=null) stats.push(`最低${groupMinScore}分`);
                    if(groupMinRank!=null) stats.push(`位次${Number(groupMinRank).toLocaleString()}`);
                    const statsText = stats.join(' · ');

                    html+=`<button class="group-btn${idx===0?' active':''}" onclick="showGroupModal('${escHtml(school.school_code||'')}', '${escHtml(school.name||'')}', '${escHtml(gk)}', '${escHtml(label)}')" data-group="${escHtml(gk)}" style="display:inline-flex;align-items:center;gap:6px;background:rgba(59,159,232,0.15);border:1px solid rgba(59,159,232,0.3);border-radius:6px;padding:4px 10px;font-size:0.8rem;color:var(--accent-cyan);min-width:180px;cursor:pointer;transition:all 0.2s;"><span style="font-weight:600;min-width:60px;">${escHtml(label)}</span><span style="color:var(--text-secondary);font-size:0.75rem;">${statsText}</span></button>`;
                });
                html+=`</div>`;
            }

            // 直接显示所有符合条件的专业（不按组分开）
            const isMobile = window.innerWidth <= 768;
            if (isMobile) {
                html+=`<div class="major-list-header"><span>专业名称</span><span>编号</span><span>最低分</span><span>概率</span></div>`;
            } else {
                html+=`<div class="major-list-header"><span>专业名称</span><span>专业编号</span><span>专业门类</span><span>最低分</span><span>最低位次</span><span>选科要求</span><span>招生计划</span><span>录取概率</span></div>`;
            }
            const isMobileView = window.innerWidth <= 768;
            majors.forEach(row=>{
                const sc=row.subject_require==='不限'?'unlimited':'';
                const pc=row.adjustedType==='冲'?'rush':(row.adjustedType==='保'?'safe':'stable');
                // 限制备注最多显示10个字
                let remarkText = row.major_remark || '';
                const displayRemark = remarkText.length > 10 ? remarkText.substring(0, 10) + '...' : remarkText;
                const remark=remarkText?`<span class="major-remark-text" title="${escHtml(remarkText)}">${escHtml(displayRemark)}</span>`:'';
                const gk = row.major_group_code != null ? String(row.major_group_code) : '__nogroup__';
                
                if (isMobileView) {
                    // 移动端只显示4列：专业名称、专业编号、最低分、录取概率
                    html+=`
                    <div class="major-row" data-group-code="${escHtml(gk)}">
                        <div class="major-row-left">
                            <span class="major-name-result" data-major="${(row.major||'').replace(/"/g,'&quot;')}">${escHtml(row.major||'-')}</span>
                            ${remark}
                        </div>
                        <div class="major-row-cell"><span style="color:var(--text-secondary);font-size:0.78rem;">${escHtml(row.major_code||'-')}</span></div>
                        <div class="major-row-cell"><span style="color:var(--accent-cyan);font-size:0.78rem;font-weight:600;">${row.min_score!=null?row.min_score:'-'}</span></div>
                        <div class="major-row-cell"><span style="font-size:0.78rem;">${escHtml(row.probability||'-')}</span></div>
                    </div>`;
                } else {
                    // 桌面端显示全部列
                    html+=`
                    <div class="major-row" data-group-code="${escHtml(gk)}">
                        <div class="major-row-left">
                            <span class="major-name-result" data-major="${(row.major||'').replace(/"/g,'&quot;')}">${escHtml(row.major||'-')}</span>
                            ${remark}
                        </div>
                        <div class="major-row-cell"><span style="color:var(--text-secondary);font-size:0.78rem;">${escHtml(row.major_code||'-')}</span></div>
                        <div class="major-row-cell"><span class="major-category-text">${escHtml(row.major_category||'-')}</span></div>
                        <div class="major-row-cell"><span class="score-val">${row.min_score!=null?row.min_score:'-'}</span></div>
                        <div class="major-row-cell"><span class="rank-val">${row.rank!=null?Number(row.rank).toLocaleString():'-'}</span></div>
                        <div class="major-row-cell"><span class="subject-badge ${sc}">${escHtml(row.subject_require||'-')}</span></div>
                        <div class="major-row-cell"><span style="color:var(--text-secondary);font-size:0.85rem;">${row.admit_count!=null?row.admit_count+'人':'-'}</span></div>
                        <div class="major-row-cell"><span class="prob-badge ${pc}">${escHtml(row.probability||'-')}</span></div>
                    </div>`;
                }
            });
            html+=`</div></div>`;
        });

        container.innerHTML=html;

        const pBar=document.getElementById('paginationBar');
        if(totalPages>1||pageSize===0){
            pBar.style.display='flex';
            document.getElementById('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页`;
            document.getElementById('btnFirst').disabled=currentPage===1;
            document.getElementById('btnPrev').disabled=currentPage===1;
            document.getElementById('btnNext').disabled=currentPage===totalPages;
            document.getElementById('btnLast').disabled=currentPage===totalPages;
        } else {pBar.style.display='none';}
    }

    function filterByGroup(btnEl, groupCode){
        // 切换按钮激活状态
        const buttons = btnEl.parentElement.querySelectorAll('.group-btn');
        buttons.forEach(b => {
            b.classList.remove('active');
            b.style.background = 'rgba(59,159,232,0.15)';
            b.style.borderColor = 'rgba(59,159,232,0.3)';
        });
        btnEl.classList.add('active');
        btnEl.style.background = 'rgba(59,159,232,0.35)';
        btnEl.style.borderColor = 'rgba(59,159,232,0.6)';
        
        // 筛选专业列表
        const majorBody = btnEl.closest('.major-body');
        const allRows = majorBody.querySelectorAll('.major-row');
        allRows.forEach(row => {
            const rowGroupCode = row.getAttribute('data-group-code');
            if (groupCode === '__all__' || rowGroupCode === groupCode) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    }

    function switchGroupTab(tabEl){
        const majorBody=tabEl.closest('.group-tabs').parentElement;
        const panels=majorBody.querySelectorAll('.group-panel');
        const tabs=tabEl.closest('.group-tabs').querySelectorAll('.group-tab');
        const idx=[...tabs].indexOf(tabEl);
        tabs.forEach(t=>{
            t.classList.remove('active');
            // 电脑端：隐藏统计信息
            const statsDiv = t.querySelector('.tab-stats');
            if(statsDiv) statsDiv.style.display = 'none';
        });
        panels.forEach(p=>p.classList.remove('active'));
        tabEl.classList.add('active');
        if(panels[idx])panels[idx].classList.add('active');
        
        // 电脑端：显示选中选项卡的统计信息
        const isMobile = window.innerWidth <= 768;
        if(!isMobile){
            const statsDiv = tabEl.querySelector('.tab-stats');
            if(statsDiv) statsDiv.style.display = 'block';
        }
    }

    // ====================================================
    // 专业介绍 Tooltip（结果页）
    // ====================================================
    const tooltip=document.getElementById('majorTooltip');
    const ttTitle=document.getElementById('ttTitle');
    const ttBody=document.getElementById('ttBody');
    const majorCache={};
    let hideTimer=null, pendingMajor='';

    function showTooltipMajor(e, majorName){
        clearTimeout(hideTimer);pendingMajor=majorName;
        ttTitle.textContent=majorName;positionTooltip(e);tooltip.classList.add('visible');
        if(majorCache[majorName]!==undefined){renderTooltipContent(majorCache[majorName]);return;}
        ttBody.innerHTML='<div class="tooltip-loading">加载中…</div>';
        fetch(`${API_BASE}/major-info?major_name=${encodeURIComponent(majorName)}`)
            .then(r=>r.json())
            .then(res=>{
                if(res.success&&res.data)majorCache[majorName]=res.data;
                if(pendingMajor===majorName){renderTooltipContent(res.success?res.data:null);tooltip.classList.add('visible');}
            })
            .catch(err=>{if(pendingMajor===majorName)ttBody.innerHTML=`<div class="tooltip-none">加载失败</div>`;});
    }
    function renderTooltipContent(data){
        if(!data){ttBody.innerHTML='<div class="tooltip-none">暂无专业介绍</div>';return;}
        let h='';
        if(data.introduction)h+=`<div class="tooltip-section"><div class="tooltip-section-label">专业介绍</div><div class="tooltip-section-body">${escHtml(data.introduction)}</div></div>`;
        if(data.career_path)h+=`<div class="tooltip-section"><div class="tooltip-section-label">就业方向</div><div class="tooltip-section-body">${escHtml(data.career_path)}</div></div>`;
        if(data.courses)h+=`<div class="tooltip-section"><div class="tooltip-section-label">主要课程</div><div class="tooltip-section-body">${escHtml(data.courses)}</div></div>`;
        if(!h)h='<div class="tooltip-none">暂无专业介绍</div>';
        ttBody.innerHTML=h;
    }
    function positionTooltip(e){
        const tw=320,th=200,m=12;
        let x=e.clientX+m,y=e.clientY+m;
        if(x+tw>window.innerWidth)x=e.clientX-tw-m;
        if(y+th>window.innerHeight)y=e.clientY-th-m;
        tooltip.style.left=x+'px';tooltip.style.top=y+'px';
    }
    function hideTooltip(){hideTimer=setTimeout(()=>tooltip.classList.remove('visible'),300);}
    tooltip.addEventListener('mouseenter',()=>clearTimeout(hideTimer));
    tooltip.addEventListener('mouseleave',()=>hideTooltip());
    document.addEventListener('mouseover',e=>{const el=e.target.closest('.major-name-result');if(el)showTooltipMajor(e,el.dataset.major||el.textContent.trim());});
    document.addEventListener('mousemove',e=>{if(tooltip.classList.contains('visible'))positionTooltip(e);});
    document.addEventListener('mouseout',e=>{if(e.target.closest('.major-name-result'))hideTooltip();});

    // 显示专业组模态框
    async function showGroupModal(schoolCode, schoolName, groupCode, groupLabel) {
        const modal = document.getElementById('groupModal');
        const title = document.getElementById('groupModalTitle');
        const body = document.getElementById('groupModalBody');
        
        title.textContent = `${schoolName} - ${groupLabel}`;
        body.innerHTML = '<div style="text-align:center;padding:40px;">加载中...</div>';
        modal.style.display = 'flex';
        
        try {
            const region = document.getElementById('region').value || '河南';
            const resp = await fetch(`${API_BASE}/school-group-majors?schoolCode=${encodeURIComponent(schoolCode)}&groupCode=${encodeURIComponent(groupCode)}&region=${encodeURIComponent(region)}`);
            const result = await resp.json();
            
            if (!result.success) {
                body.innerHTML = `<div style="text-align:center;padding:40px;color:#f87171;">加载失败：${result.error || '未知错误'}</div>`;
                return;
            }
            
            const majors = result.data || [];
            if (majors.length === 0) {
                body.innerHTML = '<div style="text-align:center;padding:40px;">暂无数据</div>';
                return;
            }
            
            // 计算专业组的统计信息
            const totalMajors = majors.length;
            const minScore = majors.reduce((min, r) => r.min_score != null && (min === null || r.min_score < min) ? r.min_score : min, null);
            const minRank = majors.reduce((min, r) => r.rank != null && (min === null || r.rank < min) ? r.rank : min, null);
            
            // 构建统计信息文本
            const stats = [];
            stats.push(`共 ${totalMajors} 个专业`);
            if (minScore != null) stats.push(`组最低分 ${minScore}`);
            if (minRank != null) stats.push(`最低位次 ${Number(minRank).toLocaleString()}`);
            
            // 更新标题
            title.innerHTML = `${schoolName} - ${groupLabel} <span style="font-size:0.85rem;color:var(--text-secondary);font-weight:400;margin-left:12px;">${stats.join(' · ')}</span>`;
            
            // 渲染专业列表
            let html = '<div class="modal-major-list">';
            html += '<div class="modal-major-header"><span>专业名称</span><span>专业编号</span><span>专业门类</span><span>最低分</span><span>最低位次</span><span>选科要求</span><span>招生计划</span></div>';
            
            majors.forEach(row => {
                const sc = row.subject_require === '不限' ? 'unlimited' : '';
                html += `
                <div class="modal-major-row">
                    <div class="modal-major-name">${escHtml(row.major || '-')}</div>
                    <div class="modal-major-cell">${escHtml(row.major_code || '-')}</div>
                    <div class="modal-major-cell">${escHtml(row.major_category || '-')}</div>
                    <div class="modal-major-cell"><span class="score-val">${row.min_score != null ? row.min_score : '-'}</span></div>
                    <div class="modal-major-cell">${row.rank != null ? Number(row.rank).toLocaleString() : '-'}</div>
                    <div class="modal-major-cell"><span class="subject-badge ${sc}">${escHtml(row.subject_require || '-')}</span></div>
                    <div class="modal-major-cell">${row.admit_count != null ? row.admit_count + '人' : '-'}</div>
                </div>`;
            });
            
            html += '</div>';
            body.innerHTML = html;
        } catch (err) {
            body.innerHTML = `<div style="text-align:center;padding:40px;color:#f87171;">加载失败：${err.message}</div>`;
        }
    }
    
    // 关闭模态框
    function closeGroupModal() {
        document.getElementById('groupModal').style.display = 'none';
    }
    
    // 点击模态框背景关闭
    document.getElementById('groupModal').addEventListener('click', function(e) {
        if (e.target === this) closeGroupModal();
    });
    </script>
</body>
</html>
