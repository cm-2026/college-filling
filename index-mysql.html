<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权鼎教育-升学规划师系统</title>
    <!-- 预连接CDN -->
    <link rel="preconnect" href="https://cdn.bootcdn.net">
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/index-mysql.css" rel="stylesheet">
    <link href="css/global-enhancements.css" rel="stylesheet">
    <link rel="stylesheet" href="css/index-mysql-mobile.css" media="(max-width: 767.98px)">
    <script>
        (function() {
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
            // 显示当前用户名
            var userName = localStorage.getItem('qd_username') || '用户';
            document.addEventListener('DOMContentLoaded', function() {
                var userNameElement = document.getElementById('currentUserName');
                var mobileUserNameElement = document.getElementById('mobileCurrentUserName');
                if (userNameElement) {
                    userNameElement.textContent = userName;
                }
                if (mobileUserNameElement) {
                    mobileUserNameElement.textContent = userName;
                }
            });
        })();
    </script>
</head>
<body>

    <!-- ====== 表单视图 ====== -->
    <div id="viewForm" class="form-view-wrap">
        <div class="container">
            <div class="main-container">
<!-- 标题栏：Logo -->
        <div class="form-header-bar">
            <div class="header-buttons">
                <a href="#" class="btn-header">引流获客</a>
                <a href="chat.html" class="btn-header" target="_blank">智能咨询</a>
                <a href="college-list.html" class="btn-header" target="_blank">院校名录</a>
                <a href="major-list.html" class="btn-header" target="_blank">专业名录</a>
                <div class="user-dropdown">
                    <button class="btn-header user-header-btn" onclick="toggleUserDropdown(event)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="header-icon">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                        <span id="currentUserName" class="user-name"></span>
                        <svg class="dropdown-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                    <div class="user-dropdown-menu" id="userDropdownMenu">
                        <div class="user-dropdown-item" onclick="logout()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                            <span>退出登录</span>
                        </div>
                    </div>
                </div>
            </div>
            <img src="images/权鼎教育.png" alt="权鼎教育" class="form-header-logo-small">
        </div>

                <div class="section-card">
                    <form id="recommendationForm">
                        <!-- 地区选择 -->
                        <div class="mb-3">
                            <label class="form-label">地区选择 *</label>
                            <div class="region-combobox" id="regionCombobox">
                                <input type="text" class="form-control" id="regionInput" placeholder="输入或选择省份…" autocomplete="off" value="河南">
                                <input type="hidden" id="region" value="河南">
                                <div class="region-dropdown" id="regionDropdown"></div>
                            </div>
                        </div>
                        
                        <!-- 高考分数/位次 -->
                        <div class="mb-3">
                            <div class="score-toggle-wrapper mb-2">
                                <button type="button" class="toggle-btn active" data-mode="score" onclick="toggleScoreMode('score')">分数</button>
                                <button type="button" class="toggle-btn" data-mode="rank" onclick="toggleScoreMode('rank')">位次</button>
                            </div>
                            <input type="number" class="form-control" id="score" placeholder="请输入高考分数" min="0" required>
                            <input type="hidden" id="scoreMode" value="score">
                        </div>
                        
                        <!-- 第二行：选科组合 -->
                        <div class="row">
                            <div class="col-md-12 mb-3">

                                <div id="subjectSelection">
                                    <input type="hidden" id="subjectCombination" required>


                                    <div class="mb-3">
                                        <label class="form-label">必选科目（物理/历史二选一，100分）</label>
                                        <div class="subject-tags">
                                            <div class="subject-tag" data-type="required" data-value="物理">物理</div>
                                            <div class="subject-tag" data-type="required" data-value="历史">历史</div>
                                        </div>
                                    </div>
                                    <div>
                                        <label class="form-label">再选科目（政治、地理、化学、生物中选2门，各100分）</label>
                                        <div class="subject-tags">
                                            <div class="subject-tag" data-type="optional" data-value="化学">化学</div>
                                            <div class="subject-tag" data-type="optional" data-value="生物">生物</div>
                                            <div class="subject-tag" data-type="optional" data-value="政治">政治</div>
                                            <div class="subject-tag" data-type="optional" data-value="地理">地理</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 按钮行 -->
                        <div class="form-btn-row" style="margin-top:5px;">
                            <button type="submit" class="btn btn-primary" style="flex:1;">开始查询</button>
                            <button type="button" class="btn btn-warning" style="flex:1;" onclick="resetForm()">重置</button>
                        </div>
                        <!-- 手机端导航按钮 -->
                        <div class="mobile-nav-row">
                            <a href="#" class="btn btn-mobile-nav">引流获客</a>
                            <a href="chat.html" class="btn btn-mobile-nav" target="_blank">智能咨询</a>
                            <a href="college-list.html" class="btn btn-mobile-nav" target="_blank">院校名录</a>
                            <a href="major-list.html" class="btn btn-mobile-nav" target="_blank">专业名录</a>
                        </div>
                    </form>
                </div>

                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner-border" role="status"><span class="visually-hidden">加载中...</span></div>
                    <h4 class="mt-3">正在为您智能推荐合适的院校...</h4>
                </div>
            </div>
        </div>
    </div>

    <!-- ====== 结果视图 ====== -->
    <div id="viewResult" class="result-view-wrap">

        <!-- 顶部固定栏（包含信息栏和分页） -->
        <div class="top-bar-container" id="topBarContainer">
            <!-- 第一行：Logo + 基本信息 + 统计 -->
            <div class="top-bar" id="topBar">
                <div class="top-bar-inner">
                    <!-- 左侧：Logo + 基本信息 -->
                    <div class="left-section">
                        <div class="logo-section">
                            <div class="logo-large">
                                <img src="images/权鼎教育.png" alt="权鼎教育">
                            </div>
                        </div>
                        <div class="basic-info">
                            <div class="info-item">
                                <span class="info-label">生源地</span>
                                <span class="info-value" id="infoRegion">-</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">分数</span>
                                <span class="info-value highlight" id="infoScore">-</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">位次</span>
                                <span class="info-value highlight" id="infoRank">-</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">选科</span>
                                <span class="info-value" id="infoSubject">-</span>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 右侧：统计 -->
                    <div class="stats-section">
                        <span class="stat-item"><strong id="infoTotal">0</strong> 所院校</span>
                        <span class="stat-item"><strong id="infoMajorTotal">0</strong> 个专业</span>
                    </div>
                </div>
            </div>
            
            <!-- 第二行：返回 + 筛选条件 + 分页 + 筛选按钮 -->
            <div class="toolbar-bar" id="toolbarBar">
                <div class="toolbar-inner">
                    <!-- 返回 -->
                    <button class="back-btn" onclick="showFormView()">← 返回</button>
                    <!-- 排序切换按钮组 -->
                    <div class="sort-toggle-group" role="tablist" aria-label="排序方式">
                        <button class="sort-toggle-btn active" id="sortMajorFirst" onclick="setSortMode('major')" role="tab" aria-selected="true">
                            <svg class="sort-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M9 11l3 3L22 4M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
                            </svg>
                            <span>专业优先</span>
                        </button>
                        <button class="sort-toggle-btn" id="sortCollegeFirst" onclick="setSortMode('college')" role="tab" aria-selected="false">
                            <svg class="sort-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 14l9-5-9-5-9 5 9 5z"/>
                                <path d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14z"/>
                            </svg>
                            <span>院校优先</span>
                        </button>
                    </div>
                    
                    <!-- 筛选条件显示 -->
                    <div class="filter-display" id="filterDisplay">
                        <span class="filter-display-item" id="displayProvince" style="display:none;">
                            <span class="filter-display-label">省份</span>
                            <span class="filter-display-value" id="displayProvinceValue">-</span>
                        </span>
                        <span class="filter-display-item" id="displayCity" style="display:none;">
                            <span class="filter-display-label">城市</span>
                            <span class="filter-display-value" id="displayCityValue">-</span>
                        </span>
                        <span class="filter-display-item" id="displayMajorCategory" style="display:none;">
                            <span class="filter-display-label">专业类</span>
                            <span class="filter-display-value" id="displayMajorCategoryValue">-</span>
                        </span>
                        <span class="filter-display-item" id="displayBatchRemark" style="display:none;">
                            <span class="filter-display-label">批次备注</span>
                            <span class="filter-display-value" id="displayBatchRemarkValue">-</span>
                        </span>
                    </div>
                    
                    <!-- 分页 -->
                    <div class="pagination-section">
                        <div class="pagination-inline" id="paginationBar" style="display:none;">
                            <button class="page-btn" id="btnFirst" onclick="goPage(1)">«</button>
                            <button class="page-btn" id="btnPrev" onclick="goPage(currentPage - 1)">‹</button>
                            <span id="pageInfo" class="pagination-info"></span>
                            <button class="page-btn" id="btnNext" onclick="goPage(currentPage + 1)">›</button>
                            <button class="page-btn" id="btnLast" onclick="goPage(totalPages)">»</button>
                        </div>
                    </div>
                    
                    <!-- 筛选按钮 -->
                    <button class="filter-toggle-btn-inline" id="filterToggleBtn" onclick="toggleFilterPanel()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
                        </svg>
                        <span>筛选</span>
                    </button>
                    
                    <!-- 导出按钮（下拉选择） -->
                    <div class="export-dropdown">
                        <button class="export-btn-inline" onclick="toggleExportMenu(event)">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <span>导出</span>
                            <svg class="dropdown-arrow" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="6 9 12 15 18 9"></polyline>
                            </svg>
                        </button>
                        <div class="export-menu" id="exportMenu">
                            <div class="export-menu-item" onclick="exportToExcel('xlsx')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                </svg>
                                <span>导出为 Excel (.xlsx)</span>
                            </div>
                            <div class="export-menu-item" onclick="exportToExcel('csv')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="8" y1="13" x2="16" y2="13"></line>
                                    <line x1="8" y1="17" x2="16" y2="17"></line>
                                </svg>
                                <span>导出为 CSV (.csv)</span>
                            </div>
                            <div class="export-menu-item" onclick="exportToExcel('pdf')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="16" y1="13" x2="8" y2="13"></line>
                                    <line x1="16" y1="17" x2="8" y2="17"></line>
                                    <polyline points="10 9 9 9 8 9"></polyline>
                                </svg>
                                <span>导出为 PDF (.pdf)</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 筛选栏（作为顶部工具栏的折叠部分） -->
            <div class="filter-bar" id="filterBar">
                <div class="filter-bar-inner">
                    <div class="filter-grid">
                        <div class="filter-item"><label>院校名称</label><input type="text" id="filterSchool" placeholder="搜索学校名..." oninput="onFilterChange()"></div>
                        <div class="filter-item"><label>专业名称</label><input type="text" id="filterMajor" placeholder="搜索专业名..." oninput="onFilterChange()"></div>
                         <div class="filter-item"><label>批次 <span class="filter-count" id="countBatch">0</span></label><select id="filterBatch" onchange="onFilterChange('batch')"><option value="">全部</option></select></div>
                        <div class="filter-item"><label>批次备注 <span class="filter-count" id="countBatchRemark">0</span></label><select id="filterBatchRemark" onchange="onFilterChange('batch_remark')"><option value="">全部</option></select></div>
                        <div class="filter-item"><label>选科要求 <span class="filter-count" id="countSubjectRequire">0</span></label><select id="filterSubjectRequire" onchange="onFilterChange('subject_require')"><option value="">全部</option></select></div>
                        <div class="filter-item"><label>省份 <span class="filter-count" id="countProvince">0</span></label><select id="filterProvince" onchange="onFilterChange('province')"><option value="">全部</option></select></div>
                        <div class="filter-item"><label>城市 <span class="filter-count" id="countCity">0</span></label><select id="filterCity" onchange="onFilterChange('college_city')"><option value="">全部</option></select></div>
                        <div class="filter-item"><label>门类 <span class="filter-count" id="countCategory">0</span></label><select id="filterCategory" onchange="onFilterChange('category')"><option value="">全部</option></select></div>
                        <div class="filter-item"><label>专业类 <span class="filter-count" id="countMajorCategory">0</span></label><select id="filterMajorCategory" onchange="onFilterChange('major_category')"><option value="">全部</option></select></div>
                        <div class="filter-item"><label>特色标签 <span class="filter-count" id="countCollegeLevel">0</span></label><select id="filterCollegeLevel" onchange="onFilterChange('feature')"><option value="">全部</option></select></div>
                    </div>
                    <div class="filter-actions">
                        <span class="result-count">筛选结果：<strong id="filteredCount">0</strong> 条</span>
                        <button class="reset-btn" onclick="resetFilter()">重置筛选</button>
                        <button class="confirm-btn" onclick="closeFilterPanel()">确定</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 结果加载提示 -->
        <div id="resultLoading" style="display: none;">
            <div class="spinner-border" role="status"></div>
            <p style="color:var(--text-secondary);margin-top:16px;">正在查询数据，请稍候...</p>
        </div>

        <!-- 卡片列表 -->
        <div class="cards-wrapper" id="resultBody"></div>

        <!-- 专业组模态框 -->
        <div id="groupModal" class="modal-overlay">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="groupModalTitle"></h3>
                    <button class="modal-close-btn" onclick="closeGroupModal()">×</button>
                </div>
                <div id="groupModalBody"></div>
            </div>
        </div>
    </div>

    <!-- 专业介绍 Tooltip -->
    <div id="majorTooltip">
        <div class="tooltip-scroll-wrapper">
            <div class="tooltip-title" id="ttTitle"></div>
            <div id="ttBody"></div>
        </div>
    </div>

    <!-- 院校描述 Tooltip -->
    <div id="schoolTooltip">
        <div class="tooltip-scroll-wrapper">
            <div class="tooltip-title school-tooltip-title" id="schoolTtTitle"></div>
            <div class="school-tooltip-meta" id="schoolTtMeta"></div>
            <div id="schoolTtBody"></div>
        </div>
    </div>

    <!-- 专业详情模态框 -->
    <div id="majorModal" class="modal-overlay">
        <div class="major-modal-content">
            <div class="major-modal-header">
                <h3 id="majorModalTitle"></h3>
                <button class="modal-close-btn" onclick="closeMajorModal()">×</button>
            </div>
            <div class="major-modal-body" id="majorModalBody"></div>
        </div>
    </div>

    <!-- Toast 提示 -->
    <div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
        <div id="liveToast" class="toast" role="alert">
            <div class="toast-header">
                <strong class="me-auto" id="toastTitle">系统提示</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
            </div>
            <div class="toast-body" id="toastMessage"></div>
        </div>
    </div>

    <!-- 修改用户名模态框 -->
    <div id="changeUsernameModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>修改用户名</h3>
                <button class="modal-close-btn" onclick="closeChangeUsernameModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label">新用户名</label>
                    <input type="text" class="form-control" id="newUsername" placeholder="请输入新的用户名">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeChangeUsernameModal()">取消</button>
                    <button class="btn btn-primary" onclick="saveUsername()">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script>window.addEventListener('error',function(e){if(e.message&&(e.message.includes('getBoundingClientRect')||e.message.includes('Script error'))){e.preventDefault();}});</script>
    <script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="js/ui-enhancements.js"></script>
    <script src="js/common.js"></script>
    <script src="js/index-mysql.js"></script>
    <script>
        // 用户下拉菜单切换
        function toggleUserDropdown(event) {
            event.stopPropagation();
            var menu = document.getElementById('userDropdownMenu');
            menu.classList.toggle('show');
            
            // 关闭移动端菜单
            var mobileMenu = document.getElementById('mobileUserDropdownMenu');
            if (mobileMenu) {
                mobileMenu.classList.remove('show');
            }
        }
        
        // 移动端用户下拉菜单切换
        function toggleMobileUserDropdown(event) {
            event.stopPropagation();
            var menu = document.getElementById('mobileUserDropdownMenu');
            menu.classList.toggle('show');
            
            // 关闭桌面端菜单
            var desktopMenu = document.getElementById('userDropdownMenu');
            if (desktopMenu) {
                desktopMenu.classList.remove('show');
            }
        }
        
        // 点击页面其他地方关闭下拉菜单
        document.addEventListener('click', function() {
            var menu = document.getElementById('userDropdownMenu');
            var mobileMenu = document.getElementById('mobileUserDropdownMenu');
            if (menu) menu.classList.remove('show');
            if (mobileMenu) mobileMenu.classList.remove('show');
        });
        
        // 打开修改用户名模态框
        function changeUsername() {
            var modal = document.getElementById('changeUsernameModal');
            modal.classList.add('active');
            
            // 预设当前用户名
            var currentUsername = localStorage.getItem('qd_username') || '';
            document.getElementById('newUsername').value = currentUsername;
            setTimeout(function() {
                document.getElementById('newUsername').focus();
            }, 300);
            
            // 关闭下拉菜单
            document.getElementById('userDropdownMenu').classList.remove('show');
            document.getElementById('mobileUserDropdownMenu').classList.remove('show');
        }
        
        // 关闭修改用户名模态框
        function closeChangeUsernameModal() {
            var modal = document.getElementById('changeUsernameModal');
            modal.classList.remove('active');
        }
        
        // 保存新用户名
        function saveUsername() {
            var newUsername = document.getElementById('newUsername').value.trim();
            if (!newUsername) {
                showToast('请输入用户名', 'warning');
                return;
            }
            
            // 保存到localStorage
            localStorage.setItem('qd_username', newUsername);
            
            // 更新页面显示
            var userNameElement = document.getElementById('currentUserName');
            var mobileUserNameElement = document.getElementById('mobileCurrentUserName');
            if (userNameElement) {
                userNameElement.textContent = newUsername;
            }
            if (mobileUserNameElement) {
                mobileUserNameElement.textContent = newUsername;
            }
            
            showToast('用户名修改成功', 'success');
            closeChangeUsernameModal();
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                // 清除登录信息
                localStorage.removeItem('qd_userId');
                localStorage.removeItem('qd_username');
                // 跳转到登录页
                window.location.href = 'login.html';
            }
        }
        
        // 显示Toast提示
        function showToast(title, type) {
            var toastEl = document.getElementById('liveToast');
            var toastTitle = document.getElementById('toastTitle');
            toastTitle.textContent = title;
            var toast = new bootstrap.Toast(toastEl);
            toast.show();
        }
    </script>
</body>
