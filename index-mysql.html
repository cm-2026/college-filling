<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考志愿智能推荐系统</title>
    <script>
        // 登录验证 - 未登录跳转到登录页
        (function() {
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* ============================================
           简洁大气主题系统 - Minimalist Elegant Theme
           ============================================ */
        :root {
            /* 主色调 - 深邃蓝灰系 */
            --primary-900: #0f172a;
            --primary-800: #1e293b;
            --primary-700: #334155;
            --primary-600: #475569;
            --primary-500: #64748b;
            --primary-400: #94a3b8;
            --primary-300: #cbd5e1;
            --primary-200: #e2e8f0;
            --primary-100: #f1f5f9;
            --primary-50: #f8fafc;
            
            /* 强调色 - 靛蓝 */
            --accent-600: #4f46e5;
            --accent-500: #6366f1;
            --accent-400: #818cf8;
            --accent-50: #eef2ff;
            
            /* 功能色 */
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            
            /* 背景与文字 */
            --bg-primary: #fafafa;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            --text-muted: #64748b;
            
            /* 边框与阴影 */
            --border-light: #e2e8f0;
            --border-medium: #cbd5e1;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            
            /* 间距系统 */
            --space-1: 0.25rem;
            --space-2: 0.5rem;
            --space-3: 0.75rem;
            --space-4: 1rem;
            --space-5: 1.25rem;
            --space-6: 1.5rem;
            --space-8: 2rem;
            --space-10: 2.5rem;
            --space-12: 3rem;
            --space-16: 4rem;
            --space-20: 5rem;
            
            /* 圆角 */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
            --radius-2xl: 24px;
            --radius-full: 9999px;
        }

        * { 
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg-primary);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========== 视图容器 ========== */
        #viewForm   { display: block; }
        #viewResult { display: none; }

        /* ========== 表单视图 - 简洁大气版 ========== */
        .form-view-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: var(--space-8) var(--space-4);
            background: linear-gradient(180deg, var(--bg-secondary) 0%, var(--bg-primary) 100%);
        }

        .main-container {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-2xl);
            box-shadow: var(--shadow-xl);
            margin: 0 auto;
            padding: var(--space-12) var(--space-10);
            max-width: 720px;
            width: 100%;
        }

        .header-title {
            font-weight: 700;
            text-align: center;
            margin-bottom: var(--space-10);
            font-size: 2rem;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }
        
        .header-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-500), var(--accent-400));
            border-radius: var(--radius-full);
            margin: var(--space-4) auto 0;
        }

        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: var(--space-8);
            margin-bottom: var(--space-6);
            transition: all 0.2s ease;
        }
        .section-card:hover {
            border-color: var(--border-medium);
            box-shadow: var(--shadow-md);
        }

        .section-title {
            color: var(--text-primary);
            font-weight: 600;
            font-size: 1.125rem;
            margin-bottom: var(--space-6);
            padding-bottom: var(--space-4);
            border-bottom: 1px solid var(--border-light);
            display: flex; 
            align-items: center; 
            gap: var(--space-3);
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: var(--accent-500);
            border-radius: var(--radius-full);
        }

        .form-label { 
            font-weight: 500; 
            color: var(--text-secondary); 
            margin-bottom: var(--space-2); 
            font-size: 0.875rem; 
        }

        .form-control, .form-select {
            background: var(--bg-card);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-lg);
            height: 48px;
            padding: var(--space-3) var(--space-4);
            font-size: 0.9375rem;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent-500);
            box-shadow: 0 0 0 3px var(--accent-50);
            outline: none;
        }
        .form-control::placeholder { color: var(--text-tertiary); }

        .btn {
            border-radius: var(--radius-lg);
            padding: 0 var(--space-6);
            height: 48px;
            line-height: 48px;
            font-weight: 500;
            transition: all 0.2s ease;
            margin: var(--space-2);
            border: none;
            font-size: 0.9375rem;
            cursor: pointer;
        }
        
        /* 主要按钮 */
        .btn-primary {
            background: var(--accent-600);
            color: white;
            box-shadow: var(--shadow-sm);
        }
        .btn-primary:hover {
            background: var(--accent-500);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        
        /* 次要按钮 */
        .btn-secondary, .btn-warning, .btn-college {
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            border: 1px solid var(--border-medium);
        }
        .btn-secondary:hover, .btn-warning:hover, .btn-college:hover {
            background: var(--primary-200);
            color: var(--text-primary);
            border-color: var(--border-medium);
        }

        .loading {
            display: none;
            text-align: center;
            padding: var(--space-10);
        }
        .spinner-border { 
            width: 3rem; 
            height: 3rem; 
            color: var(--accent-500); 
            border-width: 3px;
        }
        .loading h4 { 
            color: var(--text-secondary); 
            margin-top: var(--space-4); 
            font-weight: 500;
            font-size: 1rem;
        }

        /* 选科标签 - 简洁版 */
        .subject-tags { 
            display: flex; 
            flex-wrap: wrap; 
            gap: var(--space-3); 
            margin-top: var(--space-3); 
        }
        .subject-tag {
            padding: var(--space-2) var(--space-5);
            height: 40px;
            font-size: 0.9375rem;
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-card);
            font-weight: 500;
            user-select: none;
            color: var(--text-secondary);
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .subject-tag:hover { 
            border-color: var(--accent-400); 
            color: var(--accent-600);
            background: var(--accent-50);
        }
        .subject-tag.selected { 
            background: var(--accent-600); 
            color: white; 
            border-color: var(--accent-600); 
            box-shadow: var(--shadow-sm);
        }
        .subject-tag.disabled { 
            opacity: 0.4; 
            cursor: not-allowed; 
            background: var(--bg-tertiary);
        }
        .subject-tag.disabled:hover { 
            border-color: var(--border-medium); 
            color: var(--text-tertiary);
            background: var(--bg-tertiary);
        }

        .form-text { color: var(--text-muted) !important; font-size: 0.8125rem; }
        .invalid-feedback { color: var(--danger); font-weight: 500; font-size: 0.8125rem; }

        /* 地区 Combobox - 简洁版 */
        .region-combobox { position: relative; }
        .region-combobox .form-control { padding-right: 40px; cursor: text; }
        .region-combobox::after { 
            content: '▾'; 
            position: absolute; 
            right: 16px; 
            top: 50%; 
            transform: translateY(-50%); 
            color: var(--text-tertiary); 
            pointer-events: none; 
            font-size: 0.75rem; 
        }
        .region-dropdown {
            display: none; 
            position: absolute;
            top: calc(100% + 4px); 
            left: 0; 
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-lg);
            max-height: 280px; 
            overflow-y: auto;
            z-index: 9999;
            box-shadow: var(--shadow-lg);
        }
        .region-dropdown.open { display: block; }
        .region-dropdown::-webkit-scrollbar { width: 6px; }
        .region-dropdown::-webkit-scrollbar-thumb { 
            background: var(--border-medium); 
            border-radius: var(--radius-full); 
        }
        .region-option { 
            padding: 10px 16px; 
            cursor: pointer; 
            color: var(--text-primary); 
            font-size: 0.9375rem; 
            display: flex; 
            align-items: center; 
            gap: var(--space-2); 
            transition: background 0.15s; 
        }
        .region-option:hover, .region-option.highlighted { 
            background: var(--accent-50); 
        }
        .region-option .mode-tag { 
            font-size: 0.6875rem; 
            padding: 2px 8px; 
            border-radius: var(--radius-full); 
            background: var(--accent-50); 
            color: var(--accent-600); 
            border: 1px solid var(--accent-400); 
            flex-shrink: 0; 
        }
        .region-option .mode-tag.gold { 
            background: #fef3c7; 
            color: #d97706; 
            border-color: #fbbf24; 
        }
        .region-option .mode-tag.gray { 
            background: var(--bg-tertiary); 
            color: var(--text-muted); 
            border-color: var(--border-medium); 
        }
        .region-option .match-highlight { 
            color: var(--accent-600); 
            font-weight: 600; 
        }
        .region-group-label { 
            padding: 8px 16px 4px; 
            font-size: 0.6875rem; 
            color: var(--text-muted); 
            letter-spacing: 0.05em; 
            border-top: 1px solid var(--border-light); 
            margin-top: 2px;
            font-weight: 500;
            text-transform: uppercase;
        }
        .region-group-label:first-child { border-top: none; }
        .region-no-result { 
            padding: var(--space-4); 
            color: var(--text-muted); 
            font-size: 0.875rem; 
            text-align: center; 
        }

        /* Toast - 简洁版 */
        .toast { 
            background: var(--bg-card); 
            border: 1px solid var(--border-light); 
            border-radius: var(--radius-xl); 
            box-shadow: var(--shadow-xl); 
        }
        .toast-header { 
            background: var(--bg-tertiary); 
            border-bottom: 1px solid var(--border-light); 
            color: var(--text-primary); 
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            padding: var(--space-3) var(--space-4);
        }
        .toast-body { 
            background: transparent; 
            color: var(--text-primary); 
            padding: var(--space-4); 
        }
        .text-success { color: var(--success) !important; }
        .text-danger  { color: var(--danger) !important; }
        .text-warning { color: var(--warning) !important; }
        .text-info    { color: var(--info) !important; }
        .text-muted   { color: var(--text-muted) !important; }

        /* alert - 简洁版 */
        .alert { 
            border-radius: var(--radius-lg); 
            border: 1px solid var(--border-light); 
            padding: var(--space-4) var(--space-5);
        }
        .alert-info    { 
            background: var(--accent-50);  
            border-color: var(--accent-400);  
            color: var(--accent-700); 
        }
        .alert-warning { 
            background: #fffbeb; 
            border-color: #fbbf24; 
            color: #92400e; 
        }
        .alert h5 { 
            color: inherit; 
            font-weight: 600; 
            font-size: 0.9375rem;
            margin-bottom: var(--space-2);
        }
        .alert p, .alert ul { 
            color: inherit; 
            opacity: 0.9;
            font-size: 0.875rem;
        }

        /* ========== 结果视图 - 简洁大气版 ========== */
        .result-view-wrap {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 160px 24px 48px;
            min-height: 100vh;
            background: var(--bg-primary);
        }

        /* 返回按钮 - 简洁版 */
        .back-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-medium);
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.875rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-weight: 500;
        }
        .back-btn:hover { 
            background: var(--accent-50); 
            color: var(--accent-600); 
            border-color: var(--accent-400);
        }

        /* 筛选按钮 - 简洁版 */
        .filter-toggle-btn-inline {
            height: 40px;
            padding: 0 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border-radius: var(--radius-md);
            font-weight: 500;
            font-size: 0.875rem;
            background: var(--accent-600);
            border: 1px solid var(--accent-600);
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }
        .filter-toggle-btn-inline:hover {
            background: var(--accent-500);
            border-color: var(--accent-500);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }
        .filter-toggle-btn-inline svg {
            width: 16px;
            height: 16px;
            transition: transform 0.3s ease;
        }
        .filter-toggle-btn-inline.active {
            background: var(--primary-700);
            border-color: var(--primary-700);
        }
        .filter-toggle-btn-inline.active svg {
            transform: rotate(180deg);
        }

        /* 页面标题（结果页） */
        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex; 
            align-items: center; 
            gap: var(--space-2);
            margin-bottom: var(--space-4);
        }
        .page-title span { 
            font-size: 0.875rem; 
            font-weight: 400; 
            color: var(--text-muted); 
        }

        /* 顶部固定容器 - 简洁版 */
        .top-bar-container {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* 第一行：Logo + 基本信息 + 统计 */
        .top-bar {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-light);
            padding: var(--space-3) var(--space-6);
        }
        .top-bar-inner {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: var(--space-8);
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Logo区域 */
        .logo-section {
            flex-shrink: 0;
        }
        .logo-large {
            display: flex;
            align-items: center;
        }
        .logo-large img {
            height: 48px;
            width: auto;
            object-fit: contain;
        }

        /* 基本信息 */
        .basic-info {
            display: flex;
            align-items: center;
            gap: var(--space-6);
            flex: 1;
        }
        .basic-info .info-item {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 2px;
        }
        .basic-info .info-label {
            font-size: 0.6875rem;
            color: var(--text-muted);
            font-weight: 500;
        }
        .basic-info .info-value {
            font-size: 0.9375rem;
            color: var(--text-primary);
            font-weight: 600;
        }
        .basic-info .info-value.highlight {
            color: var(--accent-600);
            font-size: 1.125rem;
            font-weight: 700;
        }

        /* 统计区域 */
        .stats-section {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            flex-shrink: 0;
        }
        .stat-item {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 500;
        }
        .stat-item strong {
            color: var(--accent-600);
            font-size: 1.0625rem;
            font-weight: 700;
        }
        
        /* 第二行：工具栏 */
        .toolbar-bar {
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-light);
            padding: var(--space-2) var(--space-6);
        }
        .toolbar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: var(--space-4);
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }
        
        /* 筛选条件 */
        .filter-conditions {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            flex: 1;
        }
        .filter-select {
            height: 36px;
            padding: 0 var(--space-3);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-md);
            background: var(--bg-card);
            color: var(--text-primary);
            font-size: 0.875rem;
            cursor: pointer;
            min-width: 80px;
        }
        .filter-select:focus {
            outline: none;
            border-color: var(--accent-500);
        }
        
        /* 分页区域 */
        .pagination-section {
            flex-shrink: 0;
        }
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .stats-item strong {
            color: var(--accent-600);
            font-size: 1rem;
            font-weight: 700;
        }

        /* 筛选栏背景遮罩 - 简洁版 */
        .filter-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .filter-backdrop.active {
            display: block;
            opacity: 1;
        }

        /* 筛选栏 - 简洁版 */
        .filter-bar {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            margin-bottom: var(--space-5);
            position: fixed;
            top: 120px;
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            width: 90%;
            max-width: 1200px;
            z-index: 1001;
            box-shadow: var(--shadow-xl);
            max-height: calc(100vh - 100px);
            overflow-y: auto;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
        }
        .filter-bar.active {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            pointer-events: auto;
        }
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: var(--space-3) var(--space-4);
            margin-bottom: var(--space-4);
        }
        .filter-item { display: flex; flex-direction: column; gap: var(--space-1); }
        .filter-item label { 
            color: var(--text-secondary); 
            font-size: 0.8125rem; 
            white-space: nowrap;
            font-weight: 500;
        }
        .filter-item select, .filter-item input {
            background: var(--bg-card);
            border: 1px solid var(--border-medium);
            color: var(--text-primary);
            border-radius: var(--radius-md);
            padding: var(--space-2) var(--space-3);
            font-size: 0.875rem;
            width: 100%;
            height: 40px;
            transition: all 0.2s ease;
        }
        .filter-item select:focus, .filter-item input:focus { 
            outline: none; 
            border-color: var(--accent-500); 
            box-shadow: 0 0 0 3px var(--accent-50);
        }
        .filter-item select option { background: var(--bg-card); }
        .filter-actions { 
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            gap: var(--space-3); 
            padding-top: var(--space-3); 
            border-top: 1px solid var(--border-light); 
        }
        .result-count { 
            color: var(--text-secondary); 
            font-size: 0.875rem; 
            margin-right: auto; 
        }
        .result-count strong { color: var(--accent-600); }
        .reset-btn { 
            padding: var(--space-2) var(--space-5); 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border-medium); 
            background: var(--bg-tertiary); 
            color: var(--text-secondary); 
            font-size: 0.875rem; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            height: 40px; 
            white-space: nowrap;
            font-weight: 500;
        }
        .reset-btn:hover { 
            background: var(--primary-200); 
            border-color: var(--border-medium); 
            color: var(--text-primary);
        }
        .confirm-btn { 
            padding: var(--space-2) var(--space-5); 
            border-radius: var(--radius-md); 
            border: 1px solid var(--success); 
            background: var(--success); 
            color: white; 
            font-size: 0.875rem; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            height: 40px; 
            white-space: nowrap; 
            font-weight: 500;
        }
        .confirm-btn:hover { 
            background: #059669; 
            border-color: #059669;
            transform: translateY(-1px);
        }

        /* 院校卡片 */
        .cards-wrapper { display: flex; flex-direction: column; gap: 0; }
        .school-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 14px; margin-bottom: 14px; overflow: hidden; transition: border-color 0.2s; }
        .school-card:hover { border-color: rgba(59,159,232,0.45); }

        .school-header { padding: 14px 20px; border-bottom: 1px solid rgba(59,159,232,0.12); display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
        .school-header:hover { background: rgba(59,159,232,0.05); }
        .collapse-arrow { color: var(--text-secondary); font-size: 0.75rem; margin-left: auto; padding-top: 4px; transition: transform 0.2s; white-space: nowrap; }
        .school-card.collapsed .collapse-arrow { transform: rotate(-90deg); }
        .major-body { overflow: hidden; transition: max-height 0.25s ease, opacity 0.2s; max-height: 2000px; opacity: 1; }
        .school-card.collapsed .major-body { max-height: 0; opacity: 0; }

        .school-header-left { flex: 1; min-width: 0; display: flex; align-items: center; gap: 0; }
        .school-name-row { display: flex; align-items: center; flex: 1; min-width: 0; overflow: hidden; gap: 12px; }
        .school-name-wrapper { display: flex; align-items: center; gap: 8px; min-width: 225px; width: 225px; flex-shrink: 0; }
        .college-level-tag { flex-shrink: 0; }
        .school-col-level  { min-width: 80px;  width: 80px; }
        .school-col-code   { min-width: 70px;  width: 70px; color: var(--text-secondary); font-size: 0.78rem; }
        .school-col-province { min-width: 60px; width: 60px; color: var(--text-secondary); font-size: 0.82rem; }
        .school-col-city-province { min-width: 60px; width: 60px; color: var(--text-secondary); font-size: 0.82rem; }
        .school-col-batch  { min-width: 90px;  width: 90px; }
        .school-col-remark { min-width: 80px;  width: 80px; }
        .school-link { color: var(--accent-cyan); text-decoration: none; font-weight: 700; font-size: 1.05rem; cursor: pointer; white-space: nowrap; display: inline-block; }
        .school-link:hover { text-decoration: underline; color: #7dc8f0; }
        .school-major-count { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; padding-top: 4px; flex-shrink: 0; }
        .school-major-count strong { color: var(--accent-cyan); font-size: 1rem; }
        .school-major-count.desktop-only { margin-left: auto; padding-left: 20px; }

        /* 批次/层次 标签 */
        .batch-tag { font-size: 0.72rem; padding: 2px 7px; border-radius: 5px; background: rgba(240,165,0,0.12); border: 1px solid rgba(240,165,0,0.3); color: var(--accent-pink); white-space: nowrap; }
        .college-level-tag { display: inline-block; font-size: 0.7rem; padding: 2px 7px; border-radius: 5px; background: rgba(120,200,120,0.15); color: #7ec87e; border: 1px solid rgba(120,200,120,0.3); white-space: nowrap; font-weight: 600; }
        .college-level-tag.level-211 { background: rgba(59,159,232,0.15); color: #7dc8f0; border-color: rgba(59,159,232,0.3); }
        .college-level-tag.level-985 { background: rgba(255,180,0,0.15); color: #ffcc44; border-color: rgba(255,180,0,0.3); }
        .college-level-tag.level-syl { background: rgba(200,100,255,0.15); color: #cc88ff; border-color: rgba(200,100,255,0.3); }

        /* 专业列表头/行 */
        .major-list-header {
            display: grid;
            grid-template-columns: 2fr 75px 90px 75px 85px 85px 95px 110px 60px;
            padding: 7px 16px;
            background: rgba(59,159,232,0.06);
            border-bottom: 1px solid rgba(59,159,232,0.1);
            font-size: 0.75rem; color: var(--text-secondary); font-weight: 600; letter-spacing: 0.02em;
        }
        .major-list-header span { text-align: center; }
        .major-list-header span:first-child { text-align: left; }
        .major-list-header span:last-child { text-align: center; padding-right: 0; }
        .major-row {
            display: grid;
            grid-template-columns: 2fr 75px 90px 75px 85px 85px 95px 110px 60px;
            padding: 11px 16px;
            border-bottom: 1px solid rgba(59,159,232,0.06);
            align-items: center;
            transition: background 0.12s;
        }
        .major-row:last-child { border-bottom: none; }
        .major-row:hover { background: rgba(59,159,232,0.06); }
        .major-row-left { display: flex; flex-direction: row; align-items: center; gap: 8px; flex-wrap: nowrap; }
        .major-row-cell { text-align: center; font-size: 0.88rem; }
        .major-row-cell:last-child { text-align: center; }
        .score-val { color: var(--accent-cyan); font-weight: 700; font-size: 1rem; }
        .rank-val  { color: var(--text-secondary); font-size: 0.85rem; }
        
        /* 模态框专业列表样式 - 与主页面保持一致 */
        .modal-major-list {
            width: 100%;
        }
        .modal-major-header {
            display: grid;
            grid-template-columns: 2fr 80px 1fr 70px 80px 1fr 70px;
            gap: 8px;
            padding: 12px 20px;
            background: rgba(59, 159, 232, 0.06);
            border-bottom: 1px solid rgba(59, 159, 232, 0.12);
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .modal-major-header span {
            text-align: center;
        }
        .modal-major-header span:first-child {
            text-align: left;
        }
        .modal-major-row {
            display: grid;
            grid-template-columns: 2fr 80px 1fr 70px 80px 1fr 70px;
            gap: 8px;
            padding: 11px 20px;
            border-bottom: 1px solid rgba(59, 159, 232, 0.06);
            align-items: center;
            transition: background 0.12s;
        }
        .modal-major-row:last-child {
            border-bottom: none;
        }
        .modal-major-row:hover {
            background: rgba(59, 159, 232, 0.06);
        }
        .modal-major-name {
            font-size: 0.88rem;
            color: var(--text-primary);
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .modal-major-cell {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        .modal-major-cell .score-val {
            color: var(--accent-cyan);
            font-weight: 700;
            font-size: 1rem;
        }
        .modal-major-cell .subject-badge {
            display: inline-block;
            font-size: 0.72rem;
            padding: 2px 7px;
            border-radius: 7px;
            background: rgba(59, 159, 232, 0.12);
            border: 1px solid rgba(59, 159, 232, 0.3);
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .modal-major-cell .subject-badge.unlimited {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        .major-name-result {
            font-size: 0.9rem; color: var(--text-primary); font-weight: 500;
            cursor: pointer;
            border-bottom: 1px dashed rgba(59,159,232,0.4);
            transition: color 0.15s;
        }
        .major-name-result:hover { color: #7dc8f0; }

        /* ========== 专业组模态框 ========== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 9999;
            justify-content: center;
            align-items: flex-start;
            padding-top: 70px;
            overflow-y: auto;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-content {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            width: 90%;
            max-width: 1000px;
            max-height: calc(100vh - 100px);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(59, 159, 232, 0.2);
            background: rgba(10, 25, 70, 0.3);
        }
        .modal-header h3 {
            margin: 0;
            color: var(--accent-cyan);
            font-size: 1.1rem;
            font-weight: 600;
        }
        .modal-close-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .modal-close-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: rgba(239, 68, 68, 0.4);
            color: #f87171;
        }
        #groupModalBody {
            padding: 0;
            overflow-y: auto;
            flex: 1;
        }
        .major-remark-text {
            font-size: 0.72rem;
            color: var(--accent-pink);
            margin-left: 8px;
            padding: 1px 6px;
            border-radius: 4px;
            background: rgba(240,165,0,0.1);
            border: 1px solid rgba(240,165,0,0.25);
            white-space: nowrap;
        }

        .major-group-tag { font-size: 0.7rem; padding: 1px 6px; border-radius: 4px; background: rgba(30,91,191,0.2); border: 1px solid rgba(30,91,191,0.4); color: #88aaee; white-space: nowrap; }
        .major-category-text { font-size: 0.72rem; color: var(--text-secondary); }
        .subject-badge { display: inline-block; font-size: 0.72rem; padding: 2px 7px; border-radius: 7px; background: rgba(59,159,232,0.12); border: 1px solid rgba(59,159,232,0.3); color: var(--text-secondary); white-space: nowrap; }
        .subject-badge.unlimited { background: rgba(16,185,129,0.1); border-color: rgba(16,185,129,0.3); color: #6ee7b7; }
        .prob-badge { display: inline-block; font-size: 0.78rem; font-weight: 600; padding: 3px 10px; border-radius: 8px; white-space: nowrap; }
        .prob-badge.rush   { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .prob-badge.stable { background: rgba(234,179,8,0.15);  color: #fbbf24; border: 1px solid rgba(234,179,8,0.3); }
        .prob-badge.safe   { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }

        /* 分组选项卡 */
        .group-tabs {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 10px 20px 0;
            border-bottom: 1px solid rgba(59,159,232,0.12);
            background: rgba(10,25,70,0.4);
        }
        .group-tab { padding: 2px 10px; border-radius: 8px 8px 0 0; border: 1px solid rgba(59,159,232,0.25); border-bottom: none; background: rgba(10,30,80,0.5); color: var(--text-secondary); font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.18s; user-select: none; white-space: nowrap; }
        .group-tab:hover { background: rgba(59,159,232,0.12); color: var(--accent-cyan); }
        .group-tab.active { padding: 6px 16px; background: rgba(59,159,232,0.18); color: var(--accent-cyan); border-color: rgba(59,159,232,0.5); }
        .group-tab .tab-count { display: inline-block; background: rgba(59,159,232,0.2); color: var(--accent-cyan); border-radius: 10px; font-size: 0.72rem; padding: 0 6px; margin-left: 5px; line-height: 1.6; }
        .group-tab .tab-stats { display: none; }
        .group-tab.active .tab-stats { display: block; margin-top: 4px; }
        .group-tab .tab-stat { display: inline-block; color: rgba(59,159,232,0.85); background: rgba(59,159,232,0.1); border-radius: 6px; font-size: 0.70rem; padding: 0 5px; margin-left: 4px; line-height: 1.6; border: 1px solid rgba(59,159,232,0.25); }
        .group-panel { display: none; }
        .group-panel.active { display: block; }

        /* 空状态 */
        .empty-state { text-align: center; padding: 60px 24px; color: var(--text-secondary); }

        /* 模态框空状态 */
        .modal-empty-state {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }
        .modal-empty-state .spinner-border {
            width: 2.5rem;
            height: 2.5rem;
            color: var(--accent-cyan);
            margin-bottom: 16px;
        }
        .modal-empty-state p {
            margin: 0;
            font-size: 0.9rem;
        }
        .modal-empty-state.error {
            color: #f87171;
        }

        /* 分页 - 内联在信息栏中 */
        .pagination-inline {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            padding: 0 10px;
            background: rgba(245, 245, 240, 0.8);
            border-radius: 8px;
            border: 1px solid rgba(180, 180, 160, 0.3);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .page-btn {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(180, 180, 160, 0.4);
            color: var(--accent-cyan);
            border-radius: 6px;
            padding: 0;
            width: 32px;
            height: 28px;
            line-height: 28px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.15s;
            text-align: center;
            flex-shrink: 0;
        }
        .page-btn:hover, .page-btn.active { background: var(--accent-cyan); color: white; border-color: var(--accent-cyan); }
        .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }
        .pagination-info {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin: 0 8px;
            min-width: 80px;
            text-align: center;
            flex-shrink: 0;
        }
        .page-size-select {
            width: 70px;
            height: 28px;
            padding: 0 4px;
            flex-shrink: 0;
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(180, 180, 160, 0.4);
            border-radius: 6px;
            color: var(--text-primary);
        }

        /* 专业介绍 tooltip（结果页） */
        #majorTooltip {
            position: fixed; z-index: 9999;
            width: 500px;
            background: rgba(5,20,60,0.97);
            border: 1px solid rgba(59,159,232,0.4);
            border-radius: 10px;
            padding: 14px 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            display: none;
            backdrop-filter: blur(8px);
        }
        #majorTooltip.visible { display: block; }
        .tooltip-title { font-size: 0.92rem; font-weight: 700; color: var(--accent-cyan); margin-bottom: 8px; border-bottom: 1px solid rgba(59,159,232,0.2); padding-bottom: 6px; }
        .tooltip-section { margin-bottom: 7px; }
        .tooltip-section-label { font-size: 0.7rem; color: var(--accent-pink); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; }
        .tooltip-section-body { font-size: 0.78rem; color: var(--text-secondary); line-height: 1.55; }
        .tooltip-loading { font-size: 0.8rem; color: var(--text-secondary); text-align: center; padding: 8px 0; }
        .tooltip-none { font-size: 0.8rem; color: rgba(168,204,240,0.5); text-align: center; padding: 8px 0; }

        /* 结果页加载遮罩 */
        #resultLoading { text-align: center; padding: 60px 0; }
        #resultLoading .spinner-border { width: 3rem; height: 3rem; color: var(--accent-cyan); }

        @media (max-width: 768px) {
            .major-list-header, .major-row { grid-template-columns: 2fr 65px 55px 60px; }
            .major-list-header span:nth-child(n+5), .major-row .major-row-cell:nth-child(n+5) { display: none; }
            .major-list-header span:last-child { text-align: center; padding-right: 0; }
        }
        
        /* ========== 移动端响应式优化 ========== */
        
        /* 小屏幕优化 (768px以下) */
        @media (max-width: 767.98px) {
            /* 表单视图优化 */
            .form-view-wrap {
                min-height: 100vh;
                padding: 20px 0;
            }
            
            .main-container {
                margin: 20px auto;
                padding: 25px 20px;
                border-radius: 20px;
                width: calc(100% - 30px);
                max-width: 600px;
            }
            
            .header-title {
                font-size: 28px;
                margin-bottom: 30px;
            }
            
            .section-card {
                padding: 20px;
                margin-bottom: 20px;
            }
            
            .section-title {
                font-size: 1.4rem;
                margin-bottom: 18px;
                padding-bottom: 12px;
            }
            
            .form-label {
                font-size: 15px;
            }
            
            .form-control, .form-select {
                height: 46px;
                font-size: 15px;
            }
            
            /* 按钮优化 - 触摸友好 */
            .btn {
                width: 100%;
                margin: 6px 0;
                height: 50px;
                line-height: 50px;
                font-size: 16px;
                padding: 0 24px;
            }
            
            /* 选科标签优化 */
            .subject-tags {
                gap: 10px;
                justify-content: flex-start;
            }
            
            .subject-tag {
                padding: 0;
                height: 44px;
                font-size: 15px;
                flex: none;
                width: calc(50% - 5px);
                text-align: center;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                line-height: 1;
            }
            
            /* 结果视图优化 */
            .result-view-wrap {
                padding: 180px 15px 15px;
                min-height: 100vh;
            }
            
            .page-title {
                font-size: 1.3rem;
                flex-wrap: nowrap;
                gap: 8px;
                white-space: nowrap;
            }
            
            .page-title span {
                font-size: 0.75rem;
                width: auto;
            }
            
            /* 顶部容器优化 */
            .top-bar-container {
                width: 100%;
            }
            
            /* 顶部栏移动端优化 */
            .top-bar {
                padding: var(--space-2) var(--space-3);
            }
            .top-bar-inner {
                flex-wrap: wrap;
                gap: var(--space-3);
                overflow-x: auto;
            }
            
            /* Logo移动端优化 */
            .logo-large img {
                height: 36px;
            }
            
            /* 基本信息移动端 */
            .basic-info {
                gap: var(--space-3);
                flex: 1;
                min-width: 0;
            }
            .basic-info .info-item {
                flex-shrink: 0;
            }
            .basic-info .info-label {
                font-size: 0.625rem;
            }
            .basic-info .info-value {
                font-size: 0.8125rem;
            }
            .basic-info .info-value.highlight {
                font-size: 0.9375rem;
            }
            
            /* 统计移动端 */
            .stats-section {
                gap: var(--space-2);
                flex-shrink: 0;
            }
            .stat-item {
                font-size: 0.75rem;
            }
            .stat-item strong {
                font-size: 0.875rem;
            }
            
            /* 工具栏移动端 */
            .toolbar-bar {
                padding: var(--space-2) var(--space-3);
            }
            .toolbar-inner {
                flex-wrap: wrap;
                gap: var(--space-2);
            }
            
            /* 筛选条件移动端 */
            .filter-conditions {
                order: 3;
                width: 100%;
                overflow-x: auto;
            }
            .filter-select {
                height: 32px;
                font-size: 0.8125rem;
                min-width: 70px;
            }
            
            /* 分页移动端 */
            .pagination-section {
                display: none;
            }

            /* 右侧统计移动端 */
            .info-right {
                gap: 8px;
            }
            .stats-box {
                padding: 4px 10px;
            }
            .stats-item {
                font-size: 0.7rem;
            }
            .stats-item strong {
                font-size: 0.9rem;
            }

            .info-tag {
                white-space: nowrap;
            }

            .info-tag strong {
                font-size: 0.85rem;
            }

            .filter-toggle-btn-inline {
                height: 28px;
                padding: 0 10px;
                font-size: 0.75rem;
                margin-left: auto;
            }

            .filter-toggle-btn-inline svg {
                width: 12px;
                height: 12px;
            }
            
            .info-tag .label {
                display: none;
            }
            
            .info-tag:first-child,
            .info-tag:nth-child(2),
            .info-tag:nth-child(3) {
                width: auto;
            }
            
            .info-tag:last-child {
                width: 100%;
                text-align: center;
                margin-top: 4px;
                padding-top: 8px;
                border-top: 1px solid rgba(59,159,232,0.15);
            }
            
            /* 筛选栏优化 */
            .filter-bar {
                padding: 12px 15px;
                border-radius: 12px;
                top: 55px;
                max-height: calc(100vh - 80px);
                width: 95%;
            }
            .filter-backdrop {
                background: rgba(0, 0, 0, 0.7);
            }

            /* 模态框移动端适配 */
            .modal-overlay {
                padding-top: 55px;
                align-items: flex-start;
            }
            .modal-content {
                max-height: calc(100vh - 80px);
                margin-bottom: 20px;
            }
            
            .filter-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px 12px;
            }
            
            .filter-item {
                min-width: 0;
            }

                font-size: 0.75rem;

            /* 院校卡片优化 - 内容显示为两行 */

                position: relative;

            .school-header-left {

            /* 专业列表优化 - 只显示4列：专业名称、专业编号、专业门类、专业最低分 */

            .major-list-header span:nth-child(n+5) {

            }
            
            .major-row .major-row-cell:nth-child(n+5) { 
                display: none; 
            }
            
            .major-list-header span:last-child {

                padding-right: 0;

            .major-name-result {

            /* 分组选项卡 - 手机端改为垂直手风琴式 */
            .group-tabs {
                padding: 12px;
                gap: 8px;
                flex-direction: column;
                background: transparent;
                border-bottom: none;
            }
            
            .group-tab {
                padding: 12px 16px;
                font-size: 0.9rem;
                border-radius: 10px;
                border: 1px solid rgba(59,159,232,0.25);

                flex-wrap: wrap;
                align-items: center;

            .group-tab.active {

                padding: 2px 8px;

            /* 统计信息默认隐藏 */

            .group-tab .tab-stat {

                border-radius: 6px;

            .group-tab .tab-stat.stat-admit {
                background: rgba(16,185,129,0.15);
                color: #6ee7b7;
            }
            
            .group-tab .tab-stat.stat-score {
                background: rgba(59,159,232,0.15);
                color: #60a5fa;
            }
            
            .group-tab .tab-stat.stat-rank {
                background: rgba(245,158,11,0.15);
                color: #fbbf24;
            }
            
            /* 分页优化 - 内联在信息栏 */
            .pagination-inline {
                padding: 0 4px;
                gap: 3px;
            }

            .page-btn {
                padding: 0;
                width: 26px;
                height: 22px;
                line-height: 22px;
                font-size: 0.7rem;
                flex: 0 0 auto;
                text-align: center;

            .pagination-info {
                font-size: 0.65rem;

            /* Tooltip优化 */

                width: 90vw;
                max-width: 350px;
                left: 5vw !important;
            }
        }
        
        /* 超小屏幕优化 (576px以下) */
        @media (max-width: 575.98px) {
            .main-container {
                margin: 15px auto;
                padding: 20px 15px;

            }
            
            .section-title {

            .form-control, .form-select {

            }
            
            .filter-grid {
                grid-template-columns: repeat(2, 1fr);

            }
            
            .filter-item select, .filter-item input {

            .subject-tag {

            }
            
            .major-list-header span:last-child { 
                text-align: center; 
                padding-right: 0;
            }
        }
        
        /* 触摸设备优化 */
        @media (hover: none) and (pointer: coarse) {
            .btn, .subject-tag, .page-btn,
            .school-header, .group-tab, .reset-btn, .confirm-btn {
                min-height: 44px;
            }

            /* 禁用悬停效果，使用点击效果 */
            .btn:hover::before,

                transform: none;
            }
            
            .btn:active,
            .subject-tag:active,
            .page-btn:active {
                transform: scale(0.98);
            }
        }
    </style>
</head>
<body>

    <!-- ====== 表单视图 ====== -->

    <!-- ====== 结果视图 ====== -->
    <div id="viewResult" class="result-view-wrap">

        <!-- 顶部固定栏（包含信息栏和分页） -->
        <div class="top-bar-container" id="topBarContainer">
            <!-- 第一行：Logo + 基本信息 + 统计 -->
            <div class="top-bar" id="topBar">
                <div class="top-bar-inner">
                    <!-- Logo -->

                        <div class="logo-large">

            <!-- 第二行：返回 + 筛选条件 + 分页 -->
            <div class="toolbar-bar" id="toolbarBar">

                    <!-- 筛选条件（快捷筛选，与筛选面板联动） -->

        <!-- 专业组模态框 -->

    <script>
    // ====================================================
    // 公共配置
    // ====================================================
    const API_BASE = `http://${window.location.hostname || 'localhost'}:3000/api`;


    // ====================================================
    // 视图切换
    // ====================================================
    function showFormView() {
        document.getElementById('viewForm').style.display = 'block';
        document.getElementById('viewResult').style.display = 'none';
        // 关闭筛选面板
        closeFilterPanel();
    }

    function showResultView() {
        document.getElementById('viewForm').style.display = 'none';
        document.getElementById('viewResult').style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // 切换筛选面板显示/隐藏
    function toggleFilterPanel() {
        const filterBar = document.getElementById('filterBar');
        const filterBtn = document.getElementById('filterToggleBtn');
        const backdrop = document.getElementById('filterBackdrop');

        if (!filterBar.classList.contains('active')) {
            // 显示筛选面板
            backdrop.classList.add('active');
            filterBar.style.display = 'block';
            // 强制重绘以触发过渡动画
            filterBar.offsetHeight;
            filterBar.classList.add('active');
            filterBtn.classList.add('active');
        } else {
            // 隐藏筛选面板
            closeFilterPanel();
        }
    }

    // ====================================================
    // 页面初始化
    // ====================================================
    document.addEventListener('DOMContentLoaded', async () => {
        // 初始化选科标签
        initSubjectTags();
    });

    // ====================================================
    // 高考模式 & 省份
    // ====================================================
    const gaokaoModes = {
        mode312: ['广东','江苏','河北','福建','湖北','湖南','辽宁','重庆','吉林','黑龙江','安徽','江西','广西','贵州','甘肃','河南','山西','陕西','内蒙古','宁夏','青海','四川','云南'],
        mode33: ['北京','天津','上海','山东','浙江','海南'],
        modeTraditional: ['西藏','新疆']
    };
    const PROVINCES = [
        {name:'河南',mode:'3+1+2'},{name:'广东',mode:'3+1+2'},{name:'江苏',mode:'3+1+2'},{name:'河北',mode:'3+1+2'},{name:'福建',mode:'3+1+2'},
        {name:'湖北',mode:'3+1+2'},{name:'湖南',mode:'3+1+2'},{name:'辽宁',mode:'3+1+2'},{name:'重庆',mode:'3+1+2'},{name:'吉林',mode:'3+1+2'},
        {name:'黑龙江',mode:'3+1+2'},{name:'安徽',mode:'3+1+2'},{name:'江西',mode:'3+1+2'},{name:'广西',mode:'3+1+2'},{name:'贵州',mode:'3+1+2'},
        {name:'甘肃',mode:'3+1+2'},{name:'山西',mode:'3+1+2'},{name:'陕西',mode:'3+1+2'},{name:'内蒙古',mode:'3+1+2'},{name:'宁夏',mode:'3+1+2'},
        {name:'青海',mode:'3+1+2'},{name:'四川',mode:'3+1+2'},{name:'云南',mode:'3+1+2'},
        {name:'北京',mode:'3+3'},{name:'天津',mode:'3+3'},{name:'上海',mode:'3+3'},{name:'山东',mode:'3+3'},{name:'浙江',mode:'3+3'},{name:'海南',mode:'3+3'},
        {name:'西藏',mode:'文理'},{name:'新疆',mode:'文理'}
    ];
    const PINYIN_MAP = {'河南':'hn','广东':'gd','江苏':'js','河北':'hb','福建':'fj','湖北':'hb','湖南':'hn','辽宁':'ln','重庆':'cq','吉林':'jl','黑龙江':'hlj','安徽':'ah','江西':'jx','广西':'gx','贵州':'gz','甘肃':'gs','山西':'sx','陕西':'sx','内蒙古':'nmg','宁夏':'nx','青海':'qh','四川':'sc','云南':'yn','北京':'bj','天津':'tj','上海':'sh','山东':'sd','浙江':'zj','海南':'hi','西藏':'xz','新疆':'xj'};

    // ====================================================
    // 地区 Combobox
    // ====================================================
    function initRegionCombobox() {
        const input    = document.getElementById('regionInput');
        const hidden   = document.getElementById('region');
        const dropdown = document.getElementById('regionDropdown');
        let highlightIdx = -1, filtered = [];

        function renderDropdown(kw) {
            kw = (kw || '').trim().toLowerCase();
            filtered = kw ? PROVINCES.filter(p => p.name.includes(kw) || (PINYIN_MAP[p.name]||'').startsWith(kw)) : PROVINCES;
            if (!filtered.length) { dropdown.innerHTML = '<div class="region-no-result">未找到匹配省份</div>'; }
            else {
                const groups = [
                    {label:'3+1+2 新高考',tag:'blue', items:filtered.filter(p=>p.mode==='3+1+2')},
                    {label:'3+3 新高考',  tag:'gold', items:filtered.filter(p=>p.mode==='3+3')},
                    {label:'传统文理分科',tag:'gray', items:filtered.filter(p=>p.mode==='文理')},
                ];
                let html='', gi=0;
                groups.forEach(g=>{
                    if(!g.items.length) return;
                    if(!kw) html+=`<div class="region-group-label">${g.label}</div>`;
                    g.items.forEach(p=>{
                        const tc=g.tag==='gold'?'gold':g.tag==='gray'?'gray':'';
                        let dn=p.name;
                        if(kw){const idx=p.name.indexOf(kw);if(idx>=0)dn=p.name.substring(0,idx)+`<span class="match-highlight">${p.name.substring(idx,idx+kw.length)}</span>`+p.name.substring(idx+kw.length);}
                        html+=`<div class="region-option" data-value="${p.name}" data-idx="${gi}"><span>${dn}</span><span class="mode-tag ${tc}">${p.mode}</span></div>`;
                        gi++;
                    });
                });
                dropdown.innerHTML=html;
            }
            highlightIdx=-1;
            dropdown.querySelectorAll('.region-option').forEach(el=>{el.addEventListener('mousedown',e=>{e.preventDefault();selectProvince(el.dataset.value);});});
        }
        function selectProvince(name){hidden.value=name;input.value=name;closeDropdown();hidden.dispatchEvent(new Event('change'));}
        function openDropdown(kw){renderDropdown(kw);dropdown.classList.add('open');}
        function closeDropdown(){dropdown.classList.remove('open');highlightIdx=-1;}
        function moveHighlight(dir){
            const opts=dropdown.querySelectorAll('.region-option');
            if(!opts.length)return;
            opts.forEach(o=>o.classList.remove('highlighted'));
            highlightIdx=(highlightIdx+dir+opts.length)%opts.length;
            const cur=opts[highlightIdx];cur.classList.add('highlighted');cur.scrollIntoView({block:'nearest'});
        }
        input.addEventListener('focus',()=>openDropdown(''));
        input.addEventListener('click',()=>openDropdown(''));
        input.addEventListener('input',()=>{openDropdown(input.value);hidden.value='';});
        input.addEventListener('keydown',e=>{
            if(!dropdown.classList.contains('open')){openDropdown('');return;}
            if(e.key==='ArrowDown'){e.preventDefault();moveHighlight(1);}
            else if(e.key==='ArrowUp'){e.preventDefault();moveHighlight(-1);}
            else if(e.key==='Enter'){e.preventDefault();const opts=dropdown.querySelectorAll('.region-option');if(highlightIdx>=0&&opts[highlightIdx])selectProvince(opts[highlightIdx].dataset.value);else if(filtered.length===1)selectProvince(filtered[0].name);}
            else if(e.key==='Escape')closeDropdown();
        });
        input.addEventListener('blur',()=>{
            setTimeout(()=>{
                const match=PROVINCES.find(p=>p.name===input.value.trim());
                if(match){hidden.value=match.name;}
                else if(hidden.value){input.value=hidden.value;}
                else{input.value='河南';hidden.value='河南';}
                closeDropdown();
            },150);
        });
        document.addEventListener('click',e=>{if(!document.getElementById('regionCombobox').contains(e.target))closeDropdown();});
    }

            <div class="subject-tags"><div class="subject-tag" data-type="traditional" data-value="理科">理科（理综）</div><div class="subject-tag" data-type="traditional" data-value="文科">文科（文综）</div></div></div>`;

    function setupSubjectTagEvents(mode) {
        const tags=document.querySelectorAll('.subject-tag');
        const hiddenInput=document.getElementById('subjectCombination');
        const errorDiv=document.getElementById('subjectError');
        if(!hiddenInput||!errorDiv)return;

        tags.forEach(tag=>{
            tag.addEventListener('click',function(){
                const type=this.dataset.type, value=this.dataset.value;
                if(type==='required'){
                    document.querySelectorAll('[data-type="required"]').forEach(t=>t.classList.remove('selected'));
                    this.classList.add('selected');updateCombo();
                } else if(type==='optional'){
                    const sel=document.querySelectorAll('[data-type="optional"].selected');
                    if(this.classList.contains('selected')){this.classList.remove('selected');}
                    else if(sel.length<2){this.classList.add('selected');}
                    else{showToast('再选科目最多选择2门！','warning');return;}
                    updateCombo();
                } else if(type==='mode33'){
                    const sel=document.querySelectorAll('[data-type="mode33"].selected');
                    if(this.classList.contains('selected')){this.classList.remove('selected');}
                    else if(sel.length<3){this.classList.add('selected');}
                    else{showToast('选考科目最多选择3门！','warning');return;}
                    updateCombo();
                } else if(type==='traditional'){
                    document.querySelectorAll('[data-type="traditional"]').forEach(t=>t.classList.remove('selected'));
                    this.classList.add('selected');
                    hiddenInput.value=value;errorDiv.style.display='none';return;
                }
                validateSubject();
            });
        });

        function updateCombo(){
            let subjects=[];
            if(mode==='mode312'){
                const req=document.querySelector('[data-type="required"].selected');
                const opt=document.querySelectorAll('[data-type="optional"].selected');
                if(req&&opt.length===2){subjects=[req.dataset.value,opt[0].dataset.value,opt[1].dataset.value];hiddenInput.value=subjects.join(',');errorDiv.style.display='none';}
                else hiddenInput.value='';
            } else if(mode==='mode33'){
                const sel=document.querySelectorAll('[data-type="mode33"].selected');
                if(sel.length===3){sel.forEach(t=>subjects.push(t.dataset.value));hiddenInput.value=subjects.join(',');errorDiv.style.display='none';}
                else hiddenInput.value='';
            }
        }
        function validateSubject(){
            let ok=false;
            if(mode==='mode312'){const req=document.querySelector('[data-type="required"].selected');const opt=document.querySelectorAll('[data-type="optional"].selected');ok=req&&opt.length===2;}
            else if(mode==='mode33'){ok=document.querySelectorAll('[data-type="mode33"].selected').length===3;}
            else{ok=!!document.querySelector('[data-type="traditional"].selected');}
            errorDiv.style.display=ok?'none':'block';
            return ok;
        }
    }

    document.getElementById('recommendationForm').addEventListener('submit', async function(e){
        e.preventDefault();
        const score=document.getElementById('score').value;
        const subjectCombination=document.getElementById('subjectCombination').value;
        const region=document.getElementById('region').value;
        if(!region){document.getElementById('regionInput').focus();showToast('请选择有效的地区省份！','warning');return;}
        if(!score||!subjectCombination){if(!subjectCombination)document.getElementById('subjectError').style.display='block';showToast('请填写所有必填项！','warning');return;}
        if(score<0||score>750){showToast('分数必须在0-750之间！','warning');return;}

        document.getElementById('loading').style.display='block';
        setTimeout(async ()=>{
            await doQueryAndShowResult(region, score, subjectCombination);
            document.getElementById('loading').style.display='none';
        }, 800);
    });

    async function doQueryAndShowResult(region, score, subjectCombination) {
        // 填写信息栏
        document.getElementById('infoRegion').textContent = region;
        document.getElementById('infoScore').textContent = score;
        document.getElementById('infoSubject').textContent = subjectCombination;


        // 切换到结果视图，先显示加载中
        showResultView();
        document.getElementById('resultBody').innerHTML='';
        document.getElementById('resultLoading').style.display='block';
        document.getElementById('paginationBar').style.display='none';

        try {
            const resp = await fetch(`${API_BASE}/recommend-from-db`, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({score:Number(score), subjectCombination, region})
            });
            const result = await resp.json();
            if(!result.success) throw new Error(result.error||'接口返回失败');

            const userScore = parseInt(score) || 0;
            allData = (result.data || []).filter(r => {
                // 只显示专业最低分小于或等于用户分数的专业
                const minScore = r.min_score != null ? parseInt(r.min_score) : null;
                return minScore != null && minScore <= userScore;
            });
            document.getElementById('infoTotal').textContent = new Set(allData.map(r=>r.name)).size;
            document.getElementById('infoMajorTotal').textContent = new Set(allData.map(r=>r.major)).size; // 专业名称去重

            document.getElementById('resultLoading').style.display='none';

            if(allData.length===0){
                document.getElementById('resultBody').innerHTML=`<div class="empty-state"><div style="font-size:2rem;margin-bottom:12px;">🔍</div><div>未找到符合条件的推荐数据，请尝试调整分数或选科</div></div>`;
                return;
            }

            // 重置筛选下拉（清空旧数据）
            ['filterProvince','filterCity','filterCategory','filterMajorCategory','filterBatch','filterBatchRemark','filterCollegeLevel','filterSubjectRequire'].forEach(id=>{
                const el=document.getElementById(id);
                el.innerHTML='<option value="">全部</option>';
            });
            document.getElementById('filterSchool').value='';
            document.getElementById('filterMajor').value='';
            currentPage=1; pageSize=10;
            document.getElementById('pageSizeSelect').value='10';

            initFilterOptions();
            filteredData=[...allData];
            document.getElementById('filteredCount').textContent=filteredData.length;
            renderTable(filteredData);

        } catch(err) {
            document.getElementById('resultLoading').style.display='none';
            document.getElementById('resultBody').innerHTML=`<div class="empty-state"><div style="font-size:2rem;margin-bottom:12px;">❌</div><div>查询失败：${err.message}<br><small>请确认后端服务已启动（http://localhost:3000）</small></div></div>`;
        }
    }

    function applyFilter(excludeField){
        const school=document.getElementById('filterSchool').value.trim().toLowerCase();
        const major=document.getElementById('filterMajor').value.trim().toLowerCase();
        const province=document.getElementById('filterProvince').value;
        const city=document.getElementById('filterCity').value;
        const category=document.getElementById('filterCategory').value;
        const majorCategory=document.getElementById('filterMajorCategory').value;
        const batch=document.getElementById('filterBatch').value;
        const batchRemark=document.getElementById('filterBatchRemark').value;
        const cl=document.getElementById('filterCollegeLevel').value;
        const subj=document.getElementById('filterSubjectRequire').value;
        filteredData=allData.filter(r=>{
            if(school&&!(r.name||'').toLowerCase().includes(school))return false;
            if(major&&!(r.major||'').toLowerCase().includes(major))return false;
            if(province&&r.province!==province)return false;
            if(city&&r.college_city!==city)return false;
            if(category&&r.category!==category)return false;
            if(majorCategory&&r.major_category!==majorCategory)return false;
            if(batch&&r.batch!==batch)return false;
            if(batchRemark&&r.batch_remark!==batchRemark)return false;
            if(cl&&r.college_level!==cl)return false;
            if(subj&&r.subject_require!==subj)return false;
            return true;
        });
        document.getElementById('filteredCount').textContent=filteredData.length;
        currentPage=1;renderTable(filteredData);

        // 同步快捷筛选显示
        document.getElementById('quickFilterProvince').value = province;
        document.getElementById('quickFilterCity').value = city;
        document.getElementById('quickFilterMajorCategory').value = majorCategory;
        document.getElementById('quickFilterBatchRemark').value = batchRemark;

        // 联动更新其他下拉框选项
        if (excludeField) {
            updateFilterOptions(excludeField);
        }
    }
