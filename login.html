<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 / 注册 - 高考志愿智能推荐系统</title>
    <link href="css/login.css" rel="stylesheet">
</head>
<body>

<!-- 浮动光点背景 -->
<div class="bg-dots" id="bgDots"></div>

<div class="auth-wrapper">

    <!-- Logo 区 -->
    <div class="logo-area">
        <div class="logo-row">
            <img src="logo.png" alt="Logo" class="logo-img" onerror="this.style.display='none'">
            <div class="logo-title">权鼎教育</div>
        </div>
        <div class="logo-sub">高考志愿智能推荐系统</div>
    </div>

    <!-- 主卡片 -->
    <div class="auth-card">

        <!-- Tab 切换 -->
        <div class="tab-bar">
            <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">登 录</button>
            <button class="tab-btn" id="tabRegister" onclick="switchTab('register')">注 册</button>
        </div>

        <!-- 消息提示 -->
        <div class="msg-box" id="msgBox">
            <svg id="msgIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="msgText"></span>
        </div>

        <!-- 登录表单 -->
        <div class="form-section active" id="loginForm">
            <form onsubmit="return handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">手机号 / 用户名</label>
                    <div class="form-input-wrap">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" class="form-input" id="loginUsername" placeholder="请输入手机号或用户名" autocomplete="username">
                    </div>
                    <div class="field-error" id="loginUsernameErr">请输入手机号或用户名</div>
                </div>

                <div class="form-group">
                    <label class="form-label">密 码</label>
                    <div class="form-input-wrap">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" autocomplete="current-password" style="padding-right:42px;">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('loginPassword', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-off">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="field-error" id="loginPasswordErr">请输入密码</div>
                </div>

                <div class="form-meta">
                    <label class="remember-label">
                        <input type="checkbox" id="rememberMe"> 记住我
                    </label>
                    <a href="#" class="forgot-link" onclick="showForgot()">忘记密码？</a>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn">
                    登 录
                </button>
            </form>

            <div class="divider"><span>还没有账号？</span></div>

            <div class="bottom-tip">
                <a class="switch-link" onclick="switchTab('register')">立即免费注册</a>
            </div>
        </div>

        <!-- 注册表单 -->
        <div class="form-section" id="registerForm">
            <form onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label class="form-label">手机号</label>
                    <div class="form-input-wrap">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 11.5a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 8.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                        <input type="tel" class="form-input" id="regPhone" placeholder="请输入手机号" autocomplete="tel" maxlength="11">
                    </div>
                    <div class="field-error" id="regPhoneErr">请输入正确的11位手机号</div>
                </div>

                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <div class="form-input-wrap">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input type="text" class="form-input" id="regUsername" placeholder="请设置用户名（2-16位）" autocomplete="username" maxlength="16">
                    </div>
                    <div class="field-error" id="regUsernameErr">用户名为2-16位字母、数字或汉字</div>
                </div>

                <div class="form-group">
                    <label class="form-label">设置密码</label>
                    <div class="form-input-wrap">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" class="form-input" id="regPassword" placeholder="6-20位，含字母和数字" oninput="checkStrength(this.value)" style="padding-right:42px;">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('regPassword', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-off">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="field-error" id="regPasswordErr">密码需6-20位，包含字母和数字</div>
                    <div class="pwd-strength" id="pwdStrength">
                        <div class="strength-bar">
                            <div class="strength-seg" id="seg1"></div>
                            <div class="strength-seg" id="seg2"></div>
                            <div class="strength-seg" id="seg3"></div>
                            <div class="strength-seg" id="seg4"></div>
                        </div>
                        <div class="strength-label" id="strengthLabel">密码强度：-</div>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <div class="form-input-wrap">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                            <path d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0 1 12 2.944a11.955 11.955 0 0 1-8.618 3.04A12.02 12.02 0 0 0 3 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
                        </svg>
                        <input type="password" class="form-input" id="regConfirm" placeholder="请再次输入密码" style="padding-right:42px;">
                        <button type="button" class="pwd-toggle" onclick="togglePwd('regConfirm', this)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="eye-off">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                    <div class="field-error" id="regConfirmErr">两次输入的密码不一致</div>
                </div>

                <button type="submit" class="btn-primary" id="registerBtn">
                    立即注册
                </button>

                <div class="agreement">
                    注册即表示同意
                    <a href="#">《用户服务协议》</a>
                    和
                    <a href="#">《隐私政策》</a>
                </div>
            </form>

            <div class="bottom-tip" style="margin-top:16px;">
                已有账号？<a class="switch-link" onclick="switchTab('login')">立即登录</a>
            </div>
        </div>

    </div><!-- /auth-card -->

</div><!-- /auth-wrapper -->

<script src="js/login.js"></script>
</body>
</html>
