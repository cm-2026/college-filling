<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权鼎教育-升学规划师系统</title>
    <script>
        // 登录验证 - 未登录跳转到登录页
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/major-list.css" rel="stylesheet">
</head>
<body>
<div class="container py-4">

    <!-- 页头 -->
    <div class="page-header">
        <h1 class="page-title">专业名录</h1>
        <p class="page-subtitle">共收录 <span id="totalCount" style="color:var(--accent-cyan)">--</span> 个专业，含专业介绍、就业前景及河南省录取数据</p>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input"
                placeholder="搜索专业名称，如：计算机、医学、金融、法学..." autocomplete="off">
        </div>

        <!-- 统计 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCountStat">--</div>
                <div class="stat-label">收录专业</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="resultCount">--</div>
                <div class="stat-label">当前显示</div>
            </div>
        </div>
    </div>

    <!-- 专业列表 -->
    <div id="majorList">
        <div class="loading">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">加载中...</span>
            </div>
            <h4 class="mt-3">正在加载专业数据...</h4>
        </div>
    </div>
</div>

<script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="js/major-list.js"></script>
</body>
</html>
