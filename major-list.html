<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专业名录 - 高考志愿智能推荐系统</title>
    <script>
        // 登录验证 - 未登录跳转到登录页
        (function() {
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --card-bg: rgba(20, 20, 40, 0.6);
            --card-border: rgba(100, 100, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0b0d0;
            --accent-cyan: #00d4ff;
            --accent-purple: #a855f7;
            --accent-pink: #f472b6;
            --accent-green: #4ade80;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
        }

        body::before {
            content: '';
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        .container { position: relative; z-index: 1; max-width: 1400px; }

        /* 页头 */
        .page-header { text-align: center; margin-bottom: 24px; padding: 30px 0 20px; }
        .page-title {
            font-size: 2.5rem; font-weight: 800; margin-bottom: 15px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .page-subtitle { color: var(--text-secondary); font-size: 1.1rem; margin-bottom: 20px; }

        /* 搜索栏 */
        .search-bar {
            max-width: 600px;
            margin: 0 auto 24px;
            position: relative;
        }
        .search-bar.sticky {
            position: fixed;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: auto;
            max-width: 600px;
            padding: 0;
            margin: 0;
            background: transparent;
            backdrop-filter: none;
            z-index: 1000;
            box-shadow: none;
            border: none;
        }
        .search-bar.sticky .search-input {
            background: rgba(20, 20, 40, 0.9);
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(100, 100, 255, 0.1);
        }
        .search-input {
            width: 100%;
            padding: 15px 60px 15px 20px;
            background: var(--card-bg);
            border: 2px solid var(--card-border);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .search-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        .search-input::placeholder { color: var(--text-secondary); }

        /* 统计栏 */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .stat-item {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 15px 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            min-width: 100px;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }
        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* 专业卡片列表 */
        .major-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            margin-bottom: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
        }
        .major-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.08), transparent);
            transition: left 0.5s ease;
        }
        .major-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 212, 255, 0.4);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 30px rgba(0, 212, 255, 0.1);
        }
        .major-card:hover::before {
            left: 100%;
        }

        .major-card-header {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            cursor: pointer;
            gap: 16px;
        }

        .major-index {
            min-width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.15), rgba(168, 85, 247, 0.15));
            color: var(--accent-cyan);
            font-size: 0.8rem;
            font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .major-info-main { flex: 1; min-width: 0; }
        .major-name-text {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
            transition: color 0.3s ease;
        }
        .major-card:hover .major-name-text {
            color: var(--accent-cyan);
        }
        .major-intro-preview {
            font-size: 0.85rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 600px;
        }

        .major-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .meta-item {
            text-align: center;
            min-width: 70px;
        }
        .meta-label {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .meta-value {
            font-size: 0.88rem;
            font-weight: 600;
        }
        .meta-value.school {
            background: linear-gradient(135deg, var(--accent-pink), #f87171);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .meta-value.score {
            background: linear-gradient(135deg, var(--accent-green), #4ade80);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .expand-icon {
            color: var(--text-secondary);
            font-size: 1rem;
            transition: transform 0.3s;
            flex-shrink: 0;
        }
        .expand-icon.open { transform: rotate(180deg); }

        /* 展开内容 */
        .major-card-body {
            display: none;
            border-top: 1px solid var(--card-border);
            padding: 20px 24px;
        }
        .major-card-body.show { display: block; }

        .info-section { margin-bottom: 20px; }
        .info-section-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(0,212,255,0.15);
        }
        .info-section-content {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.8;
        }

        /* 录取院校表格 */
        .admit-table-wrap { overflow-x: auto; }
        .admit-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .admit-table th {
            background: rgba(0,212,255,0.1);
            color: var(--accent-cyan);
            padding: 12px;
            white-space: nowrap;
            font-weight: 600;
            font-size: 0.8rem;
            border-bottom: 1px solid var(--card-border);
        }
        .admit-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: var(--text-primary);
        }
        .admit-table tr:hover td { background: rgba(0,212,255,0.04); }
        .admit-table .score-col { color: var(--accent-pink); font-weight: 600; }
        .admit-table .rank-col { color: var(--text-secondary); }

        /* 加载 */


        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 80px;
        }
        .spinner-border {
            width: 4rem;
            height: 4rem;
            color: var(--accent-cyan);
            filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5));
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* 无数据提示 */
        .no-admit { color: var(--text-secondary); font-size: 0.85rem; padding: 12px 0; }

        /* 响应式 */
        @media (max-width: 768px) {
            .page-title { font-size: 1.8rem; }
            .page-subtitle { font-size: 0.95rem; }
            .search-bar { max-width: 100%; padding: 0 16px; }
            .search-bar.sticky { max-width: 100%; padding: 0 12px; top: 8px; }
            .search-input { padding: 12px 50px 12px 16px; font-size: 1rem; }
            .stats-bar { gap: 12px; }
            .stat-item { padding: 12px 20px; min-width: 90px; }
            .stat-value { font-size: 1.5rem; }
            .stat-label { font-size: 0.8rem; }
            .major-card-header { padding: 14px 16px; gap: 12px; }
            .major-name-text { font-size: 1rem; }
            .major-meta { gap: 8px; }
            .meta-item { min-width: 60px; }
        }

        @media (max-width: 576px) {
            .page-header { padding: 20px 0 10px; margin-bottom: 12px; }
            .page-title { font-size: 1.5rem; }
            .stats-bar { margin-bottom: 12px; gap: 10px; }
            .stat-item { flex: 1; min-width: auto; padding: 10px 15px; }
            .stat-value { font-size: 1.3rem; }
            .major-card { margin-bottom: 12px; }
            .major-card-header { flex-wrap: wrap; }
            .major-info-main { width: 100%; order: 2; margin-top: 8px; }
            .major-index { order: 0; }
            .major-meta { order: 1; margin-left: auto; }
            .expand-icon { order: 3; }
        }
    </style>
</head>
<body>
<div class="container py-4">

    <!-- 页头 -->
    <div class="page-header">
        <h1 class="page-title">专业名录</h1>
        <p class="page-subtitle">共收录 <span id="totalCount" style="color:var(--accent-cyan)">--</span> 个专业，含专业介绍、就业前景及河南省录取数据</p>

        <!-- 搜索栏 -->
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input"
                placeholder="搜索专业名称，如：计算机、医学、金融、法学..." autocomplete="off">
        </div>

        <!-- 统计 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalCountStat">--</div>
                <div class="stat-label">收录专业</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="resultCount">--</div>
                <div class="stat-label">当前显示</div>
            </div>
        </div>
    </div>

    <!-- 专业列表 -->
    <div id="majorList">
        <div class="loading">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">加载中...</span>
            </div>
            <h4 class="mt-3">正在加载专业数据...</h4>
        </div>
    </div>
</div>

<script src="vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script>
    const API = `http://${window.location.hostname || 'localhost'}:3000/api`;
    let allMajors = [];
    // 已加载过详情的专业缓存
    const detailCache = {};

    document.addEventListener('DOMContentLoaded', async () => {
        await loadMajors();
        bindSearch();
        setupStickySearch();
    });

    // 搜索框滚动固定
    function setupStickySearch() {
        const searchBar = document.querySelector('.search-bar');
        const searchBarOffset = searchBar.offsetTop;

        window.addEventListener('scroll', function() {
            if (window.pageYOffset > searchBarOffset) {
                searchBar.classList.add('sticky');
            } else {
                searchBar.classList.remove('sticky');
            }
        });
    }

    async function loadMajors() {
        try {
            const res = await fetch(`${API}/majors`);
            const json = await res.json();
            if (!json.success) throw new Error(json.error);
            allMajors = json.data;
            document.getElementById('totalCount').textContent = allMajors.length;
            document.getElementById('totalCountStat').textContent = allMajors.length;
            renderList(allMajors);
        } catch (e) {
            document.getElementById('majorList').innerHTML =
                `<div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <h3>加载失败</h3>
                    <p>${e.message}</p>
                    <p style="font-size:0.85rem;margin-top:8px">请确认后端服务已启动（3000端口）</p>
                </div>`;
        }
    }

    function bindSearch() {
        const searchInput = document.getElementById('searchInput');
        let timer;
        searchInput.addEventListener('input', () => {
            clearTimeout(timer);
            timer = setTimeout(filterAndRender, 200);
        });
        searchInput.addEventListener('keydown', e => { if (e.key === 'Enter') filterAndRender(); });
    }

    function filterAndRender() {
        const kw = document.getElementById('searchInput').value.trim().toLowerCase();
        const list = kw ? allMajors.filter(m => m.major_name && m.major_name.toLowerCase().includes(kw)) : allMajors;
        renderList(list);
    }

    function renderList(list) {
        document.getElementById('resultCount').textContent = list.length;

        if (!list.length) {
            document.getElementById('majorList').innerHTML =
                `<div class="empty-state">
                    <div class="empty-state-icon">🔍</div>
                    <h3>未找到匹配的专业</h3>
                    <p>请尝试其他关键词</p>
                </div>`;
            return;
        }

        const cards = list.map((m, idx) => {
            const introPreview = m.introduction
                ? m.introduction.replace(/<[^>]*>/g, '').substring(0, 80) + (m.introduction.length > 80 ? '…' : '')
                : '暂无专业介绍';

            const schoolCount = m.school_count != null ? m.school_count : '-';

            return `
            <div class="major-card" id="card-${idx}">
                <div class="major-card-header" onclick="toggleCard(${idx}, '${escapeHtml(m.major_name)}')">
                    <div class="major-index">${idx + 1}</div>
                    <div class="major-info-main">
                        <div class="major-name-text">${escapeHtml(m.major_name)}</div>
                    </div>
                    <div class="major-meta">
                        <div class="meta-item">
                            <div class="meta-label">开设院校</div>
                            <div class="meta-value school">${schoolCount} 所</div>
                        </div>
                    </div>
                    <div class="expand-icon" id="icon-${idx}">▼</div>
                </div>
                <div class="major-card-body" id="body-${idx}">
                    <div class="loading-mask"><div class="spinner"></div><span>加载中...</span></div>
                </div>
            </div>`;
        }).join('');

        document.getElementById('majorList').innerHTML = cards;
    }

    async function toggleCard(idx, majorName) {
        const body = document.getElementById(`body-${idx}`);
        const icon = document.getElementById(`icon-${idx}`);

        if (body.classList.contains('show')) {
            body.classList.remove('show');
            icon.classList.remove('open');
            return;
        }

        body.classList.add('show');
        icon.classList.add('open');

        // 已缓存直接展示
        if (detailCache[majorName]) {
            body.innerHTML = detailCache[majorName];
            return;
        }

        // 从列表找到该专业的 major_info 数据
        const m = allMajors.find(x => x.major_name === majorName);
        // 同时请求录取数据
        try {
            const res = await fetch(`${API}/major-detail?major_name=${encodeURIComponent(majorName)}`);
            const json = await res.json();
            const admitRows = json.success ? json.data : [];

            let html = '';

            // 专业介绍
            if (m && m.introduction) {
                html += `
                <div class="info-section">
                    <div class="info-section-title">专业介绍</div>
                    <div class="info-section-content">${escapeHtml(m.introduction)}</div>
                </div>`;
            }

            // 就业前景
            if (m && m.career_path) {
                html += `
                <div class="info-section">
                    <div class="info-section-title">就业前景 & AI影响</div>
                    <div class="info-section-content">${escapeHtml(m.career_path)}</div>
                </div>`;
            }

            // 录取院校
            html += `<div class="info-section">
                <div class="info-section-title">开设院校（河南招生录取数据，共 ${admitRows.length} 条）</div>`;

            if (admitRows.length) {
                const tableRows = admitRows.map(r => `
                    <tr>
                        <td><strong>${escapeHtml(r.school_name)}</strong></td>
                        <td>${r.province || '-'}</td>
                        <td>${r.school_type || '-'}</td>
                        <td>${r.college_level || '-'}</td>
                        <td>${r.subject_type || '-'}</td>
                        <td>${r.subject_require || '-'}</td>
                        <td>${r.batch || '-'}${r.batch_remark ? ' · ' + r.batch_remark : ''}</td>
                        <td class="score-col">${r.min_score || '-'}</td>
                        <td class="rank-col">${r.min_rank ? r.min_rank.toLocaleString() : '-'}</td>
                        <td style="color:#888;font-size:0.8rem">${r.major_remark ? r.major_remark.substring(0, 30) : '-'}</td>
                    </tr>`).join('');

                html += `<div class="admit-table-wrap">
                    <table class="admit-table">
                        <thead>
                            <tr>
                                <th>院校名称</th><th>省份</th><th>办学性质</th><th>院校层次</th>
                                <th>科类</th><th>选科要求</th><th>批次</th>
                                <th>最低分</th><th>最低位次</th>
                                <th>备注</th>
                            </tr>
                        </thead>
                        <tbody>${tableRows}</tbody>
                    </table>
                </div>`;
            } else {
                html += '<div class="no-admit">暂无河南省录取数据</div>';
            }
            html += '</div>';

            if (!m || (!m.introduction && !m.career_path)) {
                html = `<div class="empty-state" style="padding:20px 0">
                    <div class="empty-state-icon" style="font-size:2rem">📋</div>
                    <p>暂无专业详情</p>
                </div>` + html;
            }

            detailCache[majorName] = html;
            body.innerHTML = html;
        } catch (e) {
            body.innerHTML = `<div class="empty-state">
                <div class="empty-state-icon">⚠️</div>
                <h3>加载失败</h3>
                <p>${e.message}</p>
            </div>`;
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
