<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能推荐结果</title>
    <script>
        // 登录验证 - 未登录跳转到登录页
        (function() {
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            --card-bg: rgba(20, 20, 40, 0.6);
            --card-border: rgba(100, 100, 255, 0.15);
            --text-primary: #ffffff;
            --text-secondary: #b0b0d0;
            --accent-cyan: #00d4ff;
            --accent-purple: #a855f7;
            --accent-pink: #f472b6;
        }

        * { box-sizing: border-box; }

        html, body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
            font-size: 16px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image:
                radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 24px 48px;
        }

        /* 顶部信息栏 */
        .info-bar {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }

        .info-tag {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.92rem;
            color: var(--text-secondary);
        }

        .info-tag strong {
            color: var(--accent-cyan);
            font-size: 1.05rem;
        }

        .info-tag .label {
            color: var(--text-secondary);
        }

        /* 筛选栏 */
        .filter-bar {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 20px;
        }

        /* 筛选项网格区 */
        .filter-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px 16px;
            margin-bottom: 12px;
        }

        /* 单个筛选项：label + 控件纵向排列 */
        .filter-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .filter-item label {
            color: var(--text-secondary);
            font-size: 0.8rem;
            white-space: nowrap;
        }

        .filter-item select,
        .filter-item input {
            background: rgba(10, 30, 80, 0.8);
            border: 1px solid rgba(59, 159, 232, 0.3);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.86rem;
            width: 100%;
            box-sizing: border-box;
            height: 34px;
        }

        .filter-item select:focus,
        .filter-item input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 0 2px rgba(59, 159, 232, 0.2);
        }

        .filter-item select option {
            background: #0d2566;
        }

        /* 筛选底部操作行 */
        .filter-actions {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            padding-top: 4px;
            border-top: 1px solid rgba(59,159,232,0.1);
        }

        .result-count {
            color: var(--text-secondary);
            font-size: 0.86rem;
            margin-right: auto;
        }

        .result-count strong {
            color: var(--accent-cyan);
        }

        .reset-btn {
            padding: 6px 20px;
            border-radius: 8px;
            border: 1px solid rgba(59,159,232,0.4);
            background: rgba(59,159,232,0.08);
            color: var(--accent-cyan);
            font-size: 0.86rem;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
            height: 34px;
        }
        .reset-btn:hover {
            background: rgba(59,159,232,0.2);
            border-color: rgba(59,159,232,0.7);
        }

        /* 返回按钮 */
        .back-btn {
            background: rgba(59, 159, 232, 0.1);
            border: 1px solid rgba(59, 159, 232, 0.3);
            color: var(--accent-cyan);
            border-radius: 10px;
            padding: 7px 18px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            transition: background 0.15s;
        }
        .back-btn:hover { background: rgba(59, 159, 232, 0.2); color: #7dc8f0; }




        /* 页面标题 */
        .page-title {
            font-size: 42px;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .page-title span {
            font-size: 1rem;
            font-weight: 400;
            color: var(--text-secondary);
        }

        /* 卡片列表容器 */
        .cards-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* 专业名称悬浮介绍 tooltip */
        .major-name {
            font-size: 0.9rem;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            border-bottom: 1px dashed rgba(59,159,232,0.4);
            transition: color 0.15s;
        }
        .major-name:hover { color: #7dc8f0; }

        #majorTooltip {
            position: fixed;
            z-index: 9999;
            width: 500px;
            background: rgba(5, 20, 60, 0.97);
            border: 1px solid rgba(59,159,232,0.4);
            border-radius: 10px;
            padding: 14px 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            display: none;
            backdrop-filter: blur(8px);
        }
        #majorTooltip.visible { display: block; }
        .tooltip-title {
            font-size: 0.92rem;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            border-bottom: 1px solid rgba(59,159,232,0.2);
            padding-bottom: 6px;
        }
        .tooltip-section {
            margin-bottom: 7px;
        }
        .tooltip-section-label {
            font-size: 0.7rem;
            color: var(--accent-pink);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 3px;
        }
        .tooltip-section-body {
            font-size: 0.78rem;
            color: var(--text-secondary);
            line-height: 1.55;
        }
        .tooltip-loading {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
            padding: 8px 0;
        }
        .tooltip-none {
            font-size: 0.8rem;
            color: rgba(168,204,240,0.5);
            text-align: center;
            padding: 8px 0;
        }

        /* 排序工具栏 */
        .sort-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 18px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }
        .sort-bar-label {
            color: var(--text-secondary);
            font-size: 0.82rem;
            white-space: nowrap;
        }
        .sort-btn {
            padding: 0 16px;
            height: 32px;
            line-height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(59,159,232,0.25);
            background: rgba(59,159,232,0.07);
            color: var(--text-secondary);
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .sort-btn:hover { background: rgba(59,159,232,0.18); color: var(--accent-cyan); }
        .sort-btn.active { background: rgba(59,159,232,0.22); color: var(--accent-cyan); border-color: rgba(59,159,232,0.6); }
        .sort-btn .sort-arrow { margin-left: 3px; font-size: 0.7rem; }

        /* 院校卡片 */
        .school-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            margin-bottom: 14px;
            overflow: hidden;
            transition: border-color 0.2s;
        }
        .school-card:hover {
            border-color: rgba(59,159,232,0.45);
        }

        /* 院校头部 */
        .school-header {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(59,159,232,0.12);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            user-select: none;
        }
        .school-header:hover {
            background: rgba(59,159,232,0.05);
        }
        /* 折叠箭头 */
        .collapse-arrow {
            color: var(--text-secondary);
            font-size: 0.75rem;
            margin-left: auto;
            padding-top: 4px;
            transition: transform 0.2s;
            white-space: nowrap;
        }
        .school-card.collapsed .collapse-arrow {
            transform: rotate(-90deg);
        }
        /* 专业折叠体 */
        .major-body {
            overflow: hidden;
            transition: max-height 0.25s ease, opacity 0.2s;
            max-height: 2000px;
            opacity: 1;
        }
        .school-card.collapsed .major-body {
            max-height: 0;
            opacity: 0;
        }
        .school-header-left {
            flex: 1;
            min-width: 0;
            display: flex;
            align-items: center;
            gap: 0;
        }
        .school-name-row {
            display: flex;
            align-items: center;
            min-width: 220px;
            width: 220px;
            overflow: hidden;
        }
        .school-col-level  { min-width: 80px;  width: 80px; }
        .school-col-code   { min-width: 70px;  width: 70px; color: var(--text-secondary); font-size: 0.78rem; }
        .school-col-province { min-width: 60px; width: 60px; color: var(--text-secondary); font-size: 0.82rem; }
        .school-col-city-province { min-width: 60px; width: 60px; color: var(--text-secondary); font-size: 0.82rem; }
        .school-col-batch  { min-width: 90px;  width: 90px; }
        .school-col-remark { min-width: 80px;  width: 80px; }
        .school-info-row {
            display: contents;
        }
        .school-link {
            color: var(--accent-cyan);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
        }
        .school-link:hover { text-decoration: underline; color: #7dc8f0; }

        .school-tags {
            display: contents;
        }

        /* 批次标签 */
        .batch-tag {
            font-size: 0.72rem;
            padding: 2px 7px;
            border-radius: 5px;
            background: rgba(240, 165, 0, 0.12);
            border: 1px solid rgba(240, 165, 0, 0.3);
            color: var(--accent-pink);
            white-space: nowrap;
        }
        /* 省份 */
        .province-text {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
        /* 院校层次标签 */
        .college-level-tag {
            display: inline-block;
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 5px;
            background: rgba(120, 200, 120, 0.15);
            color: #7ec87e;
            border: 1px solid rgba(120, 200, 120, 0.3);
            white-space: nowrap;
            font-weight: 600;
        }
        .college-level-tag.level-211 { background: rgba(59,159,232,0.15); color: #7dc8f0; border-color: rgba(59,159,232,0.3); }
        .college-level-tag.level-985 { background: rgba(255,180,0,0.15); color: #ffcc44; border-color: rgba(255,180,0,0.3); }
        .college-level-tag.level-syl { background: rgba(200,100,255,0.15); color: #cc88ff; border-color: rgba(200,100,255,0.3); }

        /* 院校统计（右侧：N所专业） */
        .school-major-count {
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            padding-top: 4px;
        }
        .school-major-count strong {
            color: var(--accent-cyan);
            font-size: 1rem;
        }

        /* 专业列表头 */
        .major-list-header {
            display: grid;
            grid-template-columns: 2fr 80px 100px 80px 90px 90px 100px 120px 100px;
            padding: 7px 20px;
            background: rgba(59,159,232,0.06);
            border-bottom: 1px solid rgba(59,159,232,0.1);
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            letter-spacing: 0.02em;
        }
        .major-list-header span { text-align: center; }
        .major-list-header span:first-child { text-align: left; }

        /* 专业行 */
        .major-row {
            display: grid;
            grid-template-columns: 2fr 80px 100px 80px 90px 90px 100px 120px 100px;
            padding: 11px 20px;
            border-bottom: 1px solid rgba(59,159,232,0.06);
            align-items: center;
            transition: background 0.12s;
        }
        .major-row:last-child { border-bottom: none; }
        .major-row:hover { background: rgba(59,159,232,0.06); }

        .major-row-left {
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;
        }
        .major-name-row {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .major-meta {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .major-group-tag {
            font-size: 0.7rem;
            padding: 1px 6px;
            border-radius: 4px;
            background: rgba(30,91,191,0.2);
            border: 1px solid rgba(30,91,191,0.4);
            color: #88aaee;
            white-space: nowrap;
        }
        .major-category-text {
            font-size: 0.72rem;
            color: var(--text-secondary);
        }

        .major-row-cell {
            text-align: center;
            font-size: 0.88rem;
        }
        .score-val {
            color: var(--accent-cyan);
            font-weight: 700;
            font-size: 1rem;
        }
        .rank-val {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* 选科要求标签 */
        .subject-badge {
            display: inline-block;
            font-size: 0.72rem;
            padding: 2px 7px;
            border-radius: 7px;
            background: rgba(59, 159, 232, 0.12);
            border: 1px solid rgba(59, 159, 232, 0.3);
            color: var(--text-secondary);
            white-space: nowrap;
        }
        .subject-badge.unlimited {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
            color: #6ee7b7;
        }

        /* 概率徽章 */
        .prob-badge {
            display: inline-block;
            font-size: 0.78rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 8px;
            white-space: nowrap;
        }
        /* 按概率区间染色 */
        .prob-badge.prob-90 { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }  /* ≥90%: 绿色 */
        .prob-badge.prob-70 { background: rgba(59,159,232,0.15); color: #5dade2; border: 1px solid rgba(59,159,232,0.3); }  /* 70%~90%: 青色 */
        .prob-badge.prob-50 { background: rgba(52,152,219,0.15); color: #3498db; border: 1px solid rgba(52,152,219,0.3); }  /* 50%~70%: 蓝色 */
        .prob-badge.prob-30 { background: rgba(243,156,18,0.15); color: #f39c12; border: 1px solid rgba(243,156,18,0.3); }  /* 30%~50%: 橙色 */
        .prob-badge.prob-0  { background: rgba(231,76,60,0.15);  color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }  /* <30%: 红色 */
        /* 兼容旧样式 */
        .prob-badge.rush   { background: rgba(239,68,68,0.15);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
        .prob-badge.stable { background: rgba(234,179,8,0.15);  color: #fbbf24; border: 1px solid rgba(234,179,8,0.3); }
        .prob-badge.safe   { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }

        /* 分组选项卡 */
        .group-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 10px 20px 0;
            border-bottom: 1px solid rgba(59,159,232,0.12);
            background: rgba(10,25,70,0.4);
        }
        .group-tab {
            padding: 6px 16px;
            border-radius: 8px 8px 0 0;
            border: 1px solid rgba(59,159,232,0.25);
            border-bottom: none;
            background: rgba(10,30,80,0.5);
            color: var(--text-secondary);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.18s;
            user-select: none;
            white-space: nowrap;
        }
        .group-tab:hover {
            background: rgba(59,159,232,0.12);
            color: var(--accent-cyan);
        }
        .group-tab.active {
            background: rgba(59,159,232,0.18);
            color: var(--accent-cyan);
            border-color: rgba(59,159,232,0.5);
        }
        .group-tab .tab-count {
            display: inline-block;
            background: rgba(59,159,232,0.2);
            color: var(--accent-cyan);
            border-radius: 10px;
            font-size: 0.72rem;
            padding: 0 6px;
            margin-left: 5px;
            line-height: 1.6;
        }
        .group-tab .tab-stat {
            display: none;  /* 默认隐藏 */
        }
        .group-tab.active .tab-stat {
            display: inline-block;
            color: rgba(59,159,232,0.85);
            background: rgba(59,159,232,0.1);
            border-radius: 6px;
            font-size: 0.70rem;
            padding: 0 5px;
            margin-left: 4px;
            line-height: 1.6;
            border: 1px solid rgba(59,159,232,0.25);
        }
        .group-panel {
            display: none;
        }
        .group-panel.active {
            display: block;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-secondary);
        }

        /* 分页 */
        .pagination-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 18px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            margin-top: 4px;
        }
        .page-btn {
            background: rgba(59, 159, 232, 0.1);
            border: 1px solid rgba(59, 159, 232, 0.25);
            color: var(--accent-cyan);
            border-radius: 7px;
            padding: 0 14px;
            height: 32px;
            line-height: 32px;
            cursor: pointer;
            font-size: 0.86rem;
            transition: background 0.15s;
        }
        .page-btn:hover, .page-btn.active { background: rgba(59, 159, 232, 0.25); }
        .page-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        @media (max-width: 768px) {
            .major-list-header, .major-row {
                grid-template-columns: 2fr 80px 80px 90px;
            }
            .major-list-header span:nth-child(n+5),
            .major-row .major-row-cell:nth-child(n+4) { display: none; }
        }
    </style>
</head>
<body>
<div class="main-container">

    <!-- 页面标题 -->
    <div class="page-title">
        🌟 智能推荐结果
        <span id="generateTimeText"></span>
    </div>

    <!-- 基本信息栏 -->
    <div class="info-bar" id="infoBar">
        <div class="info-tag"><span class="label">生源地：</span><strong id="infoRegion">-</strong></div>
        <div class="info-tag"><span class="label">分数：</span><strong id="infoScore">-</strong> 分</div>
        <div class="info-tag"><span class="label">选科：</span><strong id="infoSubject">-</strong></div>
        <div class="info-tag" style="margin-left:auto;">
            共找到 <strong id="infoTotal" style="color:var(--accent-cyan);">0</strong> 所院校，<strong id="infoMajorTotal" style="color:var(--accent-cyan);">0</strong> 条专业数据
        </div>
    </div>

    <!-- 筛选栏 -->
    <div class="filter-bar">
        <div class="filter-grid">
            <div class="filter-item">
                <label>院校名称</label>
                <input type="text" id="filterSchool" placeholder="搜索学校名..." oninput="applyFilter()">
            </div>
            <div class="filter-item">
                <label>专业名称</label>
                <input type="text" id="filterMajor" placeholder="搜索专业名..." oninput="applyFilter()">
            </div>
            <div class="filter-item">
                <label>省份</label>
                <select id="filterProvince" onchange="onProvinceChange()">
                    <option value="">全部</option>
                </select>
            </div>
            <div class="filter-item">
                <label>城市</label>
                <select id="filterCity" onchange="applyFilter()">
                    <option value="">全部</option>
                </select>
            </div>
            <div class="filter-item">
                <label>院校层次</label>
                <select id="filterCollegeLevel" onchange="applyFilter()">
                    <option value="">全部</option>
                </select>
            </div>
            <div class="filter-item">
                <label>批次</label>
                <select id="filterBatch" onchange="onBatchChange()">
                    <option value="">全部</option>
                </select>
            </div>
            <div class="filter-item">
                <label>招生类别</label>
                <select id="filterBatchRemark" onchange="applyFilter()">
                    <option value="">全部</option>
                </select>
            </div>
            <div class="filter-item">
                <label>选科要求</label>
                <select id="filterSubjectRequire" onchange="applyFilter()">
                    <option value="">全部</option>
                </select>
            </div>
            <div class="filter-item">
                <label>学科大类</label>
                <select id="filterCategory" onchange="onCategoryChange()">
                    <option value="">全部</option>
                </select>
            </div>
            <div class="filter-item">
                <label>专业类</label>
                <select id="filterMajorCategory" onchange="applyFilter()">
                    <option value="">全部</option>
                </select>
            </div>
        </div>
        <div class="filter-actions">
            <span class="result-count">筛选结果：<strong id="filteredCount">0</strong> 条</span>
            <button class="reset-btn" onclick="resetFilter()">重置筛选</button>
        </div>
    </div>

    <!-- 排序工具栏 -->
    <div class="sort-bar">
        <span class="sort-bar-label">排序：</span>
        <button class="sort-btn active" id="sortBtn_score" onclick="sortTable('score')">最低分 <span class="sort-arrow">▼</span></button>
        <button class="sort-btn" id="sortBtn_rank" onclick="sortTable('rank')">最低位次 <span class="sort-arrow">⇅</span></button>
        <button class="sort-btn" id="sortBtn_name" onclick="sortTable('name')">院校名称 <span class="sort-arrow">⇅</span></button>
        <button class="sort-btn" id="sortBtn_major" onclick="sortTable('major')">专业名称 <span class="sort-arrow">⇅</span></button>
        <button class="sort-btn" id="sortBtn_probability" onclick="sortTable('probability')">录取概率 <span class="sort-arrow">⇅</span></button>
    </div>

    <!-- 卡片列表 -->
    <div class="cards-wrapper" id="resultBody">
    </div>

    <!-- 分页 -->
    <div class="pagination-bar" id="paginationBar" style="display:none;">
        <button class="page-btn" id="btnFirst" onclick="goPage(1)">«</button>
        <button class="page-btn" id="btnPrev" onclick="goPage(currentPage - 1)">‹</button>
        <span id="pageInfo" style="color:var(--text-secondary);font-size:0.88rem;"></span>
        <button class="page-btn" id="btnNext" onclick="goPage(currentPage + 1)">›</button>
        <button class="page-btn" id="btnLast" onclick="goPage(totalPages)">»</button>
        <select id="pageSizeSelect" class="page-btn" onchange="changePageSize()" style="padding:5px 8px;">
            <option value="10" selected>10所/页</option>
            <option value="20">20所/页</option>
            <option value="50">50所/页</option>
            <option value="100">100所/页</option>
            <option value="0">全部</option>
        </select>
    </div>

</div>

<script>
// ============ 数据加载 ============
let allData = [];        // 全部原始数据
let filteredData = [];   // 筛选后数据
let sortKey = 'score';
let sortAsc = false;
let currentPage = 1;
let pageSize = 10;
let totalPages = 1;

const API_BASE = `http://${window.location.hostname || 'localhost'}:3000/api`;

window.addEventListener('DOMContentLoaded', async () => {
    // 从 URL 参数读取查询条件（避免 sessionStorage 超额）
    const params = new URLSearchParams(location.search);
    const region = params.get('region') || '河南';
    const score = params.get('score') || '';
    const subjectCombination = params.get('subjectCombination') || '';

    if (!score || !subjectCombination) {
        document.getElementById('resultBody').innerHTML = `
            <tr><td colspan="7">
                <div class="empty-state">
                    <div style="font-size:2rem;margin-bottom:12px;">📭</div>
                    <div>缺少查询参数，请返回首页重新查询</div>
                </div>
            </td></tr>`;
        return;
    }

    // 渲染顶部信息栏（先填参数，数量查到后再更新）
    document.getElementById('infoRegion').textContent = region;
    document.getElementById('infoScore').textContent = score;
    document.getElementById('infoSubject').textContent = subjectCombination;
    const now = new Date();
    document.getElementById('generateTimeText').textContent =
        `（${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')} 生成）`;

    // 显示加载中
    document.getElementById('resultBody').innerHTML = `
        <tr><td colspan="7">
            <div class="empty-state">
                <div style="font-size:1.5rem;margin-bottom:12px;">⏳</div>
                <div>正在查询数据，请稍候...</div>
            </div>
        </td></tr>`;

    try {
        const resp = await fetch(`${API_BASE}/recommend-from-db`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ score: Number(score), subjectCombination, region })
        });
        const result = await resp.json();
        if (!result.success) throw new Error(result.error || '接口返回失败');

        allData = result.data || [];

        // 统计院校数和专业数
        const schoolSet = new Set(allData.map(r => r.name));
        document.getElementById('infoTotal').textContent = schoolSet.size;
        document.getElementById('infoMajorTotal').textContent = allData.length;

        if (allData.length === 0) {
            document.getElementById('resultBody').innerHTML = `
                <tr><td colspan="7">
                    <div class="empty-state">
                        <div style="font-size:2rem;margin-bottom:12px;">🔍</div>
                        <div>未找到符合条件的推荐数据，请尝试调整分数或选科</div>
                    </div>
                </td></tr>`;
            return;
        }

        // 初始化筛选下拉
        initFilterOptions();

        // 初始展示
        filteredData = [...allData];
        document.getElementById('filteredCount').textContent = filteredData.length;
        sortAndRender();

    } catch (err) {
        document.getElementById('resultBody').innerHTML = `
            <tr><td colspan="7">
                <div class="empty-state">
                    <div style="font-size:2rem;margin-bottom:12px;">❌</div>
                    <div>查询失败：${err.message}<br><small>请确认后端服务已启动（http://localhost:3000）</small></div>
                </div>
            </td></tr>`;
    }
});

// ============ 筛选下拉初始化 ============
// 一级批次 → 二级招生类别 映射表
let batchRemarkMap = {};  // { '本科一批': Set(['普通类','艺术类',...]), ... }
// 一级学科大类 → 二级专业类 映射表
let majorCategoryMap = {}; // { '理学': Set(['数学类','物理学类',...]), ... }
// 省份 → 城市集合 映射表
let provinceCity = {};



function initFilterOptions() {
    const collegeLevels = [...new Set(allData.map(r => r.college_level).filter(Boolean))].sort();
    const batches = [...new Set(allData.map(r => r.batch).filter(Boolean))].sort();
    const subjects = [...new Set(allData.map(r => r.subject_require).filter(Boolean))].sort();

    // 构建 batch → batch_remark 映射
    batchRemarkMap = {};
    allData.forEach(r => {
        if (!r.batch) return;
        if (!batchRemarkMap[r.batch]) batchRemarkMap[r.batch] = new Set();
        if (r.batch_remark) batchRemarkMap[r.batch].add(r.batch_remark);
    });

    const pSel = document.getElementById('filterProvince');
    // 构建省份 → 城市集合映射（全局，供联动使用）
    provinceCity = {};
    allData.forEach(r => {
        if (!r.province) return;
        if (!provinceCity[r.province]) provinceCity[r.province] = new Set();
        if (r.college_city) provinceCity[r.province].add(r.college_city);
    });
    const provinces = Object.keys(provinceCity).sort();
    provinces.forEach(p => {
        const o = document.createElement('option');
        o.value = p;
        o.textContent = p;
        pSel.appendChild(o);
    });

    const lvSel = document.getElementById('filterCollegeLevel');
    collegeLevels.forEach(lv => {
        const o = document.createElement('option');
        o.value = lv; o.textContent = lv;
        lvSel.appendChild(o);
    });

    const bSel = document.getElementById('filterBatch');
    batches.forEach(b => {
        const o = document.createElement('option');
        o.value = b; o.textContent = b;
        bSel.appendChild(o);
    });

    const sSel = document.getElementById('filterSubjectRequire');
    subjects.forEach(s => {
        const o = document.createElement('option');
        o.value = s; o.textContent = s;
        sSel.appendChild(o);
    });

    // 学科大类/专业类使用动态刷新函数，初始时基于全量数据
    refreshCategoryOptions(allData);
}

// 省份切换时，刷新城市下拉并触发筛选
function onProvinceChange() {
    const province = document.getElementById('filterProvince').value;
    const citySel = document.getElementById('filterCity');
    citySel.innerHTML = '<option value="">全部</option>';
    if (province && provinceCity[province]) {
        const cities = [...provinceCity[province]].filter(Boolean).sort();
        cities.forEach(c => {
            const o = document.createElement('option');
            o.value = c; o.textContent = c;
            citySel.appendChild(o);
        });
    }
    applyFilter();
}

// 一级批次切换时，刷新二级招生类别并触发筛选
function onBatchChange() {
    const batch = document.getElementById('filterBatch').value;
    const brSel = document.getElementById('filterBatchRemark');

    // 清空二级
    brSel.innerHTML = '<option value="">全部</option>';

    if (batch && batchRemarkMap[batch]) {
        const remarks = [...batchRemarkMap[batch]].sort();
        remarks.forEach(r => {
            const o = document.createElement('option');
            o.value = r; o.textContent = r;
            brSel.appendChild(o);
        });
    }

    applyFilter();
}

// 一级学科大类切换时，刷新二级专业类并触发筛选
function onCategoryChange() {
    const cat = document.getElementById('filterCategory').value;
    const mcSel = document.getElementById('filterMajorCategory');

    // 清空二级
    mcSel.innerHTML = '<option value="">全部</option>';

    if (cat && majorCategoryMap[cat]) {
        const majorCats = [...majorCategoryMap[cat]].sort();
        majorCats.forEach(mc => {
            const o = document.createElement('option');
            o.value = mc; o.textContent = mc;
            mcSel.appendChild(o);
        });
    }

    applyFilter();
}


// ============ 动态刷新学科大类/专业类选项 ============
// 根据传入的数据集重建 filterCategory 和 filterMajorCategory 的选项
// 保留当前已选中的值（如果新选项里还有的话）
function refreshCategoryOptions(dataSet) {
    const prevCat = document.getElementById('filterCategory').value;
    const prevMajCat = document.getElementById('filterMajorCategory').value;

    // 重建映射
    const newMap = {};
    dataSet.forEach(r => {
        if (!r.category) return;
        if (!newMap[r.category]) newMap[r.category] = new Set();
        if (r.major_category) newMap[r.category].add(r.major_category);
    });
    majorCategoryMap = newMap;

    // 重建一级学科大类
    const cSel = document.getElementById('filterCategory');
    const cats = Object.keys(newMap).sort();
    cSel.innerHTML = '<option value="">全部</option>';
    cats.forEach(c => {
        const o = document.createElement('option');
        o.value = c; o.textContent = c;
        if (c === prevCat) o.selected = true;
        cSel.appendChild(o);
    });

    // 如果之前选中的大类已不在新选项里，清空
    const currentCat = cats.includes(prevCat) ? prevCat : '';
    if (!currentCat) cSel.value = '';

    // 重建二级专业类
    const mcSel = document.getElementById('filterMajorCategory');
    mcSel.innerHTML = '<option value="">全部</option>';
    if (currentCat && newMap[currentCat]) {
        const majorCats = [...newMap[currentCat]].sort();
        majorCats.forEach(mc => {
            const o = document.createElement('option');
            o.value = mc; o.textContent = mc;
            if (mc === prevMajCat) o.selected = true;
            mcSel.appendChild(o);
        });
        // 如果之前选中的专业类已不在新选项里，清空
        if (![...newMap[currentCat]].includes(prevMajCat)) mcSel.value = '';
    }
}

// ============ 重置筛选 ============
function resetFilter() {
    document.getElementById('filterSchool').value = '';
    document.getElementById('filterMajor').value = '';
    document.getElementById('filterProvince').value = '';
    document.getElementById('filterCity').innerHTML = '<option value="">全部</option>';
    document.getElementById('filterCollegeLevel').value = '';
    document.getElementById('filterBatch').value = '';
    // 重置批次后清空二级招生类别
    document.getElementById('filterBatchRemark').innerHTML = '<option value="">全部</option>';
    document.getElementById('filterSubjectRequire').value = '';
    // 重置学科大类后清空二级专业类，并用全量数据重建选项
    document.getElementById('filterMajorCategory').innerHTML = '<option value="">全部</option>';
    refreshCategoryOptions(allData);
    document.getElementById('filterCategory').value = '';
    applyFilter();
}

// ============ 筛选逻辑 ============
function applyFilter() {
    const school = document.getElementById('filterSchool').value.trim().toLowerCase();
    const major = document.getElementById('filterMajor').value.trim().toLowerCase();
    const province = document.getElementById('filterProvince').value;
    const city = document.getElementById('filterCity').value;
    const collegeLevel = document.getElementById('filterCollegeLevel').value;
    const batch = document.getElementById('filterBatch').value;
    const batchRemark = document.getElementById('filterBatchRemark').value;
    const subject = document.getElementById('filterSubjectRequire').value;

    // 第一步：按除学科大类/专业类之外的条件筛选，得到中间结果
    const preFiltered = allData.filter(r => {
        if (school && !(r.name || '').toLowerCase().includes(school)) return false;
        if (major && !(r.major || '').toLowerCase().includes(major)) return false;
        if (province && r.province !== province) return false;
        if (city && r.college_city !== city) return false;
        if (collegeLevel && r.college_level !== collegeLevel) return false;
        if (batch && r.batch !== batch) return false;
        if (batchRemark && r.batch_remark !== batchRemark) return false;
        if (subject && r.subject_require !== subject) return false;
        return true;
    });

    // 第二步：用中间结果动态刷新学科大类/专业类选项
    refreshCategoryOptions(preFiltered);

    // 第三步：再按学科大类/专业类二次过滤
    const category = document.getElementById('filterCategory').value;
    const majorCategory = document.getElementById('filterMajorCategory').value;

    filteredData = preFiltered.filter(r => {
        if (category && r.category !== category) return false;
        if (majorCategory && r.major_category !== majorCategory) return false;
        return true;
    });

    document.getElementById('filteredCount').textContent = filteredData.length;
    currentPage = 1;
    sortAndRender();
}

// ============ 分页 ============
function changePageSize() {
    pageSize = parseInt(document.getElementById('pageSizeSelect').value);
    currentPage = 1;
    sortAndRender();
}

function goPage(p) {
    if (p < 1 || p > totalPages) return;
    currentPage = p;
    sortAndRender();
}

// ============ 排序 ============
function sortTable(key) {
    if (sortKey === key) {
        sortAsc = !sortAsc;
    } else {
        sortKey = key;
        sortAsc = (key === 'name' || key === 'major');
    }
    // 更新排序按钮样式
    document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.classList.remove('active');
        const arrow = btn.querySelector('.sort-arrow');
        if (arrow) arrow.textContent = '⇅';
    });
    const activeBtn = document.getElementById('sortBtn_' + key);
    if (activeBtn) {
        activeBtn.classList.add('active');
        const arrow = activeBtn.querySelector('.sort-arrow');
        if (arrow) arrow.textContent = sortAsc ? '▲' : '▼';
    }
    currentPage = 1;
    sortAndRender();
}

function sortAndRender() {
    const sorted = [...filteredData].sort((a, b) => {
        let va = a[sortKey], vb = b[sortKey];
        if (va === null || va === undefined) va = '';
        if (vb === null || vb === undefined) vb = '';
        if (typeof va === 'number' || !isNaN(Number(va))) {
            va = Number(va) || 0; vb = Number(vb) || 0;
            return sortAsc ? va - vb : vb - va;
        }
        if (sortKey === 'probability') {
            va = parseFloat(String(va)) || 0;
            vb = parseFloat(String(vb)) || 0;
            return sortAsc ? va - vb : vb - va;
        }
        va = String(va); vb = String(vb);
        return sortAsc ? va.localeCompare(vb, 'zh') : vb.localeCompare(va, 'zh');
    });
    renderTable(sorted);
}

// ============ 渲染卡片 ============
function renderTable(data) {
    const container = document.getElementById('resultBody');

    if (data.length === 0) {
        container.innerHTML = `<div class="empty-state">
            <div style="font-size:2rem;margin-bottom:12px;">🔍</div>
            <div>没有符合筛选条件的数据</div>
        </div>`;
        document.getElementById('paginationBar').style.display = 'none';
        return;
    }

    // 按院校分组（保持排序后的顺序）
    const schoolMap = new Map();
    data.forEach(row => {
        const key = (row.school_code || '') + '|' + (row.name || '');
        if (!schoolMap.has(key)) schoolMap.set(key, []);
        schoolMap.get(key).push(row);
    });

    // 院校层次优先级排序（985 > 211 > 双一流 > 普通公办 > 民办 > 其他）
    function getCollegeLevelPriority(lv) {
        if (!lv) return 99;
        if (lv === '985' || lv.includes('985')) return 1;
        if (lv === '211' || lv.includes('211')) return 2;
        if (lv === '双一流' || lv.includes('双一流') || lv.includes('一流')) return 3;
        if (lv === '普通公办' || lv.includes('公办')) return 4;
        if (lv === '民办' || lv.includes('民办')) return 5;
        return 99;
    }

    const groups = [...schoolMap.values()].sort((ga, gb) => {
        const pa = getCollegeLevelPriority(ga[0].college_level || '');
        const pb = getCollegeLevelPriority(gb[0].college_level || '');
        return pa - pb;
    });

    // 分页（按院校数）
    const ps = pageSize === 0 ? groups.length : pageSize;
    totalPages = pageSize === 0 ? 1 : Math.ceil(groups.length / ps);
    if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
    const start = (currentPage - 1) * ps;
    const pageGroups = groups.slice(start, start + ps);

    // 渲染卡片
    let html = '';
    pageGroups.forEach(majors => {
        const school = majors[0];
        const lv = school.college_level || '';
        let lvClass = '';
        if (lv.includes('985')) lvClass = 'level-985';
        else if (lv.includes('双一流') || lv.includes('一流')) lvClass = 'level-syl';
        else if (lv.includes('211')) lvClass = 'level-211';
        const lvTag = lv ? `<span class="college-level-tag ${lvClass}">${escHtml(lv)}</span>` : '';

        html += `
        <div class="school-card collapsed">
            <!-- 院校头部（可点击折叠） -->
            <div class="school-header" onclick="this.closest('.school-card').classList.toggle('collapsed')">
                <div class="school-header-left">
                    <div class="school-name-row">
                        <a class="school-link" onclick="event.stopPropagation();window.open('school-detail.html?schoolName=${encodeURIComponent(school.name)}','_blank')" href="#">
                            ${escHtml(school.name || '-')}
                        </a>
                    </div>
                    <span class="school-col-code">${escHtml(school.school_code || '-')}</span>
                    <span class="school-col-city-province">${escHtml(school.province || '-')}</span>
                    <span class="school-col-province">${escHtml(school.college_city || '-')}</span>
                    <span class="school-col-level">${lvTag}</span>
                    <span class="school-col-batch">${school.batch ? `<span class="batch-tag">${escHtml(school.batch)}</span>` : ''}</span>
                    <span class="school-col-remark">${school.batch_remark ? `<span class="batch-tag" style="background:rgba(59,159,232,0.1);border-color:rgba(59,159,232,0.3);color:#7dc8f0;">${escHtml(school.batch_remark)}</span>` : ''}</span>
                </div>
                <div class="school-major-count">
                    共 <strong>${majors.length}</strong> 个专业
                </div>
                <div class="collapse-arrow">▼</div>
            </div>

            <!-- 专业折叠体 -->
            <div class="major-body">`;

        // 重庆数据不按 major_group_code 分组，直接显示所有专业
        const isChongqing = region === '重庆';
        let groupMap, groupKeys, hasGroups;

        if (isChongqing) {
            // 重庆：所有专业作为一个组
            groupMap = new Map();
            groupMap.set('__all__', majors);
            groupKeys = ['__all__'];
            hasGroups = false;
        } else {
            // 其他省份：按 major_group_code 分组
            groupMap = new Map();
            majors.forEach(row => {
                const gKey = row.major_group_code != null ? String(row.major_group_code) : '__nogroup__';
                if (!groupMap.has(gKey)) groupMap.set(gKey, []);
                groupMap.get(gKey).push(row);
            });

            groupKeys = [...groupMap.keys()].sort((a, b) => {
                if (a === '__nogroup__') return 1;
                if (b === '__nogroup__') return -1;
                return Number(a) - Number(b);
            });

            hasGroups = groupKeys.length > 1 || (groupKeys.length === 1 && groupKeys[0] !== '__nogroup__');
        }

        const cardIdx = groups.indexOf(majors); // 用于生成唯一 id

        if (hasGroups) {
            // 渲染选项卡
            html += `<div class="group-tabs">`;
            groupKeys.forEach((gk, i) => {
                const label = gk === '__nogroup__' ? '未分组' : `第 ${gk} 组`;
                // 限制选项卡文字最多显示10个字
                const displayLabel = label.length > 10 ? label.substring(0, 10) + '...' : label;
                const cnt = groupMap.get(gk).length;
                // 取该组第一条数据中的组统计字段
                const firstRow = groupMap.get(gk)[0] || {};
                const gAdmit = firstRow.group_admit_count_1 != null ? firstRow.group_admit_count_1 : null;
                const gScore = firstRow.group_min_score_1 != null ? firstRow.group_min_score_1 : null;
                const gRank  = firstRow.group_min_rank_1  != null ? firstRow.group_min_rank_1  : null;
                const statsHtml = [
                    gAdmit != null ? `<span class="tab-stat">录取${gAdmit}人</span>` : '',
                    gScore != null ? `<span class="tab-stat">最低${gScore}分</span>` : '',
                    gRank  != null ? `<span class="tab-stat">位次${Number(gRank).toLocaleString()}</span>` : '',
                ].join('');
                html += `<div class="group-tab${i === 0 ? ' active' : ''}" onclick="switchGroupTab(this)" title="${escHtml(label)}">${escHtml(displayLabel)}<span class="tab-count">${cnt}</span>${statsHtml}</div>`;
            });
            html += `</div>`;
        }

        // 渲染各组面板
        groupKeys.forEach((gk, gi) => {
            const groupRows = groupMap.get(gk);
            html += `<div class="group-panel${!hasGroups || gi === 0 ? ' active' : ''}">`;
            // 列头
            html += `
            <div class="major-list-header">
                <span>专业名称</span>
                <span>专业编号</span>
                <span>专业门类</span>
                <span>组编号</span>
                <span>最低分</span>
                <span>最低位次</span>
                <span>选科要求</span>
                <span>招生计划</span>
                <span>录取概率</span>
            </div>`;
            // 专业行
            groupRows.forEach(row => {
                const subjectClass = row.subject_require === '不限' ? 'unlimited' : '';
                
                // 根据概率值决定样式类
                const probValue = parseInt(row.probability) || 0;
                let probClass;
                if (probValue >= 90) probClass = 'prob-90';
                else if (probValue >= 70) probClass = 'prob-70';
                else if (probValue >= 50) probClass = 'prob-50';
                else if (probValue >= 30) probClass = 'prob-30';
                else probClass = 'prob-0';
                
                html += `
                <div class="major-row">
                    <div class="major-row-left">
                        <span class="major-name" data-major="${(row.major || '').replace(/"/g, '&quot;')}">${escHtml(row.major || '-')}</span>
                    </div>
                    <div class="major-row-cell" style="text-align:center;">
                        <span style="color:var(--text-secondary);font-size:0.78rem;">${escHtml(row.major_code || '-')}</span>
                    </div>
                    <div class="major-row-cell">
                        <span class="major-category-text">${escHtml(row.major_category || '-')}</span>
                    </div>
                    <div class="major-row-cell">
                        ${row.major_group_code ? `<span class="major-group-tag">第${escHtml(row.major_group_code)}组</span>` : '<span style="color:var(--text-secondary)">-</span>'}
                    </div>
                    <div class="major-row-cell">
                        <span class="score-val">${row.min_score != null ? row.min_score : '-'}</span>
                    </div>
                    <div class="major-row-cell">
                        <span class="rank-val">${row.rank != null ? Number(row.rank).toLocaleString() : '-'}</span>
                    </div>
                    <div class="major-row-cell">
                        <span class="subject-badge ${subjectClass}">${escHtml(row.subject_require || '-')}</span>
                    </div>
                    <div class="major-row-cell">
                        <span style="color:var(--text-secondary);font-size:0.85rem;">${row.admit_count != null ? row.admit_count + '人' : '-'}</span>
                    </div>
                    <div class="major-row-cell">
                        <span class="prob-badge ${probClass}">${escHtml(row.probability || '-')}</span>
                    </div>
                </div>`;
            });
            html += `</div>`; // end group-panel
        });

        html += `</div></div>`; // end major-body + school-card
    });

    container.innerHTML = html;

    // 分页控件
    const paginationBar = document.getElementById('paginationBar');
    if (totalPages > 1 || pageSize === 0) {
        paginationBar.style.display = 'flex';
        document.getElementById('pageInfo').textContent =
            `第 ${currentPage} / ${totalPages} 页，共 ${groups.length} 所院校 / ${data.length} 个专业`;
        document.getElementById('btnFirst').disabled = currentPage === 1;
        document.getElementById('btnPrev').disabled = currentPage === 1;
        document.getElementById('btnNext').disabled = currentPage === totalPages;
        document.getElementById('btnLast').disabled = currentPage === totalPages;
    } else {
        paginationBar.style.display = 'none';
    }
}

function escHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

// 分组选项卡切换
function switchGroupTab(tabEl) {
    const tabsEl = tabEl.closest('.group-tabs');
    const bodyEl = tabsEl.nextElementSibling; // major-body 内部是 group-tabs + group-panels 交替，需找所有 group-panel
    // 找到所有同级 group-panel（在 .major-body 内）
    const majorBody = tabsEl.parentElement;
    const panels = majorBody.querySelectorAll('.group-panel');
    const tabs = tabsEl.querySelectorAll('.group-tab');
    const idx = [...tabs].indexOf(tabEl);
    tabs.forEach(t => t.classList.remove('active'));
    panels.forEach(p => p.classList.remove('active'));
    tabEl.classList.add('active');
    if (panels[idx]) panels[idx].classList.add('active');
}
</script>
<!-- 专业介绍 Tooltip -->
<div id="majorTooltip">
    <div class="tooltip-title" id="ttTitle"></div>
    <div id="ttBody"></div>
</div>

<script>
// ---- 专业介绍 Tooltip ----
const tooltip = document.getElementById('majorTooltip');
const ttTitle = document.getElementById('ttTitle');
const ttBody  = document.getElementById('ttBody');

const majorCache = {};   // 缓存已请求的专业数据，仅缓存成功结果
let hideTimer = null;
let pendingMajor = '';   // 当前正在请求/显示的专业名

function showTooltip(e, majorName) {
    clearTimeout(hideTimer);
    pendingMajor = majorName;
    ttTitle.textContent = majorName;
    positionTooltip(e);
    tooltip.classList.add('visible');

    // 已有缓存直接渲染
    if (majorCache[majorName] !== undefined) {
        renderTooltipContent(majorCache[majorName]);
        return;
    }

    // 显示加载中
    ttBody.innerHTML = '<div class="tooltip-loading">加载中…</div>';

    fetch(`/api/major-info?major_name=${encodeURIComponent(majorName)}`)
        .then(r => r.json())
        .then(res => {
            if (res.success && res.data) {
                majorCache[majorName] = res.data;  // 只缓存成功结果
            }
            // 只要还是同一个专业就渲染
            if (pendingMajor === majorName) {
                renderTooltipContent(res.success ? res.data : null);
                tooltip.classList.add('visible');
            }
        })
        .catch((err) => {
            console.error('[专业介绍] fetch失败:', err);
            // 失败不写缓存，下次重试
            if (pendingMajor === majorName) {
                ttBody.innerHTML = `<div class="tooltip-none">加载失败：${err.message || '网络错误'}</div>`;
            }
        });
}

function renderTooltipContent(data) {
    if (!data) {
        ttBody.innerHTML = '<div class="tooltip-none">暂无专业介绍</div>';
        return;
    }
    let html = '';
    if (data.introduction) {
        html += `<div class="tooltip-section">
            <div class="tooltip-section-label">专业介绍</div>
            <div class="tooltip-section-body">${escHtmlTt(data.introduction)}</div>
        </div>`;
    }
    if (data.career_path) {
        html += `<div class="tooltip-section">
            <div class="tooltip-section-label">就业方向</div>
            <div class="tooltip-section-body">${escHtmlTt(data.career_path)}</div>
        </div>`;
    }
    if (data.courses) {
        html += `<div class="tooltip-section">
            <div class="tooltip-section-label">主要课程</div>
            <div class="tooltip-section-body">${escHtmlTt(data.courses)}</div>
        </div>`;
    }
    if (!html) html = '<div class="tooltip-none">暂无专业介绍</div>';
    ttBody.innerHTML = html;
}

function positionTooltip(e) {
    const margin = 12;
    const tw = 320, th = 200; // 估算高度
    let x = e.clientX + margin;
    let y = e.clientY + margin;
    if (x + tw > window.innerWidth)  x = e.clientX - tw - margin;
    if (y + th > window.innerHeight) y = e.clientY - th - margin;
    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
}

function hideTooltip() {
    hideTimer = setTimeout(() => tooltip.classList.remove('visible'), 300);
}

// tooltip 本身 hover 时保持显示
tooltip.addEventListener('mouseenter', () => clearTimeout(hideTimer));
tooltip.addEventListener('mouseleave', () => hideTooltip());

function escHtmlTt(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 事件委托：监听所有 .major-name 的 hover
document.addEventListener('mouseover', e => {
    const el = e.target.closest('.major-name');
    if (el) showTooltip(e, el.dataset.major || el.textContent.trim());
});
document.addEventListener('mousemove', e => {
    if (tooltip.classList.contains('visible')) positionTooltip(e);
});
document.addEventListener('mouseout', e => {
    if (e.target.closest('.major-name')) hideTooltip();
});
</script>
</body>
</html>
