<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权鼎教育-升学规划师系统</title>
    <script>
        // 登录验证 - 未登录跳转到登录页
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/school-detail.css" rel="stylesheet">
    <link href="css/global-enhancements.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="main-container">
            <div id="loading" class="loading">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <h4 class="mt-3">正在加载学校信息...</h4>
            </div>

            <div id="content" style="display: none;">
                <!-- 学校头部信息 -->
                <div class="school-header">
                    <h1 class="school-name" id="schoolName"></h1>
                    <div class="badges" id="badges"></div>
                </div>

                <!-- 基本信息 和 排名与实力 并排显示 -->
                <div class="grid-2">
                    <!-- 基本信息 -->
                    <div class="section-card">
                        <h2 class="section-title">📋 基本信息</h2>
                        <div class="info-grid">
                            <div class="info-row">
                                <div class="info-label">所在地区</div>
                                <div class="info-value" id="location"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">学校类型</div>
                                <div class="info-value" id="schoolType"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">隶属单位</div>
                                <div class="info-value" id="affiliation"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">办学层次</div>
                                <div class="info-value" id="educationLevel"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">公私性质</div>
                                <div class="info-value" id="publicPrivate"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">成立时间</div>
                                <div class="info-value" id="establishedDate"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 排名与实力 -->
                    <div class="section-card">
                        <h2 class="section-title">🏆 排名与实力</h2>
                        <div class="info-grid">
                            <div class="info-row">
                                <div class="info-label">全国排名</div>
                                <div class="info-value highlight" id="ranking"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">重点级别</div>
                                <div class="info-value" id="nationalKey"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">硕士点</div>
                                <div class="info-value" id="masterPoints"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">博士点</div>
                                <div class="info-value" id="doctorPoints"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">保研率</div>
                                <div class="info-value highlight" id="graduateRate"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 特色专业 -->
                <div class="section-card">
                    <h2 class="section-title">⭐ 特色专业</h2>
                    <div class="mb-4">
                        <div class="major-category-title national">国家级特色专业</div>
                        <div class="major-list" id="nationalMajors"></div>
                    </div>
                    <div>
                        <div class="major-category-title provincial">省级特色专业</div>
                        <div class="major-list" id="provincialMajors"></div>
                    </div>
                </div>

                <!-- 学生构成 -->
                <div class="section-card">
                    <h2 class="section-title">👥 学生构成</h2>
                    <div class="grid-2 student-grid">
                        <div class="info-row">
                            <div class="info-label">女生比例</div>
                            <div class="info-value" id="femaleRatio"></div>
                        </div>
                        <div class="info-row">
                            <div class="info-label">男生比例</div>
                            <div class="info-value" id="maleRatio"></div>
                        </div>
                    </div>
                </div>

                <!-- 联系方式 -->
                <div class="section-card">
                    <h2 class="section-title">📞 联系方式</h2>
                    <div class="info-row">
                        <div class="info-label">招办电话</div>
                        <div class="info-value" id="phone"></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">电子邮箱</div>
                        <div class="info-value" id="email"></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">通讯地址</div>
                        <div class="info-value" id="address"></div>
                    </div>
                    <div class="info-row">
                        <div class="info-label">官方网站</div>
                        <div class="info-value">
                            <a href="#" class="contact-link" id="website" target="_blank"></a>
                        </div>
                    </div>
                </div>

                <!-- 学校简介 -->
                <div class="section-card">
                    <h2 class="section-title">📖 学校简介</h2>
                    <div class="description-text" id="description"></div>
                    <button class="show-more-btn" id="showMoreBtn" style="display: none;" onclick="toggleDescription()">
                        <span>显示更多</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M6 9l6 6 6-6"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div id="error" style="display: none;" class="error-alert">
                <h3 style="color: #ef4444; margin-bottom: 15px;">❌ 加载失败</h3>
                <p id="errorMessage"></p>
                <a href="index-mysql.html" class="btn btn-primary" style="margin-top: 20px;">返回推荐列表</a>
            </div>
        </div>
    </div>

    <script src="js/ui-enhancements.js"></script>
    <script src="js/school-detail.js"></script>
</body>
</html>
