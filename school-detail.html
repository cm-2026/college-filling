<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学校详情页 - 高考志愿智能推荐系统</title>
    <script>
        // 登录验证 - 未登录跳转到登录页
        (function() {
            var userId = localStorage.getItem('qd_userId');
            if (!userId) {
                window.location.href = 'login.html';
            }
        })();
    </script>
    <link href="vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            /* 背景与文字 - 与index-mysql.html一致 */
            --bg-primary: #f5f7fa;
            --bg-secondary: #ffffff;
            --bg-tertiary: #eef2f7;
            --card-bg: #ffffff;
            --card-border: #cbd5e1;
            --text-primary: #1a1a2e;
            --text-secondary: #3d3d5c;
            --text-tertiary: #6b7280;
            --text-muted: #9ca3af;
            
            /* 强调色 */
            --accent-600: #4f46e5;
            --accent-500: #6366f1;
            --accent-cyan: #3b82f6;
            --accent-purple: #6366f1;
            
            /* 边框与阴影 */
            --border-light: #d1d5db;
            --border-medium: #9ca3af;
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.15), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.15), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
        }

        body {
            background: linear-gradient(135deg, #f0f4f8 0%, #e2e8f0 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            color: var(--text-primary);
        }

        .main-container {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            margin: 20px auto;
            padding: 40px;
            position: relative;
            z-index: 1;
            max-width: 1400px;
            min-height: calc(100vh - 40px);
        }

        .school-header {
            text-align: center;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .school-name {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--accent-600);
        }

        .badges {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        .badge-985 {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            box-shadow: 0 2px 10px rgba(245, 158, 11, 0.4);
        }

        .badge-211 {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            box-shadow: 0 2px 10px rgba(239, 68, 68, 0.4);
        }

        .badge-double {
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            box-shadow: 0 2px 10px rgba(0, 212, 255, 0.4);
        }

        .badge-national {
            background: linear-gradient(135deg, var(--accent-purple), #7c3aed);
            box-shadow: 0 2px 10px rgba(168, 85, 247, 0.4);
        }

        .section-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }

        .section-title {
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #dbeafe;
        }

        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .info-label {
            font-weight: 600;
            color: var(--text-secondary);
            min-width: 120px;
        }

        .info-value {
            color: var(--text-primary);
            flex: 1;
        }

        .info-value.highlight {
            color: var(--accent-600);
            font-weight: 700;
        }

        .description-text {
            line-height: 1.9;
            color: var(--text-secondary);
            font-size: 1.05rem;
            text-align: justify;
            text-align-last: left;
        }

        .description-text p {

            line-height: 2;
            position: relative;
        }

        .description-text p:last-child {
            margin-bottom: 0;
        }

        .description-text .intro-highlight {

            font-weight: 600;
        }

        /* 简介截断样式 */
        .description-text.truncated {
            max-height: 280px;
            overflow: hidden;
            position: relative;
        }

        .description-text.truncated::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(transparent, rgba(255, 255, 255, 0.95));
            pointer-events: none;
        }

        .show-more-btn {

            align-items: center;
            gap: 4px;
            margin-top: 10px;
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);

            cursor: pointer;
            transition: all 0.2s ease;

        }

        .show-more-btn:hover {

            opacity: 1;
        }

        .show-more-btn svg {
            width: 14px;
            height: 14px;
            transition: transform 0.3s ease;
        }

        .show-more-btn.expanded svg {

        }

        .major-tags {

            flex-wrap: wrap;

        }

        /* 特色专业列表样式 - 流式布局 */

            flex-wrap: wrap;
            gap: 10px;
        }

        .major-item {

            align-items: center;

            border: 1px solid #93c5fd;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #1e40af;
            transition: all 0.2s ease;
            white-space: nowrap;
            font-weight: 500;
        }

        .major-item:hover {

            border-color: #3b82f6;
        }

        .major-category-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            padding-left: 8px;
            border-left: 3px solid;
        }

        .major-category-title.national {
            color: #3b82f6;
            border-color: #3b82f6;
        }

        .major-category-title.provincial {
            color: #6366f1;
            border-color: #6366f1;
        }

        .contact-link {
            color: var(--accent-600);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .contact-link:hover {
            color: var(--accent-500);

        }

        .loading {

            padding: 60px;
        }

        .spinner-border {
            width: 3.5rem;
            height: 3.5rem;
            color: var(--accent-600);
        }

        .error-alert {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 16px;
            padding: 30px;

        .grid-2 {

            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

            grid-template-columns: 1fr 1fr;

            font-size: 0.8rem;

        }

        @media (max-width: 575.98px) {

<body>
    <div class="container">
        <div class="main-container">
            <div id="loading" class="loading">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <h4 class="mt-3">正在加载学校信息...</h4>
            </div>

            <div id="content" style="display: none;">

                <div class="school-header">
                    <h1 class="school-name" id="schoolName"></h1>
                    <div class="badges" id="badges"></div>
                </div>

                <!-- 基本信息 和 排名与实力 并排显示 -->
                <div class="grid-2">
                    <!-- 基本信息 -->
                    <div class="section-card">
                        <h2 class="section-title">📋 基本信息</h2>
                        <div class="info-grid">
                            <div class="info-row">
                                <div class="info-label">所在地区</div>
                                <div class="info-value" id="location"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">学校类型</div>
                                <div class="info-value" id="schoolType"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">隶属单位</div>
                                <div class="info-value" id="affiliation"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">办学层次</div>
                                <div class="info-value" id="educationLevel"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">公私性质</div>
                                <div class="info-value" id="publicPrivate"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">成立时间</div>
                                <div class="info-value" id="establishedDate"></div>
                            </div>
                        </div>
                    </div>

                    <!-- 排名与实力 -->
                    <div class="section-card">
                        <h2 class="section-title">🏆 排名与实力</h2>
                        <div class="info-grid">
                            <div class="info-row">
                                <div class="info-label">全国排名</div>
                                <div class="info-value highlight" id="ranking"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">重点级别</div>
                                <div class="info-value" id="nationalKey"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">硕士点</div>
                                <div class="info-value" id="masterPoints"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">博士点</div>
                                <div class="info-value" id="doctorPoints"></div>
                            </div>
                            <div class="info-row">
                                <div class="info-label">保研率</div>
                                <div class="info-value highlight" id="graduateRate"></div>
                            </div>
                        </div>

                </div>

                <!-- 特色专业 -->
                <div class="section-card">
                    <h2 class="section-title">⭐ 特色专业</h2>

                        <div class="major-category-title national">国家级特色专业</div>

                    <div>
                        <div class="major-category-title provincial">省级特色专业</div>

                    <h2 class="section-title">👥 学生构成</h2>

                    <div class="info-row">

                        <span>显示更多</span>

                <a href="index-mysql.html" class="btn btn-primary" style="margin-top: 20px;">返回推荐列表</a>

    <script>
        // 从URL获取学校名称参数
        function getSchoolNameFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return decodeURIComponent(urlParams.get('schoolName') || '');
        }

        // 加载学校详情
        async function loadSchoolDetail() {
            const schoolName = getSchoolNameFromURL();

            if (!schoolName) {
                showError('未指定学校名称');
                return;
            }

            try {
                const response = await fetch(`http://${window.location.hostname || 'localhost'}:3000/api/school-detail?schoolName=${encodeURIComponent(schoolName)}`);
                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.error || '加载失败');
                }

                displaySchoolDetail(result.data);
            } catch (error) {
                console.error('加载学校详情失败:', error);
                showError(error.message || '网络连接失败，请确保后端服务已启动');
            }
        }

        // 显示学校详情
        function displaySchoolDetail(school) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            // 学校名称
            document.getElementById('schoolName').textContent = school.school_name;

            // 徽章
            const badges = [];
            if (school.is_985 === '是') badges.push('<span class="badge badge-985">985工程</span>');
            if (school.is_211 === '是') badges.push('<span class="badge badge-211">211工程</span>');
            if (school.is_double_first_class === '是') badges.push('<span class="badge badge-double">双一流</span>');
            if (school.is_national_key === '是') badges.push('<span class="badge badge-national">国家重点</span>');
            document.getElementById('badges').innerHTML = badges.join('');

            // 基本信息
            document.getElementById('location').textContent = `${school.province || '-'} ${school.city || ''}`;
            document.getElementById('schoolType').textContent = school.school_type || '-';
            document.getElementById('affiliation').textContent = school.affiliation || '-';
            document.getElementById('educationLevel').textContent = school.undergraduate_graduate || '-';
            document.getElementById('publicPrivate').textContent = school.public_private || '-';
            document.getElementById('establishedDate').textContent = school.established_date || '-';

            // 排名与实力
            document.getElementById('ranking').textContent = school.ranking ? `第 ${school.ranking} 名` : '暂无排名';
            document.getElementById('nationalKey').textContent = school.national_or_provincial || '-';
            document.getElementById('masterPoints').textContent = school.master_points ? `${school.master_points} 个` : '-';
            document.getElementById('doctorPoints').textContent = school.doctor_points ? `${school.doctor_points} 个` : '-';
            document.getElementById('graduateRate').textContent = school.graduate_school_rate || '-';

            // 特色专业 - 改进的标签展示
            const nationalMajorsHTML = displayMajorTags(school.national_major_features, '国家级');
            document.getElementById('nationalMajors').innerHTML = nationalMajorsHTML;

            const provincialMajorsHTML = displayMajorTags(school.provincial_major_features, '省级');
            document.getElementById('provincialMajors').innerHTML = provincialMajorsHTML;

            // 学生构成
            document.getElementById('femaleRatio').textContent = school.female_ratio || '-';
            document.getElementById('maleRatio').textContent = school.male_ratio || '-';

            // 联系方式
            document.getElementById('phone').textContent = school.admission_phone || '-';
            document.getElementById('email').innerHTML = school.email ?
                `<a href="mailto:${school.email}" class="contact-link">${school.email}</a>` : '-';
            document.getElementById('address').textContent = school.address || '-';

            const websiteLink = document.getElementById('website');
            if (school.website) {
                websiteLink.href = school.website;
                websiteLink.textContent = school.website;
            } else {
                websiteLink.textContent = '-';
            }

            // 学校简介 - 格式化排版
            const descriptionText = school.description || '';
            const descriptionContainer = document.getElementById('description');
            const showMoreBtn = document.getElementById('showMoreBtn');

            if (descriptionText.length > 200) {
                // 内容超过200字，需要截断显示
                descriptionContainer.innerHTML = formatDescription(descriptionText);
                descriptionContainer.classList.add('truncated');
                descriptionContainer.dataset.fullText = descriptionText;
                showMoreBtn.style.display = 'inline-flex';
            } else {
                // 内容较短，直接显示
                descriptionContainer.innerHTML = formatDescription(descriptionText);
                showMoreBtn.style.display = 'none';
            }
        }

        // 切换简介展开/收起
        function toggleDescription() {
            const descriptionContainer = document.getElementById('description');
            const showMoreBtn = document.getElementById('showMoreBtn');
            const btnText = showMoreBtn.querySelector('span');

            if (descriptionContainer.classList.contains('truncated')) {
                // 展开
                descriptionContainer.classList.remove('truncated');
                showMoreBtn.classList.add('expanded');
                btnText.textContent = '收起';
            } else {
                // 收起
                descriptionContainer.classList.add('truncated');
                showMoreBtn.classList.remove('expanded');
                btnText.textContent = '显示更多';
                // 滚动到简介区域顶部
                descriptionContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        // 格式化学校简介
        function formatDescription(description) {
            if (!description || description.trim() === '') {
                return '<p style="color: var(--text-secondary);">暂无简介</p>';
            }

            // 清理文本
            let text = description.trim();

            // 替换多个连续空格为单个空格
            text = text.replace(/\s+/g, ' ');

            // 智能分段：根据句号、问号、感叹号、换行符分段
            // 保留原有的换行符，并按标点符号分段
            const sentences = text.split(/([。！？\n])/);

            let result = '';
            let currentParagraph = '';
            let sentenceCount = 0;

            for (let i = 0; i < sentences.length; i++) {
                const sentence = sentences[i];

                // 跳过空字符串
                if (!sentence || sentence.trim() === '') continue;

                // 如果是标点符号，加到当前段落
                if (['。', '！', '？', '\n'].includes(sentence)) {
                    currentParagraph += sentence;
                    sentenceCount++;

                    // 每3-4句话结束一段，或者遇到换行符
                    if (sentenceCount >= 3 || sentence === '\n') {
                        // 过滤掉纯换行符的情况
                        if (currentParagraph.replace(/[\n\s]/g, '').length > 0) {
                            result += `<p>${currentParagraph}</p>`;
                        }
                        currentParagraph = '';
                        sentenceCount = 0;
                    }
                } else {
                    // 普通文本，加到当前段落
                    // 如果是段落开头，首字母大写（中文不需要）
                    currentParagraph += sentence;
                }
            }

            // 处理剩余的文本
            if (currentParagraph.trim().length > 0) {
                result += `<p>${currentParagraph}</p>`;
            }

            // 如果分段后仍然是单一长段落，强制按固定长度分段
            if (result === '' || text.length > 500 && !result.includes('</p><p>')) {
                const paragraphs = [];
                const chunkSize = 300; // 每段约300字
                for (let i = 0; i < text.length; i += chunkSize) {
                    paragraphs.push(`<p>${text.substr(i, chunkSize)}</p>`);
                }
                result = paragraphs.join('');
            }

            // 如果没有分段，至少保持为一个段落
            if (!result) {
                result = `<p>${text}</p>`;
            }

            return result;
        }

        // 展示特色专业列表
        function displayMajorTags(majorString, type) {
            if (!majorString || majorString.trim() === '') {
                return '<span style="color: var(--text-secondary); padding: 20px 0; display: block;">暂无数据</span>';
            }

            // 支持多种分隔符：逗号(中英文)、顿号、空格、分号、斜杠
            const separators = /[,，、；;、\s\n]+/;
            const majors = majorString.split(separators)
                .map(m => m.trim())
                .filter(m => m && m.length > 0); // 过滤空字符串

            if (majors.length === 0) {
                return '<span style="color: var(--text-secondary); padding: 20px 0; display: block;">暂无数据</span>';
            }

            // 为每个专业创建列表项
            const items = majors.map(major => {
                return `<div class="major-item">${major}</div>`;
            });

            return items.join('');
        }

        // 显示错误
        function showError(message) {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorMessage').textContent = message;
        }

        // 页面加载时执行
        document.addEventListener('DOMContentLoaded', loadSchoolDetail);
    </script>
</body>
</html>
